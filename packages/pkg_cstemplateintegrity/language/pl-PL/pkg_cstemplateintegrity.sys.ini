PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Monitor integralności Joomla zorientowany na szablony. Instaluje <code>com_cstemplateintegrity</code> (komponent administracyjny + Web Services API) oraz <code>plg_webservices_cstemplateintegrity</code> (rejestruje trasy API komponentu). Wtyczka jest włączana automatycznie podczas instalacji.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Zainstalowano Cybersalt Template Integrity, a wtyczka Web Services została automatycznie włączona. Punkt końcowy nadpisań jest teraz dostępny pod /api/index.php/v1/cstemplateintegrity/overrides."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Zaktualizowano Cybersalt Template Integrity."

PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Moniteur d'intégrité Joomla compétent en matière de templates. Installe <code>com_cstemplateintegrity</code> (composant d'administration + API Web Services) et <code>plg_webservices_cstemplateintegrity</code> (qui enregistre les routes API du composant). Le plugin est activé automatiquement lors de l'installation.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Cybersalt Template Integrity a été installé et le plugin Web Services a été activé automatiquement. Le point de terminaison Overrides est désormais disponible à l'adresse /api/index.php/v1/cstemplateintegrity/overrides."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Cybersalt Template Integrity a été mis à jour."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_OPEN="Ouvrir le tableau de bord"

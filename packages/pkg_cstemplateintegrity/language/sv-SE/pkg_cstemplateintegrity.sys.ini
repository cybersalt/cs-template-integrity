PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Mallmedveten integritetsövervakare för Joomla. Installerar <code>com_cstemplateintegrity</code> (admin-komponent + Web Services-API) och <code>plg_webservices_cstemplateintegrity</code> (registrerar komponentens API-rutter). Insticksprogrammet aktiveras automatiskt vid installationen.</p>"


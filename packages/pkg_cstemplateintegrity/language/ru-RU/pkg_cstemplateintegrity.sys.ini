PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Монитор целостности Joomla с пониманием шаблонов. Устанавливает <code>com_cstemplateintegrity</code> (компонент администратора + Web Services API) и <code>plg_webservices_cstemplateintegrity</code> (регистрирует маршруты API компонента). Плагин включается автоматически при установке.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Cybersalt Template Integrity установлен, плагин Web Services включён автоматически. Конечная точка Overrides теперь доступна по адресу /api/index.php/v1/cstemplateintegrity/overrides."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Cybersalt Template Integrity обновлён."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_OPEN="Открыть панель управления"

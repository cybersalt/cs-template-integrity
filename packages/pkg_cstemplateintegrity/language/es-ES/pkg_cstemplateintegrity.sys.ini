PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Monitor de integridad de Joomla con conocimiento de plantillas. Instala <code>com_cstemplateintegrity</code> (componente de administración + API de servicios web) y <code>plg_webservices_cstemplateintegrity</code> (registra las rutas de la API del componente). El plugin se activa automáticamente durante la instalación.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Cybersalt Template Integrity se ha instalado y el plugin de servicios web se ha activado automáticamente. El extremo de anulaciones (Overrides) ya está disponible en /api/index.php/v1/cstemplateintegrity/overrides."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Cybersalt Template Integrity se ha actualizado."

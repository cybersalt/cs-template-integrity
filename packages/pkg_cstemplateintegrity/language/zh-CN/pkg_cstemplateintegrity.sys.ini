PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Template-literate Joomla integrity monitor. Installs <code>com_cstemplateintegrity</code> (admin component + Web Services API) and <code>plg_webservices_cstemplateintegrity</code> (registers the component's API routes). The plugin is enabled automatically on install.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Cybersalt Template Integrity has been installed and the Web Services plugin has been enabled automatically. The Overrides endpoint is now available at /api/index.php/v1/cstemplateintegrity/overrides."

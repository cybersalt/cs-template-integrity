PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Template-bewuste integriteitsmonitor voor Joomla. Installeert <code>com_cstemplateintegrity</code> (beheerderscomponent + Web Services API) en <code>plg_webservices_cstemplateintegrity</code> (registreert de API-routes van de component). De plug-in wordt bij installatie automatisch geactiveerd.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Cybersalt Template Integrity is geïnstalleerd en de Web Services-plug-in is automatisch geactiveerd. Het Overrides-eindpunt is nu beschikbaar op /api/index.php/v1/cstemplateintegrity/overrides."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Cybersalt Template Integrity is bijgewerkt."

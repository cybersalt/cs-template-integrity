PKG_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
PKG_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="<h2>Cybersalt Template Integrity</h2><p>Παρακολούθηση ακεραιότητας Joomla με γνώση των προτύπων. Εγκαθιστά τα <code>com_cstemplateintegrity</code> (στοιχείο διαχείρισης + Web Services API) και <code>plg_webservices_cstemplateintegrity</code> (καταχωρεί τις διαδρομές API του στοιχείου). Το πρόσθετο ενεργοποιείται αυτόματα κατά την εγκατάσταση.</p>"

PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_INSTALLED="Το Cybersalt Template Integrity εγκαταστάθηκε και το πρόσθετο Web Services ενεργοποιήθηκε αυτόματα. Το άκρο Overrides είναι πλέον διαθέσιμο στο /api/index.php/v1/cstemplateintegrity/overrides."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_UPDATED="Το Cybersalt Template Integrity ενημερώθηκε."
PKG_CSTEMPLATEINTEGRITY_POSTINSTALL_OPEN="Άνοιγμα πίνακα ελέγχου"

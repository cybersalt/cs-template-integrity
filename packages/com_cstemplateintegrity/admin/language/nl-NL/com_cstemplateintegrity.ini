COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_API_KEY="Anthropic API-sleutel"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_API_KEY_STATUS="Status"

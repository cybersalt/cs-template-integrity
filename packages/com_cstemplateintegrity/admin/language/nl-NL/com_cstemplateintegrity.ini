COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_CALLED="Aangeroepen:"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_NOKEY="Om vanuit deze admin met Claude te chatten en het fixes voor u te laten toepassen, sla uw Anthropic API-sleutel op onder de <em>Opties</em>-knop van het Dashboard (tabblad AI provider). Zonder opgeslagen sleutel, gebruik de handmatige claude.ai / Claude Code-prompt op het Dashboard om actie te ondernemen op dit rapport."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_TITLE="Claude wordt geraadpleegd…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude leest uw bericht en kan apply-fix- of dismiss-tools aan de serverkant uitvoeren. Dit kan tot een minuut duren. Sluit dit venster niet."

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Ik begrijp: nu herstellen overschrijft het live-bestand. De pre-restore-kopie wordt automatisch opgeslagen als nieuwe back-up."

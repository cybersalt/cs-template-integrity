COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Doorgaan met Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Vertel Claude wat u vervolgens wilt doen. Voor de bevindingen die u in het bovenstaande rapport hebt bevestigd, zeg iets als <em>&ldquo;repareer #1 en #3, negeer de rest&rdquo;</em>. Claude voert het werk aan de serverkant uit en werkt deze thread bij met wat het heeft gedaan. Elke apply-fix maakt eerst automatisch een back-up van het oorspronkelijke bestand, dus alles is omkeerbaar vanuit de weergave Bestandsback-ups."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_PLACEHOLDER="Vertel Claude wat te repareren of te negeren…"

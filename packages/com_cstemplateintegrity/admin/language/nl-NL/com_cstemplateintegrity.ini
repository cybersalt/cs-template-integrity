COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Een Claude-rapport plakken"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Handmatig plakken voor browser-Claude-gebruikers.</strong> Als u de scan-prompt op <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> hebt uitgevoerd, kopieer Claude's antwoord en plak deze hier om op te slaan als sessie. Als u <em>Claude Code</em> (in een terminal) hebt gebruikt, hebt u dit formulier niet nodig — Claude POSTet het rapport automatisch terug naar de site. De sessie krijgt standaard de tijdstempel van vandaag als naam; wijzig dit indien gewenst."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_API_BASE="API-basis-URL"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_AUTOSCAN_CAP="Auto-scan-limiet"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_NO_KEY="Geen Anthropic API-sleutel opgeslagen. Klik op Opties in de werkbalk en voeg er een toe onder het tabblad AI provider, probeer dan opnieuw."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_SUCCESS="Automatische scan voltooid: %1$d override(s) beoordeeld en opgeslagen als sessie #%2$d."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_TRUNCATED="Deze site heeft meer dan %d overrides; de rest vereist een vervolg-uitvoering. Gebruik de handmatige claude.ai / Claude Code-prompt voor eenmalige beoordelingen van onbeperkte grootte."

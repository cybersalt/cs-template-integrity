COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Overrides resetten voor beoordeling"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Hebt u (of een eerdere ontwikkelaar) overrides in het verleden goedgekeurd zonder ze echt te controleren? Klik hier om elk override-bestand terug in de tracker te brengen zodat u elke goed kunt beoordelen met Claude. Nuttig na een 'Alles afwijzen' dat plaatsvond voordat deze tool werd geïnstalleerd."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Loopt door de map <code>html/</code> van elke ingeschakelde template en voegt een rij toe in <code>#__template_overrides</code> voor elk override-bestand dat nog niet wordt gevolgd. Bestaande rijen worden met rust gelaten. Resetrijen verschijnen opnieuw als 'Wijzigingen gevonden'-badges in de Templates-admin zodat u de bovenstaande beoordelingsworkflow ertegen kunt uitvoeren."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Alle overrides resetten voor beoordeling"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Alle overrides resetten voor beoordeling? Elk override-bestand op deze site verschijnt opnieuw in de 'Wijzigingen gevonden'-badges van Templates zodat het opnieuw geëvalueerd kan worden."


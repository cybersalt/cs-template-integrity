COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="cstemplateintegrity-gegevens bekijken"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Staat gebruikers in de overeenkomstige groepen toe overrides, sessies, het actielogboek en back-upinhoud te lezen (admin-weergaven en lees-API-endpoints)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="cstemplateintegrity-gegevens en override-bestanden wijzigen"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Staat gebruikers in de overeenkomstige groepen toe fixes toe te passen, back-ups te herstellen, override-markeringen te negeren, en sessies te maken of te verwijderen. Impliceert Bekijken."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Dashboard"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="API-endpoint actief"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Elke gebruiker met een geldig Joomla API-token en core.manage-permissie op deze component kan de huidige template-override-gegevens van deze site lezen."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="Endpoint-URL"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Over"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API die de native #__template_overrides-tracker beschikbaar stelt zodat Claude (of elke client met een Joomla API-token) elke gemarkeerde override kan beoordelen, classificeren en patches direct kan toepassen. Elke patch wordt eerst automatisch geback-upt naar de database en is omkeerbaar vanuit de weergave Bestandsback-ups."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Versie"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Begin hier."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Dit is de enige kaart die u nodig hebt voor een normale beoordeling. Voer de prompt uit, krijg het rapport, vertel Claude dan in dezelfde chat welke bevindingen te repareren — geen tweede prompt nodig."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Methode 1: beoordeling met Claude.ai of Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="De extensie stelt uw override-gegevens beschikbaar via REST. Combineer ze met Claude (claude.ai of Claude Code) voor een geautomatiseerde beveiligingsbeoordeling van elke gemarkeerde override op deze site, en pas vervolgens de fixes toe die u bevestigt — alles in één chat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Een Joomla API-token genereren (eenmalig)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="In de Joomla-admin: <em>Systeem → Gebruikers → Mijn profiel → tabblad Joomla API-token</em>. Klik op het oogpictogram om het token te onthullen. U hoeft dit slechts één keer te doen — bewaar het token veilig."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Open Claude en plak de prompt hieronder."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Open Claude waar u het gebruikt — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> in een browser, voer <code>claude</code> uit in een terminal (Claude Code), of een andere tool waarin u Claude beschikbaar hebt. Vervang de plaatsaanduiding door het token van stap 1. Site-URL en endpoints zijn al ingevuld voor deze site.<br><br><strong>Alleen claude.ai-gebruikers:</strong> als Claude antwoordt met «Host not in allowlist», blokkeert zijn code-uitvoeringssandbox uw site. Open in claude.ai <em>Instellingen → Mogelijkheden → Code-uitvoering → Netwerktoegang</em> en voeg het domein van deze site toe. <strong>Sluit dan de huidige chat en start een nieuwe</strong> — de lopende chat blijft de oude allowlist gebruiken; alleen een nieuwe chat pakt het zojuist toegevoegde domein op. (Dit geldt voor zowel de Claude desktop-app als de webversie.) Claude Code in een terminal heeft die beperking niet en zal werken zonder wijzigingen."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Verzenden."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude zal de lijst met overrides ophalen, override- en core-bron voor elk ophalen, en een tabel per bevinding produceren plus een eenvoudige samenvatting die u kunt doorsturen."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Vertel Claude wat te repareren — in dezelfde chat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Zodra Claude het rapport heeft geplaatst, zal het vragen welke bevindingen u gerepareerd wilt hebben. Antwoord met degene die u bevestigt (bijv. <em>«repareer #1 en #3, laat #2 met rust, de derde-partij vraag ik aan de ontwikkelaar»</em>). Claude maakt een back-up van elk bestand voor het patchen, dus alles kan worden teruggedraaid. <strong>U hebt de tweede kaart hieronder alleen nodig als u de chat hebt gesloten en er later op wilt terugkomen.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (kopiëren en plakken in Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Scan-prompt kopiëren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Gekopieerd!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="De meeste gebruikers hebben deze kaart NIET nodig."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Gebruik dit alleen als u een <em>nieuwe chat</em> start om fixes van een eerdere beoordeling toe te passen — bijvoorbeeld u hebt de oorspronkelijke chat 's nachts gesloten, u geeft de beoordeling door aan een teamgenoot, of u hebt de scan in claude.ai uitgevoerd en wilt de fixes in Claude Code doen. Als uw scan-chat nog open is, scrol omhoog — praat daar gewoon met Claude."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Een eerdere beoordeling voortzetten in een nieuwe chat"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Plak deze prompt in een nieuwe Claude-chat om hem de context van uw eerdere beoordeling te geven. Hij haalt het rapport van de eerdere sessie op, somt de bevindingen op, en vraagt welke u wilt repareren. Elk bestand wordt geback-upt voor elke patch, dus alles is omkeerbaar."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Fix-prompt kopiëren"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Sessielogboek"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Rapporten ingediend door Claude (of handmatig geplakt) worden hier opgeslagen als sessies. Klik op een sessie om het volledige rapport en de acties die tijdens de sessie liepen te bekijken."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Nog geen sessies. Voer de prompt hierboven uit en laat Claude het rapport automatisch terug-POSTen, of klik op 'Nieuwe sessie' om het te plakken."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Nieuwe sessie"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Alle sessies bekijken"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Na de beoordeling"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Wanneer u klaar bent met handelen op de aanbevelingen van Claude, wilt u de 'Wijzigingen gevonden'-badges wissen die Joomla in Templates toont, zodat ze niet langer de overrides markeren die u al hebt afgehandeld."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Aanbevolen — beoordeling per template"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Open de site-templatelijst. Elke template met een 'Wijzigingen gevonden'-badge kan afzonderlijk worden geopend zodat u de specifieke override-rijen die u hebt afgehandeld kunt afwijzen. Langzamer, maar u behoudt een audittrail per rij."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Site-templatebeheer openen"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="In bulk — alle overrides als beoordeeld markeren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Snellere route: elke rij in de override-tracker in één stap wissen. Doe dit alleen nadat u daadwerkelijk elke bevinding hebt beoordeeld. Equivalent aan het gebruik van Joomla's eigen 'Alles afwijzen' op elke template tegelijk."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Alle als beoordeeld markeren…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Bevestig: alle overrides als beoordeeld markeren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Dit wist elke rij die Joomla momenteel volgt in de override-tracker. De 'Wijzigingen gevonden'-badges in Templates zullen verdwijnen, en het API-endpoint van deze site geeft nul rijen terug totdat de volgende kern-update van Joomla ze opnieuw vult. De actie kan niet ongedaan worden gemaakt behalve door op 'Override-tracker opnieuw opbouwen' hieronder te klikken om opnieuw te scannen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Ik bevestig dat ik elke gemarkeerde override heb beoordeeld en aanvaard de verantwoordelijkheid voor eventuele niet-aangepakte problemen."

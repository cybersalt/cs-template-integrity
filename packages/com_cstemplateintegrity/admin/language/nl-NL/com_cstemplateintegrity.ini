COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Methode 1: Claude.ai of Code gebruiken"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Een kant-en-klare prompt kopiëren en in claude.ai of Claude Code plakken. Werkt zonder API-sleutel. Springt naar de prompt hieronder."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Methode 2: automatische scan uitvoeren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Geeft de override-beoordeling aan Claude door aan de serverkant met behulp van uw opgeslagen Anthropic API-sleutel. Slaat het rapport op als sessie waarmee u kunt chatten. Springt naar de uitvoerknop hieronder."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Sla eerst uw Anthropic API-sleutel op in het Opties-paneel om automatische scans in te schakelen. Gebruik tot dan Methode 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Loop elke ingeschakelde template opnieuw door en bouw de override-tracker opnieuw op. Gebruik dit nadat u templatebestanden buiten Joomla hebt bewerkt, of als de tracker van Joomla verouderd is."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Sleutels &amp; tokens"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Optioneel. Sla hier een Anthropic API-sleutel op zodat de extensie scans automatisch kan uitvoeren — geen kopiëren-en-plakken van de prompt in Claude nodig. Laat leeg om de handmatige claude.ai / Claude Code-workflow op het dashboard te blijven gebruiken."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API-sleutel"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Uw persoonlijke Anthropic API-sleutel (begint met <code>sk-ant-…</code>). Verkrijg er een op <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. De sleutel wordt op deze server opgeslagen en alleen gebruikt om api.anthropic.com namens u aan te roepen. Met een opgeslagen sleutel toont het Dashboard een knop <em>Automatische scan uitvoeren</em> die de override-beoordeling aan de serverkant aan Claude doorgeeft en het rapport terug opslaat als sessie — geen kopiëren-en-plakken nodig."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Elke automatische scan doet één Anthropic API-aanroep met uw sleutel. De prijs is wat Anthropic rekent voor het gebruikte model (standaard Claude Sonnet 4.6). Sites met zeer veel overrides zijn beperkt tot de eerste 60 per uitvoering; voer opnieuw uit voor de rest, of gebruik de handmatige Claude Code-workflow op het dashboard voor onbeperkte grootte."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Scan-model"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Claude-model dat wordt gebruikt voor de eenmalige <em>Automatische scan uitvoeren</em>-aanroep op het dashboard. De scan is een classificatietaak (alert / review / info per bevinding); Haiku doet dat goed voor een fractie van de Sonnet-kosten. Sonnet is de veilige standaardkeuze. Opus is overdreven voor routinescans, maar nuttig als u extra zorgvuldigheid wilt op een beveiligingsgevoelige site."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Chat-model"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Claude-model dat wordt gebruikt voor de chat-met-Claude follow-up op de sessiedetailpagina (waar u Claude vraagt fixes toe te passen of bevindingen te negeren). Tool-gebruik is veeleisender dan classificatie, dus we raden hier Sonnet aan zelfs als u Haiku instelt voor de scan &mdash; tool-aanroepen die Claude verkeerd doet kosten meer dan het prijsverschil tussen modellen."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Joomla API-token (voor de dashboard-prompt)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Optioneel. Genereer een Joomla API-token bij <em>Systeem &rarr; Gebruikers &rarr; Mijn profiel &rarr; Joomla API-token</em> en plak het hier. De scan/fix-prompts van het dashboard vullen het token dan automatisch in op de plaats van de plaatsaanduiding &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, zodat u rechtstreeks kunt kopiëren &amp; plakken naar Claude zonder bewerking.<br><br><strong>Multi-admin waarschuwing:</strong> Joomla API-tokens authenticeren als <em>de gebruiker die ze heeft gegenereerd</em>. Als meerdere admins dit dashboard gebruiken, gebruikt de prompt het hier opgeslagen token &mdash; wat betekent dat Claude de API zal aanroepen geauthenticeerd als die ene gebruiker. Laat leeg zodat elke admin zijn eigen token plakt op gebruiksmoment."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Overrides per scan"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Hoeveel gemarkeerde template-overrides de knop <em>Automatische scan uitvoeren</em> beoordeelt in één enkele Anthropic API-aanroep. Standaard <strong>10</strong>. Bereik 1&ndash;100. <strong>Lager is veiliger voor de chat-follow-up:</strong> het scanrapport groeit met het aantal bevindingen, en de tool-use-loop van de chat behoudt dat rapport als gespreksgeschiedenis. Op Anthropic's lagere rate-limit-tiers (10K input-tokens per minuut) zal een scan van 60 overrides plus een onmiddellijke chat-beurt binnen dezelfde minuut <em>HTTP 429: rate limit exceeded</em> teruggeven. Met 10 overrides per uitvoering blijven uw chat-beurten na de scan comfortabel onder de limiet. Sites met meer overrides dan dat hebben gewoon enkele extra uitvoeringen nodig om alles te dekken &mdash; het rapport van elke uitvoering wordt opgeslagen als zijn eigen sessie, dus u kunt met elke onafhankelijk chatten."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — snelst, laagste kosten (~$1 per 1M input-tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — gebalanceerd, aanbevolen (~$3 per 1M input-tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — meest capabele, duur (~$15 per 1M input-tokens, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>Over het kostenverschil.</strong> Een typische scan op een site met 50 overrides gebruikt ongeveer 60K input-tokens en produceert ongeveer 5K output-tokens. Globale kosten per scan: <strong>~$0,08 met Haiku, ~$0,23 met Sonnet, ~$1,13 met Opus</strong>. Chat-beurten zijn veel kleiner (5K&ndash;10K input-tokens elk), dus de kosten per beurt zijn ongeveer 10&times; lager dan een scan. Anthropic's gepubliceerde prijzen zijn de bron van waarheid op <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; de bovenstaande cijfers zijn benaderingen en kunnen in de loop van de tijd afwijken. Als u nieuw bent met de API, begin met Sonnet en houd uw gebruik in de gaten op <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> voor enkele uitvoeringen voordat u beslist of u upgradet of downgradet."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Componentnavigatie"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Methode 2: automatische scan uitvoeren (met uw opgeslagen Anthropic API-sleutel)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Geen Anthropic API-sleutel opgeslagen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="API-sleutel opgeslagen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="De extensie voert de override-beoordeling uit op de server met uw Anthropic-sleutel, zonder kopiëren-en-plakken. Het rapport wordt automatisch opgeslagen als nieuwe sessie."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Klik hieronder om een scan te starten. De extensie haalt elke gemarkeerde override op deze site op, stuurt deze naar Claude met uw opgeslagen API-sleutel, en slaat het resulterende rapport op als nieuwe sessie. U wordt doorgestuurd naar het rapport wanneer het klaar is."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Eén Anthropic API-aanroep per scan. Sites met meer dan %d overrides worden beperkt tot de eerste %d per uitvoering (configureerbaar in <em>Opties &rarr; AI provider &rarr; Overrides per scan</em>); voer opnieuw uit voor het volgende batch, of gebruik de handmatige claude.ai / Claude Code-workflow hieronder voor onbeperkte grootte. De pagina kan 30&ndash;90 seconden pauzeren terwijl Claude antwoordt &mdash; dat is normaal, navigeer niet weg."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Dit zal de Anthropic API aanroepen met uw opgeslagen sleutel en kan 30 tot 90 seconden duren. Doorgaan?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Automatische scan nu uitvoeren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Klik op <em>Opties</em> in de werkbalk hierboven, plak uw Anthropic API-sleutel onder het tabblad <em>AI provider</em>, en sla op om deze methode in te schakelen. Methode 1 hierboven werkt nog steeds zonder sleutel."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Automatische scan loopt…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Anthropic API wordt aangeroepen en uw overrides worden geanalyseerd. Dit duurt meestal 30 tot 90 seconden. Sluit dit venster niet."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_BUTTON="Diagnose"

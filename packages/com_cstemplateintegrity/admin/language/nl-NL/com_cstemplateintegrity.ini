COM_CSTEMPLATEINTEGRITY_ACTIONS_TITLE="Cybersalt Template Integrity — Actielogboek"
COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Elke administratieve gebeurtenis die de override-tracker, het sessielogboek of de bestandsback-ups heeft geraakt, wordt hier vastgelegd. Alleen-lezen."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Sessies</strong> slaan Claude's beoordelingsrapporten op. <strong>Het actielogboek</strong> is de audittrail van <em>wijzigingen</em> — wanneer overrides werden gereset of gewist, wanneer een sessie werd aangemaakt, wanneer een back-up werd opgeslagen vóór een fix. Als er later iets misgaat op deze site, ziet u hier wat er is gedaan en wanneer."

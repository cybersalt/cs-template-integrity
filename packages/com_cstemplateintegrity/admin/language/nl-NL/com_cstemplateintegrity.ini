COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_SAVED="Opgeslagen"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_NOT_SAVED="Niet opgeslagen"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST="Verbindingstest"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Stuurt een klein testverzoek naar api.anthropic.com met de opgeslagen sleutel. Kost vrijwel niets — verifieert dat de sleutel geldig en bereikbaar is vanaf deze server."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_BUTTON="Test uitvoeren"

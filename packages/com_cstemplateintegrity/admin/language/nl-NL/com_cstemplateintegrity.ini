COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Template-bewuste Joomla integriteitsmonitor. Stelt de native #__template_overrides-tracker beschikbaar via een Joomla Web Services API, zodat Claude (of elke client met een Joomla API-token) elke gemarkeerde override kan beoordelen, classificeren als alert / review / info en patches direct kan toepassen — automatisch geback-upt en omkeerbaar vanuit de admin."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Voordat u begint"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Zorg ervoor dat u een recente back-up van uw website hebt</strong> voordat u deze extensie iets laat veranderen. We raden Akeeba Backup of de back-upfunctie van uw hostingprovider sterk aan.</p><p><strong>Wat deze extensie doet:</strong> ze koppelt uw Joomla-site aan een AI (Claude) om elke gemarkeerde template-override te beoordelen, elke override te classificeren als beveiligingswaarschuwing, cosmetisch verschil of legitieme aanpassing, en de patches die u bevestigt toe te passen. Elke patch wordt eerst automatisch geback-upt naar de database, dus individuele wijzigingen zijn omkeerbaar — maar een volledige site-back-up blijft uw vangnet voor al het andere.</p><p><strong>AI kan fouten maken.</strong> Claude kan iets verkeerd classificeren of een patch voorstellen die een functie breekt. Lees altijd wat wordt voorgesteld voordat u «ja, pas toe» zegt, en test de site nadat de fixes zijn toegepast.</p><p><strong>Niet zeker?</strong> Als u zich niet op uw gemak voelt met deze tool, mail Tim op <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> en laten we praten — we kunnen u erdoor leiden, of de beoordeling voor u doen.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Dit niet meer tonen"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Begrepen — doorgaan"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Te veel automatische scans in het afgelopen uur (limiet: %d). Wacht enkele minuten voordat u opnieuw probeert, of gebruik de handmatige claude.ai / Claude Code-workflow op het dashboard."


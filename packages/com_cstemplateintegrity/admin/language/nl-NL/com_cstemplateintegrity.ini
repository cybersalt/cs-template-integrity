COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Deze back-up herstellen"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Overschrijft het live-bestand op het pad hierboven met de geback-upte inhoud. Vóór het schrijven wordt de huidige inhoud op dat pad opgeslagen als nieuwe back-up, zodat dit herstel zelf omkeerbaar is — als het misgaat, maak het ongedaan door de nieuwe pre-restore back-up te herstellen."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="Het bestand wordt geschreven via PHP vanaf deze admin-pagina; geen FTP nodig. De webgebruiker moet schrijftoegang hebben tot het doelpad. De Joomla-siteroot is de grens — herstel weigert buiten te schrijven."

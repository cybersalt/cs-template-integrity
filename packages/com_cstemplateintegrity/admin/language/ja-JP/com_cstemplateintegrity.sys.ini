COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="テンプレートを理解する Joomla 整合性モニターです。Joomla ネイティブの #__template_overrides トラッカーを Joomla Web Services API 経由で公開し、Claude（または Joomla API トークンを持つ任意のクライアント）がフラグ付きのオーバーライドをすべてレビューし、アラート / レビュー / 情報として分類して、その場でパッチを適用できるようにします。すべてのパッチは自動的にバックアップされ、管理画面から元に戻すことができます。"


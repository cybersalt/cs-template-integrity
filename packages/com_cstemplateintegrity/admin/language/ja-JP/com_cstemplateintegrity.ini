COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="テンプレートを理解する Joomla 整合性モニターです。Joomla ネイティブの #__template_overrides トラッカーを Joomla Web Services API 経由で公開し、Claude（または Joomla API トークンを持つ任意のクライアント）がフラグ付きのオーバーライドをすべてレビューし、アラート / レビュー / 情報として分類して、その場でパッチを適用できるようにします。すべてのパッチは自動的にバックアップされ、管理画面から元に戻すことができます。"

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="開始する前に"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>この拡張機能に変更を加えさせる前に、ウェブサイトの最新のバックアップがあることを必ず確認してください。</strong> Akeeba Backup またはホスティング業者のバックアップ機能を強くお勧めします。</p><p><strong>この拡張機能の動作:</strong> Joomla サイトを AI（Claude）と連携させ、フラグ付きのテンプレートオーバーライドをすべてレビューし、それぞれをセキュリティアラート、外観上の差分、または正当なカスタマイズとして分類し、お客様が確認したパッチを適用します。すべてのパッチは事前にデータベースへ自動的にバックアップされるため、個別の変更は元に戻すことができますが、それ以外のすべてに対する安全策として、サイト全体のバックアップは依然として必要です。</p><p><strong>AI は間違いを犯すことがあります。</strong> Claude が分類を誤ったり、機能を壊すパッチを提案したりする可能性があります。「はい、適用してください」と言う前に必ず提案内容を確認し、修正適用後にサイトをテストしてください。</p><p><strong>不安な場合は</strong> このツールの使用に不安がある場合は、Tim まで <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> にメールでご連絡ください。ご案内するか、レビューを代行いたします。</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="今後表示しない"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="理解しました — 続行"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="過去1時間に自動スキャンが多すぎます（上限: %d）。数分待ってから再試行するか、ダッシュボードの手動 claude.ai / Claude Code ワークフローをご利用ください。"


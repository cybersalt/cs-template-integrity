COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="ほとんどのユーザーにこのカードは必要ありません。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="これは、以前のレビューからの修正を適用するために <em>新しいチャット</em> を開始する場合にのみ使用してください — 例えば、元のチャットを夜間に閉じた、レビューをチームメイトに引き継ぐ、claude.ai でスキャンを実行して Claude Code で修正を行いたい、などです。スキャンチャットがまだ開いている場合は、上にスクロールして — そこで Claude に話しかけるだけです。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="新しいチャットで以前のレビューを継続"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="このプロンプトを新しい Claude チャットに貼り付けて、以前のレビューのコンテキストを与えます。前のセッションレポートを取得し、所見を一覧表示し、どれを修正するか尋ねます。各ファイルはパッチ適用前にバックアップされるので、何でも元に戻せます。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="修正プロンプトをコピー"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="セッションログ"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="レビュー後"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Claude の推奨事項への対応が完了したら、Joomla がテンプレートに表示する「変更が見つかりました」バッジをクリアして、すでに対応済みのオーバーライドが引き続きフラグ付けされないようにしましょう。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="推奨 — テンプレート単位のレビュー"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="サイトテンプレートのリストを開きます。「変更が見つかりました」バッジが付いた各テンプレートを個別に開いて、対応した特定のオーバーライド行を却下できます。遅いですが、行ごとの監査証跡を維持できます。"

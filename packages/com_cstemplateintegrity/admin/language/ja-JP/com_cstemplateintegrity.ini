COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="エンドポイント URL"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="概要"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="ネイティブの #__template_overrides トラッカーを公開する Web Services API です。Claude（または Joomla API トークンを持つ任意のクライアント）がフラグ付きオーバーライドをすべてレビューし、分類し、その場でパッチを適用できます。すべてのパッチは事前にデータベースへ自動バックアップされ、ファイルバックアップビューから元に戻すことができます。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="バージョン"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="ここから始めてください。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="通常のレビューに必要なのはこのカードだけです。プロンプトを実行してレポートを取得し、同じチャット内で Claude にどの所見を修正するか伝えるだけです — 2 つ目のプロンプトは不要です。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="方法 1: Claude.ai または Claude Code を使用してレビュー"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="拡張機能はオーバーライドデータを REST 経由で公開します。Claude（claude.ai または Claude Code）と組み合わせることで、このサイトのフラグ付きオーバーライドすべてに対する自動セキュリティレビューを取得し、確認した修正を適用できます — すべて 1 つのチャット内で完結します。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Joomla API トークンを生成する（一度きり）。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="Joomla 管理画面で: <em>システム → ユーザー → マイプロフィール → Joomla API トークン</em> タブ。目のアイコンをクリックしてトークンを表示します。これは一度だけ行えば十分です — トークンは安全な場所に保管してください。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Claude を開いて以下のプロンプトを貼り付ける。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="お使いの場所で Claude を開いてください — ブラウザの <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>、ターミナルでの <code>claude</code> 実行（Claude Code）、または Claude が利用できる任意の他のツール。プレースホルダーをステップ 1 のトークンに置き換えてください。サイト URL とエンドポイントはこのサイト用に既に入力済みです。<br><br><strong>claude.ai ユーザーのみ:</strong> Claude が「Host not in allowlist」と返答する場合、コード実行サンドボックスがお客様のサイトをブロックしています。claude.ai で <em>設定 → 機能 → コード実行 → ネットワークアクセス</em> を開き、このサイトのドメインを追加してください。<strong>その後、現在のチャットを閉じて新しいチャットを開始してください</strong> — 実行中のチャットは古い許可リストを使用し続けます。新しく追加されたドメインは新しいチャットでのみ反映されます。（これは Claude デスクトップアプリと Web 版の両方に当てはまります。）ターミナルの Claude Code にはそのような制限はなく、変更なしで動作します。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="送信。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude はオーバーライドのリストを取得し、各オーバーライドのオーバーライド版とコア版のソースを取得し、所見ごとの表と転送可能な平易な言葉のサマリーを作成します。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="同じチャット内で、修正対象を Claude に伝える。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Claude がレポートを投稿すると、どの所見を修正したいか尋ねられます。確認したものを返答してください（例: <em>「#1 と #3 を修正、#2 はそのまま、サードパーティのものは開発者に確認します」</em>）。Claude はパッチ適用前に各ファイルをバックアップするので、何でもロールバック可能です。<strong>以下の 2 つ目のカードは、チャットを閉じて後で戻ってきたい場合にのみ必要です。</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="プロンプト（コピーして Claude に貼り付け）:"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="お客様（または以前の開発者）が過去に十分に確認せずにオーバーライドを承認したことはありませんか？ ここをクリックして、すべてのオーバーライドファイルをトラッカーに戻し、Claude で各ファイルを適切にレビューできるようにします。このツールがインストールされる前に行われた「すべて却下」の後に有用です。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="有効なすべてのテンプレートの <code>html/</code> フォルダーを走査し、まだ追跡されていないオーバーライドファイルについて <code>#__template_overrides</code> に行を挿入します。既存の行はそのまま残します。リセットされた行はテンプレート管理画面で「変更が見つかりました」バッジとして再表示されるので、上記のレビューワークフローを実行できます。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="すべてのオーバーライドをレビュー対象としてリセット"

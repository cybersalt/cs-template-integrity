COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="一括 — すべてのオーバーライドをレビュー済みとしてマーク"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="より速い方法: オーバーライドトラッカーのすべての行を一度にクリアします。各所見を実際にレビューした後にのみ実行してください。Joomla 自体の「すべて却下」をすべてのテンプレートに対して一度に使用するのと同等です。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="すべてレビュー済みとしてマーク…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="確認: すべてのオーバーライドをレビュー済みとしてマーク"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="これにより、Joomla が現在オーバーライドトラッカーで追跡しているすべての行がクリアされます。テンプレートの「変更が見つかりました」バッジは消え、このサイトの API エンドポイントは Joomla の次のコア更新で再投入されるまで 0 行を返します。このアクションは、以下の「オーバーライドトラッカーを再構築」をクリックして再スキャンする以外には元に戻すことができません。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="フラグ付きの全オーバーライドをレビュー済みであり、未対応の問題に対する責任を受け入れることを確認します。"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="上記のパスのライブファイルをバックアップされた内容で上書きします。書き込み前に、そのパスの現在の内容が新しいバックアップとして保存されるので、この復元自体も元に戻せます &mdash; うまくいかない場合は、復元前の新しいバックアップを復元することで取り消せます。"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="ファイルはこの管理ページから PHP 経由で書き込まれます。FTP は不要です。Web ユーザーは対象パスへの書き込み権限が必要です。Joomla サイトのルートが境界です &mdash; 復元はその外への書き込みを拒否します。"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_BUTTON="今すぐ復元…"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="確認: バックアップを復元"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_BODY="復元すると、%s のライブファイルが上記のバックアップ内容で上書きされます。現在の内容は最初に新しいバックアップとして保存されるため、この操作は元に戻すことができます。"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="理解しました: 今すぐ復元するとライブファイルが上書きされます。復元前のコピーは新しいバックアップとして自動保存されます。"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="はい — 復元する"

COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_TITLE="手動で復元（FTP / エディター）"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="拡張機能にディスクへ書き込ませたくない場合:"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="上の <em>バックアップをダウンロード</em> をクリック（またはバックアップ内容ブロックをコピー）してください。"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="FTP クライアント、SFTP クライアント、またはホスティングのファイルマネージャーを開いてください。"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="以下の宛先パスのファイルをダウンロードしたコピーで置き換えてください。"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_DESTINATION="サーバー上の宛先パス"

COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="このバックアップの保存場所"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="バックアップ内容はディスクではなくデータベースに保存されます。具体的には <code>#__cstemplateintegrity_backups</code> テーブルです &mdash; <code>contents_b64</code> カラムにファイル内容が base64 エンコードで保持されています。"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="つまり、データベースバックアップにもこれらが含まれます。コンポーネントをアンインストールすると、テーブルが保存されたすべてのバックアップとともに削除されます。"

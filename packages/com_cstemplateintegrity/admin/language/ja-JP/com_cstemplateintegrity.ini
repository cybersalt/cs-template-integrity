COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="方法 1: Claude.ai または Code を使用"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="あらかじめ用意されたプロンプトをコピーして claude.ai または Claude Code に貼り付けます。API キーがなくても動作します。下のプロンプトに移動します。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="方法 2: 自動スキャンを実行"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="保存された Anthropic API キーを使用して、オーバーライドのレビューをサーバー側の Claude に任せます。レポートはチャット可能なセッションとして保存されます。下の実行ボタンに移動します。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="自動スキャンを有効にするには、まずオプションパネルで Anthropic API キーを保存してください。それまでは方法 1 をご利用ください。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="有効なすべてのテンプレートを再走査し、オーバーライドトラッカーを再構築します。Joomla の外でテンプレートファイルを編集した後、または Joomla のトラッカーが古い場合に使用してください。"

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="キー &amp; トークン"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="任意。ここに Anthropic API キーを保存すると、拡張機能がスキャンを自動実行できます — Claude にプロンプトをコピー&ペーストする必要はありません。空欄のままにすると、ダッシュボードの手動 claude.ai / Claude Code ワークフローが引き続き利用できます。"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API キー"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="お客様個人の Anthropic API キー（<code>sk-ant-…</code> で始まります）。<a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a> から取得できます。キーはこのサーバーに保存され、お客様に代わって api.anthropic.com を呼び出すためだけに使用されます。キーが保存されていると、ダッシュボードに <em>自動スキャンを実行</em> ボタンが表示され、オーバーライドのレビューをサーバー側の Claude に任せ、レポートをセッションとして保存し直します — コピー&ペーストは不要です。"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="自動スキャンごとに、お客様のキーで 1 回の Anthropic API 呼び出しが行われます。料金は使用するモデルに対して Anthropic が請求する金額です（デフォルトは Claude Sonnet 4.6）。オーバーライドの数が非常に多いサイトでは、1 回の実行につき先頭 60 件までに制限されます。残りは再実行するか、無制限のサイズに対応するためにダッシュボードの手動 Claude Code ワークフローを使用してください。"

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="スキャンモデル"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="ダッシュボード上のワンショット <em>自動スキャンを実行</em> 呼び出しに使用される Claude モデルです。スキャンは分類タスク（所見ごとにアラート / レビュー / 情報）であり、Haiku は Sonnet のごく一部のコストで十分処理できます。Sonnet は安全なデフォルトです。Opus は通常のスキャンには過剰ですが、セキュリティに敏感なサイトでより厳密さを求める場合に有用です。"

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="チャットモデル"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="セッション詳細ページ（Claude に修正の適用や所見の却下を依頼する場所）での Claude とのチャットによるフォローアップに使用される Claude モデルです。ツール使用は分類よりも要求が高いため、スキャンモデルを Haiku に設定している場合でも、ここでは Sonnet を推奨します &mdash; Claude がツール呼び出しを誤ると、モデルの価格差以上のコストがかかります。"

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Joomla API トークン（ダッシュボードプロンプト用）"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="任意。<em>システム &rarr; ユーザー &rarr; マイプロフィール &rarr; Joomla API トークン</em> で Joomla API トークンを生成し、ここに貼り付けてください。ダッシュボードのスキャン / 修正プロンプトは、&ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo; プレースホルダーの代わりにトークンを自動的に埋め込むので、編集なしで Claude に直接コピー &amp; ペーストできます。<br><br><strong>複数管理者に関する注意:</strong> Joomla API トークンは <em>それを生成したユーザー</em> として認証されます。複数の管理者がこのダッシュボードを使用する場合、プロンプトはここに保存されているトークンを使用します &mdash; つまり Claude はその 1 人のユーザーとして API を認証して呼び出します。各管理者が使用時に自身のトークンを貼り付けるようにするには、空欄のままにしてください。"

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="スキャンごとのオーバーライド数"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="<em>自動スキャンを実行</em> ボタンが 1 回の Anthropic API 呼び出しでレビューする、フラグ付きテンプレートオーバーライドの数です。デフォルトは <strong>10</strong>。範囲は 1&ndash;100。<strong>低い方がチャットフォローアップに安全です:</strong> スキャンレポートは所見の数に応じて大きくなり、チャットのツール使用ループはそのレポートを会話履歴として保持します。Anthropic の低位レート制限ティア（毎分 10K 入力トークン）では、60 件のオーバーライドスキャンに加えて同じ分内に即座にチャットターンを行うと <em>HTTP 429: rate limit exceeded</em> が返されます。1 回あたり 10 件のオーバーライドであれば、スキャン後のチャットターンは制限内に余裕を持って収まります。これより多くのオーバーライドがあるサイトでも、すべてをカバーするには数回再実行するだけで済みます &mdash; 各実行のレポートはそれぞれ独自のセッションとして保存されるため、それぞれと独立してチャットできます。"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — 最速、最低コスト（入力トークン 100 万あたり約 $1）"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — バランス型、推奨（入力トークン 100 万あたり約 $3）"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — 最高性能、高価（入力トークン 100 万あたり約 $15、Sonnet の 5 倍）"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>コスト差について。</strong> 50 件のオーバーライドがあるサイトでの典型的なスキャンは、約 60K の入力トークンを使用し、約 5K の出力トークンを生成します。スキャンあたりの概算コスト: <strong>Haiku で約 $0.08、Sonnet で約 $0.23、Opus で約 $1.13</strong>。チャットターンははるかに小さく（各 5K&ndash;10K 入力トークン）、ターンあたりのコストはスキャンの約 10 分の 1 です。Anthropic の公開価格が信頼できる情報源です: <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; 上記の数値は概算であり、時間の経過とともに変動する可能性があります。API を初めて使用する場合は、Sonnet から始めて、アップグレードまたはダウングレードを決定する前に、数回の実行について <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> で使用量を確認してください。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="コンポーネントナビゲーション"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="方法 2: 自動スキャンを実行（保存された Anthropic API キーを使用）"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="API キーが保存されています。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="拡張機能はお客様の Anthropic キーを使用してサーバー上でオーバーライドレビューを実行します。コピー&ペーストは不要です。レポートは新しいセッションとして自動的に保存されます。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="下をクリックしてスキャンを開始します。拡張機能はこのサイト上のフラグ付きオーバーライドをすべて取得し、保存された API キーで Claude に送信し、結果のレポートを新しいセッションとして保存します。完了するとレポートにリダイレクトされます。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="スキャンごとに 1 回の Anthropic API 呼び出しが行われます。オーバーライドが %d 件を超えるサイトでは、1 回の実行につき先頭 %d 件までに制限されます（<em>オプション &rarr; AI プロバイダー &rarr; スキャンごとのオーバーライド数</em> で設定可能）。次のバッチについては再実行するか、無制限のサイズに対応するために以下の手動 claude.ai / Claude Code ワークフローを使用してください。Claude が応答する間、ページが 30&ndash;90 秒一時停止する場合があります &mdash; これは正常です、移動しないでください。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="これは保存されたキーで Anthropic API を呼び出し、30 秒から 90 秒かかる場合があります。続行しますか？"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="今すぐ自動スキャンを実行"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="上のツールバーで <em>オプション</em> をクリックし、<em>AI プロバイダー</em> タブの下に Anthropic API キーを貼り付けて保存し、この方法を有効にしてください。上の方法 1 はキーがなくても引き続き動作します。"


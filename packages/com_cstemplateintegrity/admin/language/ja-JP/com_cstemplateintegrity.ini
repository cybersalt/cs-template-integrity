COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="セッションはまだありません。上記のプロンプトを実行し、Claude にレポートを自動的に POST させるか、「新しいセッション」をクリックして貼り付けてください。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="新しいセッション"

COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>As sessões</strong> armazenam os relatórios de revisão do Claude. <strong>O registro de ações</strong> é a trilha de auditoria das <em>alterações</em> — quando sobreposições foram redefinidas ou limpas, quando uma sessão foi criada, quando um backup foi salvo antes de uma correção. Se algo der errado neste site mais tarde, é aqui que você verá o que foi feito e quando."

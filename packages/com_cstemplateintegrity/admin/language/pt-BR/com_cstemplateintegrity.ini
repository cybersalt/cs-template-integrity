COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Onde este backup mora"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="O conteúdo dos backups é armazenado no banco de dados, não em disco. Especificamente, na tabela <code>#__cstemplateintegrity_backups</code> — a coluna <code>contents_b64</code> contém o conteúdo do arquivo codificado em base64."

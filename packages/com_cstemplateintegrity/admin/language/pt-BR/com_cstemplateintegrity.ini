COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Método 1: usar Claude.ai ou Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Copiar um prompt pronto e colar no claude.ai ou Claude Code. Funciona sem chave API. Salta para o prompt abaixo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Método 2: executar varredura automática"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Delega a revisão de sobreposições ao Claude do lado do servidor usando sua chave API Anthropic salva. Salva o relatório como uma sessão com a qual você pode conversar. Salta para o botão de execução abaixo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Salve primeiro sua chave API Anthropic no painel Opções para ativar varreduras automáticas. Enquanto isso, use o Método 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Percorrer novamente cada template ativado e reconstruir o rastreador de sobreposições. Use isto após editar arquivos de template fora do Joomla, ou se o rastreador do Joomla estiver desatualizado."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Chaves &amp; tokens"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Opcional. Salve aqui uma chave API Anthropic para que a extensão possa executar varreduras automaticamente — sem precisar copiar e colar o prompt no Claude. Deixe em branco para continuar usando o fluxo manual claude.ai / Claude Code no painel."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Chave API Anthropic"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Sua chave API Anthropic pessoal (começa com <code>sk-ant-…</code>). Obtenha uma em <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. A chave é armazenada neste servidor e usada apenas para chamar api.anthropic.com em seu nome. Com uma chave salva, o painel exibe um botão <em>Executar varredura automática</em> que delega a revisão de sobreposições ao Claude do lado do servidor e salva o relatório como sessão — sem copiar e colar."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Cada varredura automática faz uma chamada à API Anthropic com sua chave. O preço é o que a Anthropic cobra pelo modelo usado (padrão Claude Sonnet 4.6). Sites com muitas sobreposições são limitados às primeiras 60 por execução; execute novamente para o resto, ou use o fluxo manual Claude Code no painel para tamanho ilimitado."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Modelo de varredura"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Modelo Claude usado para a chamada única <em>Executar varredura automática</em> no painel. A varredura é uma tarefa de classificação (alert / review / info por descoberta); o Haiku lida bem com isso por uma fração do custo do Sonnet. Sonnet é a opção padrão segura. Opus é exagerado para varreduras de rotina, mas útil se você quer rigor extra em um site sensível à segurança."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Modelo de chat"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Modelo Claude usado para o chat-com-Claude de acompanhamento na página de detalhe da sessão (onde você pede ao Claude para aplicar correções ou descartar descobertas). O uso de ferramentas é mais exigente que classificação, então recomendamos Sonnet aqui mesmo se você definir Haiku para a varredura &mdash; chamadas a ferramentas que o Claude erra custam mais que a diferença de preço entre modelos."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Token API Joomla (para o prompt do painel)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Opcional. Gere um token API Joomla em <em>Sistema &rarr; Usuários &rarr; Meu Perfil &rarr; Token API Joomla</em> e cole aqui. Os prompts de varredura/correção do painel preencherão o token automaticamente no lugar do placeholder &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, então você pode copiar &amp; colar diretamente no Claude sem editar.<br><br><strong>Aviso multi-admin:</strong> tokens API Joomla autenticam como <em>o usuário que os gerou</em>. Se vários admins usam este painel, o prompt usará o token salvo aqui &mdash; o que significa que o Claude chamará a API autenticado como aquele único usuário. Deixe em branco para que cada admin cole seu próprio token na hora do uso."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Sobreposições por varredura"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Quantas sobreposições de template sinalizadas o botão <em>Executar varredura automática</em> revisa em uma única chamada à API Anthropic. Padrão <strong>10</strong>. Faixa 1&ndash;100. <strong>Mais baixo é mais seguro para o chat de acompanhamento:</strong> o relatório de varredura cresce com o número de descobertas, e o loop de uso de ferramentas do chat persiste esse relatório como histórico de conversa. Nos níveis inferiores de limite de taxa da Anthropic (10K tokens de entrada por minuto), uma varredura de 60 sobreposições mais um turno de chat imediato no mesmo minuto retornará <em>HTTP 429: rate limit exceeded</em>. Com 10 sobreposições por execução, seus turnos de chat pós-varredura ficam confortavelmente abaixo do limite. Sites com mais sobreposições do que isso só precisam de algumas execuções a mais para cobrir tudo &mdash; o relatório de cada execução é salvo como sua própria sessão, então você pode conversar com cada uma de forma independente."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — o mais rápido, custo mais baixo (~US$1 por 1M de tokens de entrada)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — equilibrado, recomendado (~US$3 por 1M de tokens de entrada)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — o mais capaz, caro (~US$15 por 1M de tokens de entrada, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>Sobre a diferença de custo.</strong> Uma varredura típica em um site com 50 sobreposições usa cerca de 60K tokens de entrada e produz cerca de 5K tokens de saída. Custo aproximado por varredura: <strong>~US$0,08 com Haiku, ~US$0,23 com Sonnet, ~US$1,13 com Opus</strong>. Turnos de chat são muito menores (5K&ndash;10K tokens de entrada cada), então o custo por turno é cerca de 10&times; menor que uma varredura. Os preços publicados pela Anthropic são a fonte da verdade em <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; os números acima são aproximados e podem variar com o tempo. Se você é novo na API, comece com Sonnet e fique de olho no seu uso em <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> por algumas execuções antes de decidir subir ou descer."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Navegação do componente"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Método 2: executar varredura automática (com sua chave API Anthropic salva)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Nenhuma chave API Anthropic salva."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="Chave API salva."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="A extensão executará a revisão de sobreposições no servidor usando sua chave Anthropic, sem copiar e colar. O relatório é salvo automaticamente como uma nova sessão."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Clique abaixo para iniciar uma varredura. A extensão busca cada sobreposição sinalizada neste site, envia ao Claude com sua chave API salva, e salva o relatório resultante como uma nova sessão. Você será redirecionado ao relatório quando terminar."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Uma chamada à API Anthropic por varredura. Sites com mais de %d sobreposições são limitados às primeiras %d por execução (configurável em <em>Opções &rarr; AI provider &rarr; Sobreposições por varredura</em>); execute novamente para o próximo lote, ou use o fluxo manual claude.ai / Claude Code abaixo para tamanho ilimitado. A página pode pausar por 30&ndash;90 segundos enquanto o Claude responde &mdash; é normal, não navegue para fora."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Isto chamará a API Anthropic com sua chave salva e pode levar de 30 a 90 segundos. Continuar?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Executar varredura automática agora"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Clique em <em>Opções</em> na barra de ferramentas acima, cole sua chave API Anthropic na aba <em>AI provider</em> e Salve para ativar este método. O Método 1 acima continua funcionando sem chave."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Varredura automática em andamento…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Chamando a API Anthropic e analisando suas sobreposições. Isso geralmente leva de 30 a 90 segundos. Por favor, não feche esta janela."


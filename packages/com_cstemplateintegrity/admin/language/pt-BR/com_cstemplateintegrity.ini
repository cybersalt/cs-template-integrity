COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="O arquivo é gravado via PHP a partir desta página admin; sem necessidade de FTP. O usuário web deve ter permissão de gravação no caminho de destino. A raiz do site Joomla é o limite — a restauração se recusa a gravar fora dela."

COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Ver dados de cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Permite que usuários dos grupos correspondentes leiam sobreposições, sessões, registro de ações e conteúdo de backups (visualizações admin e endpoints API de leitura)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Modificar dados de cstemplateintegrity e arquivos de sobreposição"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Permite que usuários dos grupos correspondentes apliquem correções, restaurem backups, descartem sinalizações de sobreposição, e criem ou excluam sessões. Implica Ver."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Painel"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="Endpoint API ativo"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Qualquer usuário com um token API Joomla válido e permissão core.manage neste componente pode ler os dados atuais de sobreposição de template deste site."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="URL do endpoint"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Sobre"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="API Web Services expondo o rastreador nativo #__template_overrides para que o Claude (ou qualquer cliente com um token API Joomla) possa revisar cada sobreposição sinalizada, classificá-la e aplicar correções no local. Cada correção é primeiro salva automaticamente no banco de dados e reversível na visualização Backups de arquivos."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Versão"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Comece aqui."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Este é o único cartão que você precisa para uma revisão normal. Execute o prompt, obtenha o relatório, depois diga ao Claude no mesmo chat quais descobertas corrigir — sem necessidade de um segundo prompt."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Método 1: revisão usando Claude.ai ou Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="A extensão expõe seus dados de sobreposição via REST. Combine-a com o Claude (claude.ai ou Claude Code) para obter uma revisão de segurança automatizada de cada sobreposição sinalizada neste site, depois aplique as correções que confirmar — tudo em um único chat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Gerar um token API Joomla (uma única vez)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="No admin Joomla: <em>Sistema → Usuários → Meu Perfil → aba Token API Joomla</em>. Clique no ícone de olho para revelar o token. Você só precisa fazer isso uma vez — guarde o token em local seguro."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Abrir o Claude e colar o prompt abaixo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Abra o Claude onde você usa — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> em um navegador, execute <code>claude</code> em um terminal (Claude Code), ou qualquer outra ferramenta onde tenha o Claude disponível. Substitua o placeholder pelo token do passo 1. URL do site e endpoints já estão preenchidos para este site.<br><br><strong>Apenas usuários do claude.ai:</strong> se o Claude responder com «Host not in allowlist», o sandbox de execução de código dele está bloqueando seu site. No claude.ai, abra <em>Configurações → Recursos → Execução de código → Acesso à rede</em> e adicione o domínio deste site. <strong>Depois feche o chat atual e inicie um novo</strong> — o chat em andamento continua usando a allowlist antiga; apenas um chat novo pega o domínio recém-adicionado. (Vale tanto para o app desktop Claude quanto para a versão web.) O Claude Code em um terminal não tem essa restrição e funcionará sem alterações."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Enviar."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="O Claude buscará a lista de sobreposições, fará fetch da sobreposição e da fonte do core para cada uma, e produzirá uma tabela por descoberta mais um resumo em linguagem simples que você pode encaminhar."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Diga ao Claude o que corrigir — no mesmo chat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Uma vez que o Claude postar o relatório, ele perguntará quais descobertas você quer corrigir. Responda com as que confirmar (por ex. <em>«corrige #1 e #3, deixa #2 em paz, a de terceiros eu pergunto ao desenvolvedor»</em>). O Claude faz backup de cada arquivo antes de aplicar o patch, então tudo pode ser desfeito. <strong>Você só precisa do segundo cartão abaixo se fechou o chat e quer voltar a ele mais tarde.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (copiar e colar no Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Copiar prompt de varredura"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Copiado!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="A maioria dos usuários NÃO precisa deste cartão."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Use isto apenas se estiver iniciando um <em>chat novo</em> para aplicar correções de uma revisão anterior — por exemplo você fechou o chat original durante a noite, está passando a revisão para um colega, ou executou a varredura no claude.ai e quer fazer as correções no Claude Code. Se seu chat de varredura ainda está aberto, role para cima — apenas converse com o Claude lá."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Continuar uma revisão anterior em um novo chat"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Cole este prompt em um chat novo do Claude para dar a ele o contexto da sua revisão anterior. Ele buscará o relatório da sessão anterior, listará as descobertas e perguntará quais corrigir. Cada arquivo é salvo antes de qualquer patch, então tudo é reversível."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Copiar prompt de correção"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Registro de sessões"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Os relatórios enviados pelo Claude (ou colados manualmente) são salvos aqui como sessões. Clique em uma sessão para ver o relatório completo e as ações executadas durante ela."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Ainda não há sessões. Execute o prompt acima e deixe o Claude POSTar o relatório automaticamente, ou clique em 'Nova sessão' para colar."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Nova sessão"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Ver todas as sessões"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Após a revisão"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Quando você terminar de agir nas recomendações do Claude, vai querer limpar os badges 'Alterações encontradas' que o Joomla mostra em Templates para que não continuem sinalizando as sobreposições que você já tratou."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Recomendado — revisão por template"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Abra a lista de templates do site. Cada template com um badge 'Alterações encontradas' pode ser aberto individualmente para que você descarte as linhas de sobreposição específicas que tratou. Mais lento, mas você mantém uma trilha de auditoria por linha."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Abrir gerenciamento de templates do site"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Em massa — marcar todas as sobreposições como revisadas"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Caminho mais rápido: limpar cada linha do rastreador de sobreposições em um único passo. Faça isso apenas após ter de fato revisado cada descoberta. Equivalente a usar o 'Descartar tudo' do Joomla em cada template de uma vez."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Marcar todas como revisadas…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Confirmar: marcar todas as sobreposições como revisadas"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Isto limpa cada linha que o Joomla está atualmente rastreando no rastreador de sobreposições. Os badges 'Alterações encontradas' em Templates desaparecerão, e o endpoint API deste site retornará zero linhas até a próxima atualização do core do Joomla repopulá-los. A ação não pode ser desfeita exceto clicando em 'Reconstruir rastreador de sobreposições' abaixo para varrer novamente."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Confirmo que revisei cada sobreposição sinalizada e aceito a responsabilidade por quaisquer problemas não tratados."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Sim — marcar todas como revisadas"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="%d linha(s) de sobreposição marcada(s) como revisada(s) e limpa(s) do rastreador."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="Não havia linhas de sobreposição para limpar."

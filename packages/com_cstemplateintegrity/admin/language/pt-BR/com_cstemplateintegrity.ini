COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Redefinir sobreposições para revisão"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Você (ou um desenvolvedor anterior) já aprovou sobreposições no passado sem realmente verificá-las? Clique aqui para trazer cada arquivo de sobreposição de volta ao rastreador para que possa revisar cada um corretamente com o Claude. Útil após um 'Descartar tudo' que aconteceu antes da instalação desta ferramenta."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Percorre a pasta <code>html/</code> de cada template ativado e insere uma linha em <code>#__template_overrides</code> para qualquer arquivo de sobreposição que ainda não esteja sendo rastreado. Linhas existentes são deixadas intactas. As linhas redefinidas reaparecem como badges 'Alterações encontradas' no admin de Templates para que você possa executar o fluxo de revisão acima contra elas."

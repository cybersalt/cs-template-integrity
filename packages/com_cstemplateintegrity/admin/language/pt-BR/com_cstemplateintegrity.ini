COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Monitor de integridade Joomla voltado para sobreposições de template. Expõe o rastreador nativo #__template_overrides através de uma API Web Services do Joomla, para que o Claude (ou qualquer cliente com um token API Joomla) possa revisar cada sobreposição sinalizada, classificá-la como alert / review / info e aplicar correções no local — com backup automático e reversíveis a partir do admin."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Antes de começar"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Por favor, certifique-se de ter um backup recente do seu site</strong> antes de permitir que esta extensão modifique qualquer coisa. Recomendamos fortemente o Akeeba Backup ou o recurso de backup do seu provedor de hospedagem.</p><p><strong>O que esta extensão faz:</strong> ela combina seu site Joomla com uma IA (Claude) para revisar cada sobreposição de template sinalizada, classificar cada uma como alerta de segurança, diferença cosmética ou personalização legítima, e aplicar as correções que você confirmar. Cada correção é primeiro salva automaticamente no banco de dados, então as alterações individuais são reversíveis — mas um backup completo do site continua sendo sua rede de segurança para tudo o mais.</p><p><strong>A IA pode cometer erros.</strong> O Claude pode classificar algo erroneamente ou propor uma correção que quebra uma funcionalidade. Sempre leia o que é proposto antes de dizer «sim, aplique», e teste o site após aplicar as correções.</p><p><strong>Não tem certeza?</strong> Se não estiver à vontade com esta ferramenta, escreva para o Tim em <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> e vamos conversar — podemos guiar você, ou fazer a revisão por você.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Não mostrar isto novamente"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Entendi — continuar"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Muitas varreduras automáticas na última hora (limite: %d). Aguarde alguns minutos antes de tentar novamente, ou use o fluxo manual claude.ai / Claude Code no painel."


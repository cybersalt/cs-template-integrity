COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Monitor de integridade do Joomla com conhecimento de templates. Expõe o rastreador nativo #__template_overrides por meio de uma API de Web Services do Joomla, permitindo que o Claude (ou qualquer cliente com um token de API do Joomla) revise cada substituição sinalizada, classifique-a como alerta / revisão / informação e aplique correções no local — com backup automático e reversíveis pelo painel administrativo."


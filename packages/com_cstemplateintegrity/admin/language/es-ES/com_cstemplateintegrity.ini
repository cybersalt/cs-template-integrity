COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Envía una pequeña petición de prueba a api.anthropic.com con la clave guardada. Cuesta casi nada — verifica que la clave es válida y accesible desde este servidor."

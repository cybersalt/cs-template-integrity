COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Continuar con Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Dígale a Claude qué hacer a continuación. Para los hallazgos que confirmó en el informe de arriba, diga algo como <em>&ldquo;corrige #1 y #3, descarta el resto&rdquo;</em>. Claude ejecutará el trabajo en el servidor y actualizará este hilo con lo que hizo. Cada apply-fix hace una copia de seguridad automática del archivo original primero, así que todo es reversible desde la vista Copias de archivos."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_PLACEHOLDER="Dígale a Claude qué corregir o descartar…"

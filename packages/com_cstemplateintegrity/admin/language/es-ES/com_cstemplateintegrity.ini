COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Método 1: usar Claude.ai o Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Copiar un prompt listo para usar y pegarlo en claude.ai o Claude Code. Funciona sin clave API. Salta al prompt de abajo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Método 2: ejecutar escaneo automático"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Delega la revisión de anulaciones a Claude desde el servidor utilizando su clave API de Anthropic guardada. Guarda el informe como una sesión con la que puede chatear. Salta al botón de ejecución de abajo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Guarde primero su clave API de Anthropic en el panel de Opciones para activar los escaneos automáticos. Mientras tanto, utilice el Método 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Recorrer de nuevo todas las plantillas activadas y reconstruir el rastreador de anulaciones. Utilícelo después de editar archivos de plantilla fuera de Joomla, o si el rastreador de Joomla está desactualizado."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Claves &amp; tokens"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Opcional. Guarde aquí una clave API de Anthropic para que la extensión pueda ejecutar escaneos automáticamente — no hace falta copiar y pegar el prompt en Claude. Déjelo en blanco para seguir utilizando el flujo manual claude.ai / Claude Code en el panel."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Clave API de Anthropic"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Su clave API personal de Anthropic (empieza con <code>sk-ant-…</code>). Obtenga una en <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. La clave se almacena en este servidor y se utiliza únicamente para llamar a api.anthropic.com en su nombre. Con una clave guardada, el panel expone un botón <em>Ejecutar escaneo automático</em> que delega la revisión de anulaciones a Claude desde el servidor y guarda el informe como sesión — sin copiar y pegar."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Cada escaneo automático realiza una llamada a la API de Anthropic con su clave. El precio es el que Anthropic cobra por el modelo utilizado (por defecto Claude Sonnet 4.6). Los sitios con un número muy elevado de anulaciones se limitan a las primeras 60 por ejecución; vuelva a ejecutar para el resto, o use el flujo manual de Claude Code en el panel para tamaño ilimitado."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Modelo de escaneo"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Modelo Claude utilizado para la llamada única <em>Ejecutar escaneo automático</em> en el panel. El escaneo es una tarea de clasificación (alert / review / info por hallazgo); Haiku la maneja bien por una fracción del coste de Sonnet. Sonnet es la opción por defecto segura. Opus es excesivo para escaneos rutinarios, pero útil si quiere un rigor extra en un sitio con sensibilidad de seguridad."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Modelo de chat"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Modelo Claude utilizado para el chat-con-Claude de seguimiento en la página de detalle de sesión (donde le pide a Claude que aplique correcciones o descarte hallazgos). El uso de herramientas es más exigente que la clasificación, así que recomendamos Sonnet aquí incluso si pone Haiku para el escaneo &mdash; las llamadas a herramientas que Claude hace mal cuestan más que la diferencia de precio entre modelos."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Token API de Joomla (para el prompt del panel)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Opcional. Genere un token API de Joomla en <em>Sistema &rarr; Usuarios &rarr; Mi perfil &rarr; Token API de Joomla</em> y péguelo aquí. Los prompts de escaneo/corrección del panel rellenarán entonces el token automáticamente en lugar del marcador &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, para que pueda copiar &amp; pegar directamente en Claude sin editar.<br><br><strong>Aviso multi-admin:</strong> los tokens API de Joomla autentican como <em>el usuario que los generó</em>. Si varios admins usan este panel, el prompt usará el token guardado aquí &mdash; lo que significa que Claude llamará a la API autenticado como ese usuario. Déjelo en blanco para que cada admin pegue su propio token al usarlo."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Anulaciones por escaneo"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Cuántas anulaciones de plantilla marcadas revisa el botón <em>Ejecutar escaneo automático</em> en una sola llamada a la API de Anthropic. Por defecto <strong>10</strong>. Rango 1&ndash;100. <strong>Cuanto más bajo, más seguro para el chat de seguimiento:</strong> el informe del escaneo crece con el número de hallazgos, y el bucle de uso de herramientas del chat conserva ese informe como historial de conversación. En los niveles inferiores de límite de tasa de Anthropic (10K tokens de entrada por minuto), un escaneo de 60 anulaciones más un turno inmediato de chat dentro del mismo minuto devolverá <em>HTTP 429: rate limit exceeded</em>. Con 10 anulaciones por ejecución, sus turnos de chat tras el escaneo se mantienen cómodamente por debajo del límite. Los sitios con más anulaciones que esto solo necesitan unas cuantas ejecuciones más para cubrirlo todo &mdash; el informe de cada ejecución se guarda como su propia sesión, así que puede chatear con cada una de forma independiente."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — el más rápido, coste más bajo (~1$ por 1M de tokens de entrada)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — equilibrado, recomendado (~3$ por 1M de tokens de entrada)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — el más capaz, caro (~15$ por 1M de tokens de entrada, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>Sobre la diferencia de coste.</strong> Un escaneo típico en un sitio con 50 anulaciones usa unos 60K tokens de entrada y produce unos 5K tokens de salida. Coste aproximado por escaneo: <strong>~0,08$ con Haiku, ~0,23$ con Sonnet, ~1,13$ con Opus</strong>. Los turnos de chat son mucho más pequeños (5K&ndash;10K tokens de entrada cada uno), así que el coste por turno es aproximadamente 10&times; menor que un escaneo. Los precios publicados por Anthropic son la fuente de verdad en <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; los números de arriba son aproximados y pueden variar con el tiempo. Si es nuevo en la API, empiece con Sonnet y vigile su uso en <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> durante unas cuantas ejecuciones antes de decidir si subir o bajar de nivel."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Navegación del componente"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Método 2: ejecutar escaneo automático (con su clave API de Anthropic guardada)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="No hay clave API de Anthropic guardada."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="Clave API guardada."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="La extensión ejecutará la revisión de anulaciones en el servidor utilizando su clave de Anthropic, sin copiar ni pegar. El informe se guarda automáticamente como una nueva sesión."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Pulse abajo para iniciar un escaneo. La extensión obtiene cada anulación marcada en este sitio, la envía a Claude con su clave API guardada, y guarda el informe resultante como una nueva sesión. Será redirigido al informe cuando termine."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Una llamada a la API de Anthropic por escaneo. Los sitios con más de %d anulaciones se limitan a las primeras %d por ejecución (configurable en <em>Opciones &rarr; AI provider &rarr; Anulaciones por escaneo</em>); vuelva a ejecutar para el siguiente lote, o use el flujo manual claude.ai / Claude Code de abajo para tamaño ilimitado. La página puede hacer una pausa de 30&ndash;90 segundos mientras Claude responde &mdash; es normal, no salga de la página."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Esto llamará a la API de Anthropic con su clave guardada y puede tardar de 30 a 90 segundos. ¿Continuar?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Ejecutar escaneo automático ahora"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Pulse <em>Opciones</em> en la barra de herramientas de arriba, pegue su clave API de Anthropic en la pestaña <em>AI provider</em> y guarde para activar este método. El Método 1 de arriba sigue funcionando sin clave."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Escaneo automático en curso…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Llamando a la API de Anthropic y analizando sus anulaciones. Esto suele tardar de 30 a 90 segundos. Por favor, no cierre esta ventana."


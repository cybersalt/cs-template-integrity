COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Ver datos de cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Permite a los usuarios de los grupos coincidentes leer las anulaciones, sesiones, registro de acciones y contenido de copias de seguridad (vistas de admin y endpoints de API en lectura)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Modificar datos de cstemplateintegrity y archivos de anulación"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Permite a los usuarios de los grupos coincidentes aplicar correcciones, restaurar copias de seguridad, descartar marcas de anulación, y crear o eliminar sesiones. Implica Ver."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Panel"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="Endpoint API activo"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Cualquier usuario con un token API de Joomla válido y permiso core.manage sobre este componente puede leer los datos actuales de anulaciones de plantilla de este sitio."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="URL del endpoint"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Acerca de"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="API Web Services que expone el rastreador nativo #__template_overrides para que Claude (o cualquier cliente con un token API de Joomla) pueda revisar cada anulación marcada, clasificarla y aplicar parches sobre la marcha. Cada parche se respalda automáticamente en la base de datos primero y es reversible desde la vista Copias de archivos."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Versión"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Empiece aquí."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Esta es la única tarjeta que necesita para una revisión normal. Ejecute el prompt, obtenga el informe, luego dígale a Claude en el mismo chat qué hallazgos corregir — no hace falta un segundo prompt."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Método 1: revisión usando Claude.ai o Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="La extensión expone los datos de sus anulaciones por REST. Combínela con Claude (claude.ai o Claude Code) para obtener una revisión de seguridad automatizada de cada anulación marcada en este sitio, y luego aplicar las correcciones que confirme — todo en un solo chat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Generar un token API de Joomla (una sola vez)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="En el admin de Joomla: <em>Sistema → Usuarios → Mi perfil → pestaña Token API de Joomla</em>. Pulse el icono del ojo para revelar el token. Solo tiene que hacerlo una vez — guarde el token en un lugar seguro."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Abrir Claude y pegar el prompt de abajo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Abra Claude donde lo use — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> en un navegador, ejecute <code>claude</code> en un terminal (Claude Code), o cualquier otra herramienta donde tenga Claude disponible. Sustituya el marcador por el token del paso 1. La URL del sitio y los endpoints ya están rellenados para este sitio.<br><br><strong>Solo usuarios de claude.ai:</strong> si Claude responde con «Host not in allowlist», su sandbox de ejecución de código está bloqueando su sitio. En claude.ai, abra <em>Configuración → Capacidades → Ejecución de código → Acceso a red</em> y añada el dominio de este sitio. <strong>Luego cierre el chat actual e inicie uno nuevo</strong> — el chat en marcha sigue usando la lista de permitidos antigua; solo un chat nuevo recoge el dominio recién añadido. (Esto se aplica tanto a la app de escritorio Claude como a la versión web.) Claude Code en un terminal no tiene esa restricción y funcionará sin cambios."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Enviar."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude obtendrá la lista de anulaciones, recogerá la fuente de la anulación y del núcleo para cada una, y producirá una tabla por hallazgo más un resumen en lenguaje sencillo que puede reenviar."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Dígale a Claude qué corregir — en el mismo chat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Una vez que Claude publique el informe, le preguntará qué hallazgos quiere que se corrijan. Responda con los que confirme (por ejemplo <em>«corrige #1 y #3, deja #2 en paz, el de terceros se lo preguntaré al desarrollador»</em>). Claude hace una copia de seguridad de cada archivo antes de parchearlo, así que todo se puede deshacer. <strong>Solo necesita la segunda tarjeta de abajo si cerró el chat y quiere volver a él más tarde.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (copiar y pegar en Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Copiar prompt de escaneo"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="¡Copiado!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="La mayoría de los usuarios NO necesitan esta tarjeta."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Use esto solo si está iniciando un <em>chat nuevo</em> para aplicar correcciones de una revisión anterior — por ejemplo cerró el chat original durante la noche, está pasando la revisión a un compañero, o ejecutó el escaneo en claude.ai y quiere hacer las correcciones en Claude Code. Si su chat de escaneo sigue abierto, desplácese hacia arriba — solo hable con Claude allí."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Continuar una revisión anterior en un chat nuevo"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Pegue este prompt en un chat nuevo de Claude para darle el contexto de su revisión anterior. Recogerá el informe de la sesión previa, listará los hallazgos y le preguntará cuáles corregir. Cada archivo se respalda antes de cualquier parche, así que todo es reversible."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Copiar prompt de corrección"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Registro de sesiones"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Los informes enviados por Claude (o pegados a mano) se guardan aquí como sesiones. Pulse en una sesión para ver el informe completo y las acciones que se ejecutaron durante ella."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Aún no hay sesiones. Ejecute el prompt de arriba y deje que Claude POSTee el informe automáticamente, o pulse 'Nueva sesión' para pegarlo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Nueva sesión"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Ver todas las sesiones"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Tras la revisión"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Cuando haya terminado de actuar sobre las recomendaciones de Claude, querrá borrar las insignias 'Cambios encontrados' que Joomla muestra en Plantillas para que no sigan señalando las anulaciones que ya ha tratado."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Recomendado — revisión por plantilla"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Abra la lista de plantillas del sitio. Cada plantilla con una insignia 'Cambios encontrados' puede abrirse individualmente para que descarte las filas de anulación específicas que ha tratado. Más lento, pero mantiene una pista de auditoría por fila."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Abrir gestión de plantillas del sitio"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="En masa — marcar todas las anulaciones como revisadas"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Vía más rápida: borrar cada fila del rastreador de anulaciones en un solo paso. Hágalo solo después de haber revisado realmente cada hallazgo. Equivalente a usar el 'Descartar todo' de Joomla en cada plantilla a la vez."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Marcar todo como revisado…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Confirmar: marcar todas las anulaciones como revisadas"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Esto borra cada fila que Joomla rastrea actualmente en el rastreador de anulaciones. Las insignias 'Cambios encontrados' en Plantillas desaparecerán, y el endpoint API de este sitio devolverá cero filas hasta que la próxima actualización del núcleo de Joomla las repueble. La acción no se puede deshacer salvo pulsando 'Reconstruir rastreador de anulaciones' abajo para volver a escanear."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Confirmo que he revisado cada anulación marcada y acepto la responsabilidad por cualquier problema no atendido."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Sí — marcar todo como revisado"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="%d fila(s) de anulación marcada(s) como revisada(s) y borrada(s) del rastreador."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="No había filas de anulación que borrar."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="No se pudo borrar el rastreador de anulaciones: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Restablecer anulaciones para revisión"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="¿Ha aprobado usted (o un desarrollador anterior) anulaciones en el pasado sin comprobarlas realmente? Pulse aquí para devolver cada archivo de anulación al rastreador para que pueda revisar cada uno correctamente con Claude. Útil después de un 'Descartar todo' que ocurrió antes de instalar esta herramienta."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Recorre la carpeta <code>html/</code> de cada plantilla activada e inserta una fila en <code>#__template_overrides</code> para cualquier archivo de anulación que aún no esté siendo rastreado. Las filas existentes se dejan intactas. Las filas restablecidas reaparecen como insignias 'Cambios encontrados' en el admin de Plantillas para que pueda ejecutar el flujo de revisión de arriba contra ellas."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Restablecer todas las anulaciones para revisión"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="¿Restablecer todas las anulaciones para revisión? Cada archivo de anulación de este sitio reaparecerá en las insignias 'Cambios encontrados' de Plantillas para poder ser reevaluado."


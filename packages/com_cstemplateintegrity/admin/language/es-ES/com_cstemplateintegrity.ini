COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Monitor de integridad de Joomla orientado a las anulaciones de plantilla. Expone el rastreador nativo #__template_overrides a través de una API Web Services de Joomla, para que Claude (o cualquier cliente con un token API de Joomla) pueda revisar cada anulación marcada, clasificarla como alert / review / info y aplicar parches sobre la marcha — con copia de seguridad automática y reversibles desde el admin."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Antes de empezar"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Asegúrese de tener una copia de seguridad reciente de su sitio web</strong> antes de permitir que esta extensión cambie nada. Recomendamos encarecidamente Akeeba Backup o la función de copia de seguridad de su proveedor de hosting.</p><p><strong>Lo que hace esta extensión:</strong> empareja su sitio Joomla con una IA (Claude) para revisar cada anulación de plantilla marcada, clasificar cada una como alerta de seguridad, diferencia cosmética o personalización legítima, y aplicar los parches que usted confirme. Cada parche se respalda automáticamente en la base de datos primero, por lo que los cambios individuales son reversibles — pero una copia completa del sitio sigue siendo su red de seguridad para todo lo demás.</p><p><strong>La IA puede equivocarse.</strong> Claude puede clasificar mal algo o proponer un parche que rompa una funcionalidad. Lea siempre lo que se propone antes de decir «sí, aplícalo», y pruebe el sitio después de aplicar las correcciones.</p><p><strong>¿No está seguro?</strong> Si no se siente cómodo con esta herramienta, escriba a Tim en <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> y hablemos — podemos guiarle, o hacer la revisión por usted.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="No volver a mostrar esto"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Entendido — continuar"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Demasiados escaneos automáticos en la última hora (límite: %d). Espere unos minutos antes de volver a intentarlo, o utilice el flujo manual claude.ai / Claude Code en el panel."


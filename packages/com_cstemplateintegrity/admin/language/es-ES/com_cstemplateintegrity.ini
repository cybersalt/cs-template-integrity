COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Pegar un informe de Claude"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Pegado manual para usuarios de Claude en navegador.</strong> Si ejecutó el prompt de escaneo en <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, copie la respuesta de Claude y péguela aquí para guardarla como sesión. Si usó <em>Claude Code</em> (en un terminal), no necesita este formulario — Claude POSTea el informe automáticamente al sitio. La sesión se nombra por defecto con la marca de tiempo de hoy; cámbielo si lo desea."

COM_CSTEMPLATEINTEGRITY_ACTIONS_TITLE="Cybersalt Template Integrity — Registro de acciones"
COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Cada evento administrativo que tocó el rastreador de anulaciones, el registro de sesiones o las copias de archivos se registra aquí. Solo lectura."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Las sesiones</strong> almacenan los informes de revisión de Claude. <strong>El registro de acciones</strong> es la pista de auditoría de los <em>cambios</em> — cuándo se restablecieron o borraron anulaciones, cuándo se creó una sesión, cuándo se guardó una copia antes de un fix. Si algo va mal en este sitio más adelante, aquí verá qué se hizo y cuándo."

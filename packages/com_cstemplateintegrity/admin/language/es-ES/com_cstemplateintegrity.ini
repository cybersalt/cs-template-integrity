COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_TITLE="Preguntando a Claude…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude está leyendo su mensaje y puede ejecutar herramientas apply-fix o dismiss en el servidor. Esto puede tardar hasta un minuto. Por favor, no cierre esta ventana."

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Restaurar esta copia"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Sobrescribe el archivo en vivo en la ruta de arriba con el contenido de la copia. Antes de escribir, el contenido actual en esa ruta se guarda como una nueva copia, para que esta restauración sea ella misma reversible — si va mal, deshágala restaurando la nueva copia pre-restauración."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="El archivo se escribe vía PHP desde esta página de admin; sin FTP. El usuario web debe tener permiso de escritura sobre la ruta de destino. La raíz del sitio Joomla es el límite — la restauración se niega a escribir fuera de él."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_BUTTON="Restaurar ahora…"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="Confirmar: restaurar copia"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_BODY="Restaurar sobrescribirá el archivo en vivo en %s con el contenido de la copia mostrado arriba. El contenido actual se guardará primero como una nueva copia para que esto se pueda revertir."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Entiendo: restaurar ahora sobrescribirá el archivo en vivo. La copia pre-restauración se guardará automáticamente como una nueva copia."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="Sí — restaurar"

COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_TITLE="Restaurar manualmente (FTP / su editor)"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="Si prefiere no permitir que la extensión escriba en disco:"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="Pulse <em>Descargar copia</em> de arriba (o copie el bloque de Contenido de la copia)."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="Abra su cliente FTP, cliente SFTP o gestor de archivos del hosting."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="Reemplace el archivo en la ruta de destino abajo con la copia descargada."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_DESTINATION="Ruta de destino en el servidor"

COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Dónde vive esta copia"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="El contenido de las copias se almacena en la base de datos, no en disco. En concreto, en la tabla <code>#__cstemplateintegrity_backups</code> — la columna <code>contents_b64</code> contiene el contenido del archivo codificado en base64."
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="Eso significa que una copia de seguridad de la base de datos también las captura. Desinstalar el componente borra la tabla junto con todas las copias almacenadas."

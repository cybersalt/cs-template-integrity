COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Просмотр данных cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Позволяет пользователям из соответствующих групп читать переопределения, сессии, журнал действий и содержимое резервных копий (административные виды и конечные точки API на чтение)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Изменение данных cstemplateintegrity и файлов переопределений"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Позволяет пользователям из соответствующих групп применять исправления, восстанавливать резервные копии, отклонять отметки переопределений, а также создавать или удалять сессии. Подразумевает «Просмотр»."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Панель управления"

COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Продолжить с Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Скажите Claude, что делать дальше. Для находок, которые Вы подтвердили в отчёте выше, скажите что-то вроде <em>&ldquo;исправьте #1 и #3, остальные отклоните&rdquo;</em>. Claude выполнит работу на стороне сервера и обновит этот тред тем, что было сделано. Перед каждым применением исправления автоматически создаётся резервная копия исходного файла, поэтому всё обратимо из вида «Резервные копии файлов»."

COM_CSTEMPLATEINTEGRITY_BACKUP_CONTENTS_HELP="Точные байты, захваченные на момент резервного копирования. Измените размер блока, перетаскивая правый нижний угол. Используйте кнопку «Скачать» выше, чтобы сохранить это содержимое как файл."

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Восстановить эту резервную копию"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Перезаписать текущий файл по указанному выше пути содержимым резервной копии. Перед записью текущее содержимое по этому пути сохраняется как новая резервная копия, поэтому это восстановление само обратимо — если что-то пойдёт не так, отмените, восстановив новую резервную копию, созданную перед восстановлением."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="Файл записывается через PHP с этой административной страницы; FTP не нужен. У веб-пользователя должны быть права записи на целевой путь. Корень сайта Joomla — это граница: восстановление отказывается записывать за её пределами."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_BUTTON="Восстановить сейчас…"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="Подтверждение: восстановить резервную копию"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_BODY="Восстановление перезапишет текущий файл по пути %s содержимым резервной копии, показанным выше. Сначала текущее содержимое будет сохранено как новая резервная копия, чтобы это можно было откатить."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Я понимаю: восстановление сейчас перезапишет текущий файл. Копия перед восстановлением будет автоматически сохранена как новая резервная копия."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="Да — восстановить"

COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_TITLE="Восстановить вручную (FTP / Ваш редактор)"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="Если Вы предпочитаете не позволять расширению писать на диск:"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="Нажмите <em>Скачать резервную копию</em> выше (или скопируйте блок «Содержимое резервной копии»)."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="Откройте Ваш FTP-клиент, SFTP-клиент или файловый менеджер хостинга."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="Замените файл по указанному ниже пути назначения скачанной копией."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_DESTINATION="Путь назначения на сервере"

COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Где хранится эта резервная копия"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="Содержимое резервных копий хранится в базе данных, а не на диске. В частности, в таблице <code>#__cstemplateintegrity_backups</code> — столбец <code>contents_b64</code> содержит содержимое файла, закодированное в base64."
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="Это означает, что резервная копия базы данных также захватывает их. Удаление компонента удаляет таблицу вместе со всеми сохранёнными резервными копиями."

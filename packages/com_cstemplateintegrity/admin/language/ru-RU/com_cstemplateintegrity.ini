COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Не удалось очистить трекер переопределений: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Сбросить переопределения для проверки"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Вы (или предыдущий разработчик) одобряли переопределения в прошлом, не проверяя их по-настоящему? Нажмите здесь, чтобы вернуть каждый файл переопределения в трекер, чтобы Вы могли как следует проверить каждый из них с Claude. Полезно после «Отклонить все», которое произошло до установки этого инструмента."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Обходит папку <code>html/</code> каждого включённого шаблона и вставляет строку в <code>#__template_overrides</code> для любого файла переопределения, который ещё не отслеживается. Существующие строки остаются нетронутыми. Сброшенные строки появляются как значки «Найдены изменения» в администрировании шаблонов, чтобы Вы могли запустить против них процесс проверки выше."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Сбросить все переопределения для проверки"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Сбросить все переопределения для проверки? Каждый файл переопределения на этом сайте снова появится в значках «Найдены изменения» шаблонов, чтобы его можно было повторно оценить."


COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="Конечная точка API активна"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Любой пользователь с действительным токеном API Joomla и разрешением core.manage на этот компонент может прочитать текущие данные о переопределениях шаблонов этого сайта."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="URL конечной точки"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="О компоненте"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API, открывающий доступ к встроенному трекеру #__template_overrides, чтобы Claude (или любой клиент с токеном API Joomla) мог проверить каждое отмеченное переопределение, классифицировать его и применить исправления на месте. Перед каждым исправлением автоматически создаётся резервная копия в базе данных, и его можно откатить из вида «Резервные копии файлов»."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Версия"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Начните здесь."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Это единственная карточка, которая Вам нужна для обычной проверки. Запустите запрос, получите отчёт, затем скажите Claude в том же чате, какие находки исправить — второй запрос не нужен."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Способ 1: проверка с помощью Claude.ai или Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="Расширение открывает доступ к данным переопределений через REST. Соедините его с Claude (claude.ai или Claude Code), чтобы получить автоматическую проверку безопасности каждого отмеченного переопределения на этом сайте, а затем применить подтверждённые Вами исправления — всё в одном чате."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Создайте токен API Joomla (один раз)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="В административной панели Joomla: вкладка <em>Система → Пользователи → Мой профиль → Joomla API Token</em>. Нажмите значок глаза, чтобы показать токен. Это нужно сделать только один раз — храните токен в безопасном месте."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Откройте Claude и вставьте запрос ниже."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Откройте Claude там, где Вы его используете — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> в браузере, запустите <code>claude</code> в терминале (Claude Code) или любой другой инструмент, в котором у Вас есть Claude. Замените заполнитель токеном из шага 1. URL сайта и конечные точки уже подставлены для этого сайта.<br><br><strong>Только для пользователей claude.ai:</strong> если Claude отвечает «Host not in allowlist», его песочница исполнения кода блокирует Ваш сайт. В claude.ai откройте <em>Настройки → Возможности → Исполнение кода → Сетевой доступ</em> и добавьте домен этого сайта. <strong>Затем закройте текущий чат и начните новый</strong> — текущий чат продолжает использовать старый список разрешений; только свежий чат подхватывает только что добавленный домен. (Это относится и к настольному приложению Claude, и к веб-версии.) Claude Code в терминале не имеет такого ограничения и будет работать без изменений."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Отправьте."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude получит список переопределений, извлечёт исходный код переопределения и ядра для каждого из них и составит таблицу по находкам плюс резюме на простом языке, которое Вы сможете переслать."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Скажите Claude, что исправить — в том же чате."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="После того как Claude опубликует отчёт, он спросит, какие находки Вы хотите исправить. Ответьте теми, которые Вы подтверждаете (например, <em>«исправьте #1 и #3, #2 оставьте как есть, по сторонней спрошу разработчика»</em>). Claude создаст резервную копию каждого файла перед изменением, поэтому всё можно откатить. <strong>Вторая карточка ниже нужна Вам только если Вы закрыли чат и хотите вернуться к нему позже.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Запрос (скопируйте и вставьте в Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Копировать запрос сканирования"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Скопировано!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="Большинству пользователей эта карточка НЕ нужна."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Используйте её только если Вы начинаете <em>новый чат</em>, чтобы применить исправления из предыдущей проверки — например, Вы закрыли исходный чат на ночь, передаёте проверку коллеге или запустили сканирование в claude.ai и хотите выполнить исправления в Claude Code. Если чат сканирования всё ещё открыт, прокрутите вверх — просто говорите с Claude там."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Продолжить предыдущую проверку в новом чате"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Вставьте этот запрос в свежий чат Claude, чтобы дать ему контекст из Вашей предыдущей проверки. Он получит отчёт предыдущей сессии, перечислит находки и спросит, какие исправить. Перед применением каждого исправления делается резервная копия файла, поэтому всё обратимо."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Копировать запрос исправления"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Журнал сессий"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Отчёты, отправленные Claude (или вставленные вручную), сохраняются здесь как сессии. Нажмите на сессию, чтобы просмотреть полный отчёт и действия, выполненные во время неё."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Сессий пока нет. Запустите запрос выше и либо позвольте Claude отправить отчёт обратно автоматически (POST), либо нажмите «Новая сессия», чтобы вставить его."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Новая сессия"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Просмотреть все сессии"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="После проверки"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Когда Вы закончите выполнять рекомендации Claude, Вы захотите убрать значки «Найдены изменения», которые Joomla показывает в шаблонах, чтобы они больше не отмечали уже обработанные Вами переопределения."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Рекомендуется — проверка по каждому шаблону"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Откройте список шаблонов сайта. Каждый шаблон со значком «Найдены изменения» можно открыть отдельно, чтобы отклонить конкретные строки переопределений, которые Вы обработали. Медленнее, но Вы сохраняете аудит по каждой строке."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Открыть управление шаблонами сайта"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Массово — отметить все переопределения как проверенные"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Более быстрый путь: очистить все строки в трекере переопределений за один шаг. Делайте это, только когда Вы действительно проверили каждую находку. Эквивалент использования собственной кнопки «Отклонить все» Joomla на каждом шаблоне сразу."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Отметить все как проверенные…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Подтверждение: отметить все переопределения как проверенные"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Это очистит каждую строку, которую Joomla сейчас отслеживает в трекере переопределений. Значки «Найдены изменения» в шаблонах исчезнут, и конечная точка API этого сайта будет возвращать ноль строк до следующего обновления ядра Joomla, которое снова заполнит их. Действие нельзя отменить, кроме как нажав «Перестроить трекер переопределений» ниже для повторного сканирования."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Я подтверждаю, что проверил каждое отмеченное переопределение, и принимаю ответственность за любые необработанные проблемы."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Да — отметить все проверенными"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="Отмечено как проверенные и очищено из трекера: %d строк переопределений."

COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Монитор целостности Joomla с пониманием шаблонов. Открывает доступ к встроенному трекеру #__template_overrides через Joomla Web Services API, чтобы Claude (или любой клиент с токеном API Joomla) мог проверить каждое отмеченное переопределение, классифицировать его как тревога / на проверку / информация и применить исправления на месте — с автоматическим резервным копированием и возможностью отката из административной панели."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Перед началом работы"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Пожалуйста, убедитесь, что у Вас есть свежая резервная копия Вашего сайта</strong>, прежде чем разрешать этому расширению вносить какие-либо изменения. Мы настоятельно рекомендуем Akeeba Backup или средство резервного копирования Вашего хостинга.</p><p><strong>Что делает это расширение:</strong> оно соединяет Ваш сайт Joomla с искусственным интеллектом (Claude) для проверки каждого отмеченного переопределения шаблона, классифицирует каждое из них как угрозу безопасности, косметическое отличие или законную настройку и применяет исправления, которые Вы подтвердите. Перед каждым исправлением автоматически создаётся резервная копия в базе данных, поэтому отдельные изменения можно откатить — но полная резервная копия сайта остаётся Вашей страховкой на все остальные случаи.</p><p><strong>ИИ может ошибаться.</strong> Claude может неправильно классифицировать что-либо или предложить исправление, которое сломает функцию. Всегда читайте предложение, прежде чем сказать «да, применить», и проверяйте сайт после применения исправлений.</p><p><strong>Не уверены?</strong> Если Вам некомфортно использовать этот инструмент, напишите Тиму на <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a>, и мы поговорим — мы можем провести Вас через процесс или сделать проверку за Вас.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Больше не показывать"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Я понимаю — продолжить"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Слишком много автоматических сканирований за последний час (лимит: %d). Подождите несколько минут и попробуйте снова или используйте ручной процесс claude.ai / Claude Code на панели управления."


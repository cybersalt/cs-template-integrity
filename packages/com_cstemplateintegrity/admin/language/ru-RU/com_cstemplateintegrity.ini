COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Способ 1: использовать Claude.ai или Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Скопируйте готовый запрос и вставьте его в claude.ai или Claude Code. Работает без ключа API. Переход к запросу ниже."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Способ 2: запустить автоматическое сканирование"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Передать проверку переопределений Claude на стороне сервера, используя сохранённый ключ API Anthropic. Сохраняет отчёт как сессию, с которой можно вести чат. Переход к кнопке запуска ниже."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Сначала сохраните ключ API Anthropic в панели «Параметры», чтобы включить автоматические сканирования. До этого используйте Способ 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Заново обойти все включённые шаблоны и перестроить трекер переопределений. Используйте после редактирования файлов шаблонов вне Joomla или если трекер Joomla устарел."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Ключи &amp; токены"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Необязательно. Сохраните здесь ключ API Anthropic, чтобы расширение могло запускать сканирования автоматически — без копирования и вставки запроса в Claude. Оставьте пустым, чтобы продолжать использовать ручной процесс claude.ai / Claude Code на панели управления."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Ключ API Anthropic"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Ваш личный ключ API Anthropic (начинается с <code>sk-ant-…</code>). Получите его на <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. Ключ хранится на этом сервере и используется только для вызова api.anthropic.com от Вашего имени. При сохранённом ключе на панели управления появляется кнопка <em>Запустить автоматическое сканирование</em>, которая передаёт проверку переопределений Claude на стороне сервера и сохраняет отчёт как сессию — копирование и вставка не требуются."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Каждое автоматическое сканирование делает один вызов API Anthropic с использованием Вашего ключа. Стоимость определяется тарифами Anthropic за используемую модель (по умолчанию Claude Sonnet 4.6). Сайты с очень большим количеством переопределений ограничены первыми 60 за один запуск; запустите ещё раз для остальных или используйте ручной процесс Claude Code на панели управления для неограниченного объёма."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Модель сканирования"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Модель Claude, используемая для одноразового вызова <em>Запустить автоматическое сканирование</em> на панели управления. Сканирование — это задача классификации (тревога / на проверку / информация для каждой находки); Haiku справляется с ней хорошо за малую долю стоимости Sonnet. Sonnet — безопасный выбор по умолчанию. Opus избыточен для рутинных сканирований, но полезен, если Вы хотите дополнительной строгости на сайте, чувствительном к безопасности."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Модель чата"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Модель Claude, используемая для последующего чата с Claude на странице сессии (где Вы просите Claude применить исправления или отклонить находки). Использование инструментов более требовательно, чем классификация, поэтому здесь мы рекомендуем Sonnet, даже если для модели сканирования Вы установили Haiku &mdash; ошибочные вызовы инструментов Claude обходятся дороже разницы в цене модели."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Токен API Joomla (для запроса панели управления)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Необязательно. Создайте токен API Joomla в <em>Система &rarr; Пользователи &rarr; Мой профиль &rarr; Joomla API Token</em> и вставьте его сюда. Запросы сканирования / исправления панели управления автоматически подставят токен вместо заполнителя &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, чтобы Вы могли скопировать &amp; вставить прямо в Claude без редактирования.<br><br><strong>Предупреждение для нескольких администраторов:</strong> токены API Joomla аутентифицируют как <em>пользователя, который их создал</em>. Если этой панелью пользуются несколько администраторов, запрос будет использовать тот токен, который сохранён здесь &mdash; то есть Claude будет вызывать API, аутентифицируясь как этот один пользователь. Оставьте пустым, чтобы каждый администратор вставлял свой токен при использовании."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Переопределений за сканирование"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Сколько отмеченных переопределений шаблонов проверяет кнопка <em>Запустить автоматическое сканирование</em> за один вызов API Anthropic. По умолчанию <strong>10</strong>. Диапазон 1&ndash;100. <strong>Меньшее значение безопаснее для последующего чата:</strong> отчёт сканирования растёт с количеством находок, и цикл использования инструментов в чате сохраняет этот отчёт как историю беседы. На более низких уровнях лимита Anthropic (10K входных токенов в минуту) сканирование 60 переопределений плюс немедленный ход чата в течение той же минуты вернёт <em>HTTP 429: rate limit exceeded</em>. При 10 переопределениях за запуск Ваши ходы чата после сканирования останутся комфортно ниже лимита. Сайтам с большим количеством переопределений просто нужно несколько повторных запусков, чтобы охватить всё &mdash; отчёт каждого запуска сохраняется как отдельная сессия, поэтому Вы можете вести чат с каждой независимо."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — самая быстрая, минимальная стоимость (~$1 за 1M входных токенов)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — сбалансированная, рекомендуемая (~$3 за 1M входных токенов)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — наиболее способная, дорогая (~$15 за 1M входных токенов, в 5× дороже Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>О разнице в стоимости.</strong> Типичное сканирование сайта с 50 переопределениями использует около 60K входных токенов и производит около 5K выходных токенов. Примерная стоимость одного сканирования: <strong>~$0.08 на Haiku, ~$0.23 на Sonnet, ~$1.13 на Opus</strong>. Ходы чата значительно меньше (5K&ndash;10K входных токенов каждый), поэтому стоимость одного хода примерно в 10&times; меньше, чем у сканирования. Опубликованные цены Anthropic — источник истины на <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; цифры выше приблизительны и могут со временем меняться. Если Вы новичок в API, начните с Sonnet и понаблюдайте за использованием на <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> в течение нескольких запусков, прежде чем решать, повышать или понижать модель."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Навигация по компоненту"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Способ 2: запустить автоматическое сканирование (используя сохранённый ключ API Anthropic)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Ключ API Anthropic не сохранён."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="Ключ API сохранён."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="Расширение запустит проверку переопределений на сервере, используя Ваш ключ Anthropic, копирование и вставка не требуются. Отчёт автоматически сохраняется как новая сессия."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Нажмите ниже, чтобы начать сканирование. Расширение получит каждое отмеченное переопределение на этом сайте, отправит его Claude с Вашим сохранённым ключом API и сохранит итоговый отчёт как новую сессию. По завершении Вы будете перенаправлены к отчёту."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Один вызов API Anthropic за сканирование. Сайты с количеством переопределений более %d ограничены первыми %d за запуск (настраивается в <em>Параметры &rarr; AI provider &rarr; Переопределений за сканирование</em>); запустите ещё раз для следующей партии или используйте ручной процесс claude.ai / Claude Code ниже для неограниченного объёма. Страница может приостановиться на 30&ndash;90 секунд, пока Claude отвечает &mdash; это нормально, не уходите со страницы."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Это вызовет API Anthropic с Вашим сохранённым ключом и может занять от 30 до 90 секунд. Продолжить?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Запустить автоматическое сканирование сейчас"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Нажмите <em>Параметры</em> на панели инструментов выше, вставьте свой ключ API Anthropic на вкладке <em>AI provider</em> и сохраните, чтобы включить этот способ. Способ 1 выше работает и без ключа."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Выполняется автоматическое сканирование…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Вызов API Anthropic и анализ Ваших переопределений. Обычно это занимает от 30 до 90 секунд. Пожалуйста, не закрывайте это окно."


COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Монитор целостности Joomla с пониманием шаблонов. Открывает доступ к встроенному трекеру #__template_overrides через Joomla Web Services API, чтобы Claude (или любой клиент с токеном API Joomla) мог проверить каждое отмеченное переопределение, классифицировать его как тревога / на проверку / информация и применить исправления на месте — с автоматическим резервным копированием и возможностью отката из административной панели."


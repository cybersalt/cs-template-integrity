COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Visualizza dati cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Permette agli utenti dei gruppi corrispondenti di leggere override, sessioni, registro azioni e contenuto dei backup (viste admin ed endpoint API in lettura)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Modifica dati cstemplateintegrity e file di override"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Permette agli utenti dei gruppi corrispondenti di applicare correzioni, ripristinare backup, respingere segnalazioni di override, e creare o eliminare sessioni. Implica Visualizza."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Dashboard"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="Endpoint API attivo"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Qualsiasi utente con un token API Joomla valido e l'autorizzazione core.manage su questo componente può leggere i dati attuali di override dei template di questo sito."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="URL dell'endpoint"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Informazioni"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="API Web Services che espone il tracker nativo #__template_overrides perché Claude (o qualsiasi client con un token API Joomla) possa esaminare ogni override segnalato, classificarlo e applicare patch sul posto. Ogni patch viene prima salvata automaticamente nel database ed è reversibile dalla vista Backup file."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Versione"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Inizia qui."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Questa è l'unica scheda che ti serve per una revisione normale. Esegui il prompt, ottieni il report, poi di' a Claude nello stesso chat quali scoperte correggere — niente secondo prompt necessario."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Metodo 1: revisione con Claude.ai o Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="L'estensione espone i tuoi dati di override via REST. Abbinala a Claude (claude.ai o Claude Code) per ottenere una revisione di sicurezza automatizzata di ogni override segnalato su questo sito, poi applica le correzioni che confermi — tutto in un singolo chat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Genera un token API Joomla (una volta sola)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="Nell'admin Joomla: <em>Sistema → Utenti → Mio profilo → scheda Token API Joomla</em>. Clicca l'icona dell'occhio per rivelare il token. Devi farlo solo una volta — conserva il token in un posto sicuro."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Apri Claude e incolla il prompt qui sotto."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Apri Claude dove lo usi — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> in un browser, esegui <code>claude</code> in un terminale (Claude Code), o qualsiasi altro strumento in cui Claude è disponibile. Sostituisci il segnaposto con il token del passo 1. URL del sito ed endpoint sono già compilati per questo sito.<br><br><strong>Solo utenti claude.ai:</strong> se Claude risponde con «Host not in allowlist», il suo sandbox di esecuzione codice sta bloccando il tuo sito. In claude.ai, apri <em>Impostazioni → Capacità → Esecuzione codice → Accesso rete</em> e aggiungi il dominio di questo sito. <strong>Poi chiudi il chat corrente e avviane uno nuovo</strong> — il chat in corso continua a usare la vecchia allowlist; solo un chat fresco prende il dominio appena aggiunto. (Vale sia per l'app desktop Claude che per la versione web.) Claude Code in un terminale non ha tale restrizione e funzionerà senza modifiche."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Invia."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude tirerà giù la lista degli override, recupererà override e sorgente del core per ciascuno, e produrrà una tabella per scoperta più un riassunto in linguaggio semplice che puoi inoltrare."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Di' a Claude cosa correggere — nello stesso chat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Una volta che Claude ha pubblicato il report, chiederà quali scoperte vuoi correggere. Rispondi con quelle che confermi (es. <em>«correggi #1 e #3, lascia stare #2, quella di terze parti la chiedo allo sviluppatore»</em>). Claude fa il backup di ogni file prima di patcharlo, quindi tutto può essere annullato. <strong>La seconda scheda qui sotto ti serve solo se hai chiuso il chat e vuoi tornarci più tardi.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (copia e incolla in Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Copia prompt di scan"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Copiato!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="La maggior parte degli utenti NON ha bisogno di questa scheda."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Usalo solo se stai avviando un <em>nuovo chat</em> per applicare correzioni di una revisione precedente — per esempio hai chiuso il chat originale durante la notte, stai passando la revisione a un compagno di squadra, o hai eseguito lo scan in claude.ai e vuoi fare le correzioni in Claude Code. Se il tuo chat di scan è ancora aperto, scorri verso l'alto — parla con Claude lì."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Continua una revisione precedente in un nuovo chat"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Incolla questo prompt in un chat fresco di Claude per dargli il contesto della tua revisione precedente. Recupererà il report della sessione precedente, elencherà le scoperte e ti chiederà quali correggere. Ogni file è salvato prima di qualsiasi patch, quindi tutto è reversibile."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Copia prompt di correzione"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Registro sessioni"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="I report inviati da Claude (o incollati a mano) sono salvati qui come sessioni. Clicca una sessione per vedere il report completo e le azioni eseguite durante."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Ancora nessuna sessione. Esegui il prompt sopra e o lascia che Claude POSTi il report automaticamente, o clicca 'Nuova sessione' per incollarlo."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Nuova sessione"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Vedi tutte le sessioni"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Dopo la revisione"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Quando hai finito di agire sulle raccomandazioni di Claude, vorrai cancellare i badge 'Modifiche trovate' che Joomla mostra in Template, così non continueranno a segnalare gli override che hai già gestito."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Raccomandato — revisione per template"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Apri la lista dei template del sito. Ogni template con un badge 'Modifiche trovate' può essere aperto individualmente perché tu possa respingere le righe di override specifiche che hai gestito. Più lento, ma mantieni una traccia di audit per riga."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Apri gestione template del sito"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="In massa — segna tutti gli override come revisionati"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Strada più veloce: cancellare ogni riga nel tracker degli override in un solo passo. Fallo solo dopo aver effettivamente revisionato ogni scoperta. Equivale a usare il 'Respingi tutto' di Joomla su ogni template insieme."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Segna tutti come revisionati…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Conferma: segna tutti gli override come revisionati"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Questo cancella ogni riga che Joomla sta attualmente tracciando nel tracker degli override. I badge 'Modifiche trovate' in Template scompariranno, e l'endpoint API di questo sito restituirà zero righe finché il prossimo aggiornamento del core di Joomla non le ripopolerà. L'azione non può essere annullata se non cliccando 'Ricostruisci tracker override' qui sotto per ri-scandagliare."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Confermo di aver revisionato ogni override segnalato e accetto la responsabilità per qualsiasi problema non affrontato."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Sì — segna tutti come revisionati"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="%d riga/righe di override segnata/e come revisionata/e e cancellata/e dal tracker."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="Non c'erano righe di override da cancellare."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Impossibile cancellare il tracker degli override: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Reimposta override per revisione"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Hai (o uno sviluppatore precedente) approvato override in passato senza realmente controllarli? Clicca qui per riportare ogni file di override nel tracker così da poter revisionare ognuno correttamente con Claude. Utile dopo un 'Respingi tutto' avvenuto prima dell'installazione di questo strumento."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Percorre la cartella <code>html/</code> di ogni template attivato e inserisce una riga in <code>#__template_overrides</code> per ogni file di override non già tracciato. Le righe esistenti restano intatte. Le righe reimpostate riappaiono come badge 'Modifiche trovate' nell'admin Template così che tu possa eseguire il flusso di revisione sopra contro di loro."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Reimposta tutti gli override per revisione"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Reimpostare tutti gli override per revisione? Ogni file di override su questo sito riapparirà nei badge 'Modifiche trovate' dei Template per essere rivalutato."

COM_CSTEMPLATEINTEGRITY_RESCAN_SUCCESS="Tracker override ricostruito: %1$d riga/righe inserita/e su %3$d template (%2$d file scansionati)."
COM_CSTEMPLATEINTEGRITY_RESCAN_ERROR="Ricostruzione del tracker override fallita: %s"


COM_CSTEMPLATEINTEGRITY_ACTIONS_TITLE="Cybersalt Template Integrity — Registro azioni"
COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Ogni evento amministrativo che ha toccato il tracker degli override, il registro sessioni o i backup dei file è registrato qui. Sola lettura."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Le sessioni</strong> memorizzano i report di revisione di Claude. <strong>Il registro azioni</strong> è la traccia di audit dei <em>cambiamenti</em> — quando gli override sono stati reimpostati o cancellati, quando una sessione è stata creata, quando un backup è stato salvato prima di una correzione. Se qualcosa va storto su questo sito più tardi, è qui che vedrai cosa è stato fatto e quando."

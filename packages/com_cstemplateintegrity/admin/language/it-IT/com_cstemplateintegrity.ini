COM_CSTEMPLATEINTEGRITY_BACKUP_CONTENTS_HELP="I byte esatti catturati al momento del backup. Ridimensiona il box trascinando l'angolo in basso a destra. Usa il pulsante Scarica sopra per salvare questo contenuto come file."

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Ripristina questo backup"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Sovrascrive il file live al percorso sopra con il contenuto del backup. Prima di scrivere, il contenuto attuale a quel percorso è salvato come backup fresco, così questo ripristino è esso stesso reversibile — se qualcosa va storto, annullalo ripristinando il nuovo backup pre-ripristino."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="Il file è scritto via PHP da questa pagina admin; nessun FTP necessario. L'utente web deve avere permessi di scrittura sul percorso target. La root del sito Joomla è il limite — il ripristino rifiuta di scrivere fuori da essa."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_BUTTON="Ripristina ora…"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="Conferma: ripristina backup"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_BODY="Il ripristino sovrascriverà il file live a %s con il contenuto del backup mostrato sopra. Il contenuto attuale sarà salvato come backup fresco prima così questo possa essere annullato."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Capisco: ripristinare ora sovrascriverà il file live. La copia pre-ripristino sarà automaticamente salvata come nuovo backup."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="Sì — ripristina"

COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_TITLE="Ripristina manualmente (FTP / il tuo editor)"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="Se preferisci non lasciare che l'estensione scriva su disco:"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="Clicca <em>Scarica backup</em> sopra (o copia il blocco Contenuto del backup)."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="Apri il tuo client FTP, client SFTP o file manager dell'hosting."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="Sostituisci il file al percorso di destinazione qui sotto con la copia scaricata."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_DESTINATION="Percorso di destinazione sul server"

COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Dove vive questo backup"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="I contenuti dei backup sono memorizzati nel database, non su disco. Specificamente, nella tabella <code>#__cstemplateintegrity_backups</code> — la colonna <code>contents_b64</code> contiene il contenuto del file codificato in base64."
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="Significa che un backup del database li cattura anche. Disinstallare il componente cancella la tabella insieme a tutti i backup memorizzati."

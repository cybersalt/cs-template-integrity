COM_CSTEMPLATEINTEGRITY_SESSIONFORM_TITLE="Nuova sessione"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Incolla un report di Claude"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Incollaggio manuale per utenti di Claude nel browser.</strong> Se hai eseguito il prompt di scan su <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, copia la risposta di Claude e incollala qui per salvarla come sessione. Se hai usato <em>Claude Code</em> (in un terminale), non hai bisogno di questo modulo — Claude POSTa il report automaticamente al sito. La sessione è nominata di default con il timestamp di oggi; cambialo se vuoi."
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_NAME="Nome della sessione"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_NAME_HELP="Default: il timestamp corrente YYYY-MM-DD-HHMMSS. Usato come etichetta visibile nel registro sessioni."

COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Monitor di integrità Joomla orientato agli override dei template. Espone il tracker nativo #__template_overrides tramite un'API Web Services di Joomla, in modo che Claude (o qualsiasi client con un token API Joomla) possa esaminare ogni override segnalato, classificarlo come alert / review / info e applicare patch sul posto — con backup automatico e reversibili dall'admin."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Prima di iniziare"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Assicurati di avere un backup recente del tuo sito web</strong> prima di permettere a questa estensione di modificare qualsiasi cosa. Raccomandiamo vivamente Akeeba Backup o la funzione di backup del tuo hosting.</p><p><strong>Cosa fa questa estensione:</strong> abbina il tuo sito Joomla a un'IA (Claude) per esaminare ogni override di template segnalato, classificare ciascuno come avviso di sicurezza, differenza estetica o personalizzazione legittima, e applicare le patch che confermi. Ogni patch viene prima salvata automaticamente nel database, quindi le singole modifiche sono reversibili — ma un backup completo del sito resta la tua rete di sicurezza per tutto il resto.</p><p><strong>L'IA può sbagliare.</strong> Claude potrebbe classificare male qualcosa o proporre una patch che rompe una funzionalità. Leggi sempre ciò che propone prima di dire «sì, applicala», e testa il sito dopo l'applicazione delle correzioni.</p><p><strong>Non sei sicuro?</strong> Se non ti senti a tuo agio con questo strumento, scrivi a Tim a <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> e parliamone — possiamo guidarti, oppure fare la revisione per te.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Non mostrare più"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Ho capito — continua"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Troppi scan automatici nell'ultima ora (limite: %d). Aspetta qualche minuto prima di riprovare, oppure usa il flusso manuale claude.ai / Claude Code dalla dashboard."


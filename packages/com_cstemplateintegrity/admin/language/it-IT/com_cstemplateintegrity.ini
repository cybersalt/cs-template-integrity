COM_CSTEMPLATEINTEGRITY_FIELD_GET_JOOMLA_TOKEN="Ottieni token"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Metodo 1: usa Claude.ai o Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Copia un prompt pronto e incollalo in claude.ai o Claude Code. Funziona senza chiave API. Salta al prompt qui sotto."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Metodo 2: esegui scan automatico"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Affida la revisione degli override a Claude lato server usando la tua chiave API Anthropic salvata. Salva il report come una sessione con cui puoi chattare. Salta al pulsante di esecuzione qui sotto."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Salva prima la tua chiave API Anthropic nel pannello Opzioni per attivare gli scan automatici. Nel frattempo, usa il Metodo 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Riscandagliare ogni template attivato e ricostruire il tracker degli override. Usalo dopo aver modificato i file di template fuori da Joomla, o se il tracker di Joomla è obsoleto."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Chiavi &amp; token"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Opzionale. Salva qui una chiave API Anthropic perché l'estensione possa eseguire gli scan automaticamente — niente copia-incolla del prompt in Claude. Lascia vuoto per continuare a usare il flusso manuale claude.ai / Claude Code dalla dashboard."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Chiave API Anthropic"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="La tua chiave API Anthropic personale (inizia con <code>sk-ant-…</code>). Ottienine una su <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. La chiave è memorizzata su questo server e usata solo per chiamare api.anthropic.com per tuo conto. Con una chiave salvata, la dashboard espone un pulsante <em>Esegui scan automatico</em> che affida la revisione degli override a Claude lato server e salva il report come sessione — niente copia-incolla."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Ogni scan automatico effettua una chiamata all'API Anthropic con la tua chiave. Il prezzo è quello che Anthropic addebita per il modello usato (predefinito Claude Sonnet 4.6). I siti con un numero molto elevato di override sono limitati ai primi 60 per esecuzione; rilancia per il resto, oppure usa il flusso manuale Claude Code dalla dashboard per dimensione illimitata."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Modello di scan"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Modello Claude usato per la chiamata singola <em>Esegui scan automatico</em> dalla dashboard. Lo scan è un'attività di classificazione (alert / review / info per scoperta); Haiku la gestisce bene a una frazione del costo di Sonnet. Sonnet è la scelta predefinita sicura. Opus è eccessivo per scan di routine, ma utile se vuoi rigore extra su un sito sensibile alla sicurezza."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Modello di chat"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Modello Claude usato per il chat-con-Claude di follow-up sulla pagina di dettaglio della sessione (dove chiedi a Claude di applicare correzioni o respingere scoperte). L'uso degli strumenti è più impegnativo della classificazione, quindi raccomandiamo Sonnet qui anche se imposti Haiku per lo scan &mdash; le chiamate agli strumenti che Claude sbaglia costano più della differenza di prezzo tra modelli."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Token API Joomla (per il prompt della dashboard)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Opzionale. Genera un token API Joomla in <em>Sistema &rarr; Utenti &rarr; Mio profilo &rarr; Token API Joomla</em> e incollalo qui. I prompt di scan/correzione della dashboard riempiranno automaticamente il token al posto del segnaposto &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, così puoi copia &amp; incolla direttamente in Claude senza modifiche.<br><br><strong>Avviso multi-admin:</strong> i token API Joomla autenticano come <em>l'utente che li ha generati</em>. Se più admin usano questa dashboard, il prompt userà il token salvato qui &mdash; il che significa che Claude chiamerà l'API autenticato come quel singolo utente. Lascia vuoto perché ogni admin incolli il proprio token al momento dell'uso."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Override per scan"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Quanti override di template segnalati il pulsante <em>Esegui scan automatico</em> esamina in una singola chiamata all'API Anthropic. Predefinito <strong>10</strong>. Range 1&ndash;100. <strong>Più basso è più sicuro per il chat di follow-up:</strong> il report dello scan cresce con il numero di scoperte, e il loop di uso degli strumenti del chat conserva quel report come cronologia di conversazione. Sui livelli inferiori di limite di velocità di Anthropic (10K token di input al minuto), uno scan di 60 override più un turno di chat immediato nello stesso minuto restituirà <em>HTTP 429: rate limit exceeded</em>. Con 10 override per esecuzione, i tuoi turni di chat post-scan restano comodamente sotto il limite. I siti con più override di così hanno solo bisogno di alcune esecuzioni in più per coprire tutto &mdash; il report di ogni esecuzione è salvato come sessione propria, quindi puoi chattare con ognuna in modo indipendente."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — il più veloce, costo più basso (~1$ per 1M token di input)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — bilanciato, raccomandato (~3$ per 1M token di input)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — il più capace, costoso (~15$ per 1M token di input, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>Sulla differenza di costo.</strong> Uno scan tipico su un sito con 50 override usa circa 60K token di input e produce circa 5K token di output. Costo approssimativo per scan: <strong>~0,08$ con Haiku, ~0,23$ con Sonnet, ~1,13$ con Opus</strong>. I turni di chat sono molto più piccoli (5K&ndash;10K token di input ciascuno), quindi il costo per turno è circa 10&times; inferiore a uno scan. I prezzi pubblicati da Anthropic sono la fonte di verità su <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; i numeri sopra sono approssimativi e possono variare nel tempo. Se sei nuovo all'API, inizia con Sonnet e tieni d'occhio l'uso su <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> per qualche esecuzione prima di decidere se salire o scendere di livello."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Navigazione del componente"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Metodo 2: esegui scan automatico (con la tua chiave API Anthropic salvata)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Nessuna chiave API Anthropic salvata."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="Chiave API salvata."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="L'estensione eseguirà la revisione degli override sul server usando la tua chiave Anthropic, senza copia-incolla. Il report è salvato automaticamente come nuova sessione."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Clicca qui sotto per avviare uno scan. L'estensione recupera ogni override segnalato su questo sito, lo invia a Claude con la tua chiave API salvata, e salva il report risultante come nuova sessione. Sarai reindirizzato al report quando finisce."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Una chiamata all'API Anthropic per scan. I siti con più di %d override sono limitati ai primi %d per esecuzione (configurabile in <em>Opzioni &rarr; AI provider &rarr; Override per scan</em>); rilancia per il prossimo lotto, oppure usa il flusso manuale claude.ai / Claude Code qui sotto per dimensione illimitata. La pagina può fare pausa per 30&ndash;90 secondi mentre Claude risponde &mdash; è normale, non navigare via."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Questo chiamerà l'API Anthropic con la tua chiave salvata e può richiedere da 30 a 90 secondi. Continuare?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Esegui scan automatico ora"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Clicca <em>Opzioni</em> nella barra strumenti sopra, incolla la tua chiave API Anthropic nella scheda <em>AI provider</em> e salva per attivare questo metodo. Il Metodo 1 sopra funziona ancora senza chiave."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Scan automatico in corso…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Chiamata all'API Anthropic e analisi dei tuoi override. Di solito richiede 30-90 secondi. Per favore non chiudere questa finestra."


COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Continua con Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Di' a Claude cosa fare dopo. Per le scoperte che hai confermato nel report sopra, di' qualcosa come <em>&ldquo;correggi #1 e #3, respingi il resto&rdquo;</em>. Claude eseguirà il lavoro lato server e aggiornerà questo thread con cosa ha fatto. Ogni apply-fix esegue prima un backup automatico del file originale, quindi tutto è reversibile dalla vista Backup file."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_PLACEHOLDER="Di' a Claude cosa correggere o respingere…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_SEND="Invia a Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_CALLED="Chiamato:"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_NOKEY="Per chattare con Claude da questo admin e fargli applicare correzioni per te, salva la tua chiave API Anthropic sotto il pulsante <em>Opzioni</em> della dashboard (scheda AI provider). Senza chiave salvata, usa il prompt manuale claude.ai / Claude Code dalla dashboard per agire su questo report."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_TITLE="Sto chiedendo a Claude…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude sta leggendo il tuo messaggio e può eseguire strumenti apply-fix o dismiss lato server. Può richiedere fino a un minuto. Per favore non chiudere questa finestra."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST="Test connessione"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Invia una piccola richiesta di test a api.anthropic.com con la chiave salvata. Costa quasi nulla — verifica che la chiave sia valida e raggiungibile da questo server."

COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Visa cstemplateintegrity-data"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Tillåter användare i de matchande grupperna att läsa åsidosättningar, sessioner, åtgärdsloggen och säkerhetskopieinnehåll (admin-vyer och läs-API-slutpunkter)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Modifiera cstemplateintegrity-data och åsidosättningsfiler"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Tillåter användare i de matchande grupperna att tillämpa korrigeringar, återställa säkerhetskopior, avvisa åsidosättningsflaggor och skapa eller ta bort sessioner. Innefattar Visa."


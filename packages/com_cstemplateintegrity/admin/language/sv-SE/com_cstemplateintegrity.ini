COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="API-slutpunkt aktiv"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Vilken användare som helst med en giltig Joomla API-token och core.manage-behörighet på denna komponent kan läsa denna webbplats nuvarande mall-åsidosättningsdata."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="Slutpunkts-URL"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Om"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API som exponerar den inbyggda #__template_overrides-spåraren så att Claude (eller någon klient med en Joomla API-token) kan granska varje flaggad åsidosättning, klassificera den och tillämpa patchar direkt. Varje patch säkerhetskopieras först automatiskt till databasen och är reversibel från Filsäkerhetskopior-vyn."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Version"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Börja här."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Detta är det enda kortet du behöver för en normal granskning. Kör prompten, få rapporten, säg sedan till Claude i samma chatt vilka upptäckter som ska korrigeras — ingen andra prompt krävs."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Metod 1: granskning med Claude.ai eller Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="Tillägget exponerar dina åsidosättningsdata via REST. Para ihop dem med Claude (claude.ai eller Claude Code) för att få en automatiserad säkerhetsgranskning av varje flaggad åsidosättning på denna webbplats, och tillämpa sedan de korrigeringar du bekräftar — allt i en chatt."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Generera en Joomla API-token (en gång)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="I Joomla-admin: <em>System → Användare → Min profil → flik Joomla API-token</em>. Klicka på ögon-ikonen för att avslöja token. Du behöver bara göra detta en gång — förvara token säkert."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Öppna Claude och klistra in prompten nedan."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Öppna Claude där du använder det — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> i en webbläsare, kör <code>claude</code> i en terminal (Claude Code), eller något annat verktyg där du har Claude tillgängligt. Ersätt platshållaren med token från steg 1. Webbplatsens URL och slutpunkter är redan ifyllda för denna webbplats.<br><br><strong>Endast claude.ai-användare:</strong> om Claude svarar med «Host not in allowlist», blockerar dess kodexekverings-sandlåda din webbplats. I claude.ai, öppna <em>Inställningar → Funktioner → Kodexekvering → Nätverksåtkomst</em> och lägg till denna webbplats domän. <strong>Stäng sedan den nuvarande chatten och starta en ny</strong> — den pågående chatten fortsätter att använda den gamla tillåtelselistan; bara en ny chatt plockar upp den nyligen tillagda domänen. (Detta gäller både Claude desktop-appen och webbversionen.) Claude Code i en terminal har ingen sådan begränsning och fungerar utan ändringar."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Skicka."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude kommer att hämta listan över åsidosättningar, hämta åsidosättnings- och kärnkällan för varje, och producera en tabell per upptäckt plus en sammanfattning på vanligt språk som du kan vidarebefordra."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Säg till Claude vad som ska korrigeras — i samma chatt."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="När Claude har postat rapporten kommer det att fråga vilka upptäckter du vill ha korrigerade. Svara med dem du bekräftar (t.ex. <em>«korrigera #1 och #3, lämna #2 ifred, den från tredje part frågar jag utvecklaren om»</em>). Claude säkerhetskopierar varje fil innan patchning, så allt kan rullas tillbaka. <strong>Du behöver bara det andra kortet nedan om du stängde chatten och vill komma tillbaka till den senare.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (kopiera och klistra in i Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Kopiera skanningsprompt"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Kopierat!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="De flesta användare behöver INTE detta kort."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Använd detta endast om du startar en <em>ny chatt</em> för att tillämpa korrigeringar från en tidigare granskning — till exempel stängde du den ursprungliga chatten över natten, du lämnar över granskningen till en lagkamrat, eller du körde skanningen i claude.ai och vill göra korrigeringarna i Claude Code. Om din skanningschatt fortfarande är öppen, scrolla upp — prata bara med Claude där."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Fortsätt en tidigare granskning i en ny chatt"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Klistra in denna prompt i en ny Claude-chatt för att ge den kontexten från din tidigare granskning. Den hämtar rapporten från den föregående sessionen, listar upptäckterna och frågar vilka som ska korrigeras. Varje fil säkerhetskopieras innan någon patch landar, så allt är reversibelt."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Kopiera korrigeringsprompt"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Sessionslogg"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Rapporter som skickas in av Claude (eller klistras in för hand) sparas här som sessioner. Klicka på en session för att se den fullständiga rapporten och åtgärderna som kördes under den."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Inga sessioner ännu. Kör prompten ovan och låt antingen Claude POSTa rapporten automatiskt, eller klicka på 'Ny session' för att klistra in den."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Ny session"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Visa alla sessioner"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Efter granskning"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="När du är klar med att agera på Claudes rekommendationer vill du rensa 'Ändringar funna'-märkena som Joomla visar i Mallar så att de inte fortsätter att flagga åsidosättningar du redan hanterat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Rekommenderat — granskning per mall"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Öppna webbplatsens malllista. Varje mall med ett 'Ändringar funna'-märke kan öppnas individuellt så att du kan avvisa de specifika åsidosättningsraderna du har hanterat. Långsammare, men du behåller en granskningsspår per rad."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Öppna webbplatsens mallhantering"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Bulk — markera alla åsidosättningar som granskade"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Snabbare väg: rensa varje rad i åsidosättningsspåraren i ett enda steg. Gör detta endast efter att du faktiskt har granskat varje upptäckt. Motsvarar att använda Joomlas eget 'Avvisa alla' på varje mall samtidigt."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Markera alla som granskade…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Bekräfta: markera alla åsidosättningar som granskade"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Detta rensar varje rad som Joomla för närvarande spårar i åsidosättningsspåraren. 'Ändringar funna'-märkena i Mallar kommer att försvinna, och denna webbplats API-slutpunkt returnerar noll rader tills Joomlas nästa kärnuppdatering återfyller dem. Åtgärden kan inte ångras förutom genom att klicka på 'Bygg om åsidosättningsspårare' nedan för att skanna om."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Jag bekräftar att jag har granskat varje flaggad åsidosättning och accepterar ansvaret för eventuella ej åtgärdade problem."

COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Fortsätt med Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Säg till Claude vad som ska göras härnäst. För upptäckter du bekräftade i rapporten ovan, säg något som <em>&ldquo;korrigera #1 och #3, avvisa resten&rdquo;</em>. Claude kommer att köra arbetet på serversidan och uppdatera denna tråd med vad det gjorde. Varje apply-fix säkerhetskopierar automatiskt originalfilen först, så allt är reversibelt från Filsäkerhetskopior-vyn."

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Jag förstår: att återställa nu kommer att skriva över live-filen. Pre-restore-kopian sparas automatiskt som en ny säkerhetskopia."

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Återställ denna säkerhetskopia"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Skriver över live-filen på sökvägen ovan med säkerhetskopians innehåll. Innan skrivning sparas det aktuella innehållet på den sökvägen som en ny säkerhetskopia, så att denna återställning själv är reversibel — om det går fel, ångra det genom att återställa den nya pre-restore säkerhetskopian."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="Filen skrivs via PHP från denna admin-sida; ingen FTP behövs. Webbanvändaren måste ha skrivbehörighet på målsökvägen. Joomla-webbplatsens rot är gränsen — återställning vägrar att skriva utanför den."

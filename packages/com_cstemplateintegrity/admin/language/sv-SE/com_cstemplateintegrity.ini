COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Klistra in en Claude-rapport"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Manuell inklistring för webbläsar-Claude-användare.</strong> Om du körde skanningsprompten på <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, kopiera Claudes svar och klistra in det här för att spara det som en session. Om du använde <em>Claude Code</em> (i en terminal) behöver du inte detta formulär — Claude POSTar rapporten automatiskt tillbaka till webbplatsen. Sessionen får som standard dagens tidsstämpel som namn; ändra det om du vill."

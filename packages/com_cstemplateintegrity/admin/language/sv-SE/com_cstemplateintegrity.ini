COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Metod 1: använd Claude.ai eller Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Kopiera en färdig prompt och klistra in den i claude.ai eller Claude Code. Fungerar utan API-nyckel. Hoppar till prompten nedan."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Metod 2: kör automatisk skanning"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Lämna över granskningen av åsidosättningar till Claude på serversidan med hjälp av din sparade Anthropic API-nyckel. Sparar rapporten som en session du kan chatta med. Hoppar till körknappen nedan."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Spara först din Anthropic API-nyckel i Alternativ-panelen för att aktivera automatiska skanningar. Använd Metod 1 tills dess."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Gå igenom varje aktiverad mall igen och bygg upp åsidosättningsspåraren på nytt. Använd detta efter att du redigerat mallfiler utanför Joomla, eller om Joomlas spårare är inaktuell."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Nycklar &amp; tokens"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Valfritt. Spara en Anthropic API-nyckel här så att tillägget kan köra skanningar automatiskt — ingen kopiera-och-klistra-prompt i Claude behövs. Lämna tomt för att fortsätta använda det manuella claude.ai / Claude Code-arbetsflödet på instrumentpanelen."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API-nyckel"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Din personliga Anthropic API-nyckel (börjar med <code>sk-ant-…</code>). Skaffa en på <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. Nyckeln lagras på denna server och används endast för att anropa api.anthropic.com å dina vägnar. Med en sparad nyckel exponerar instrumentpanelen en knapp <em>Kör automatisk skanning</em> som lämnar över granskningen av åsidosättningar till Claude på serversidan och sparar rapporten tillbaka som en session — ingen kopiera-och-klistra behövs."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Varje automatisk skanning gör ett Anthropic API-anrop med din nyckel. Priset är vad Anthropic tar för den modell som används (standard Claude Sonnet 4.6). Webbplatser med mycket stort antal åsidosättningar är begränsade till de första 60 per körning; kör igen för resten, eller använd det manuella Claude Code-arbetsflödet på instrumentpanelen för obegränsad storlek."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Skanningsmodell"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Claude-modell som används för engångsanropet <em>Kör automatisk skanning</em> på instrumentpanelen. Skanningen är en klassificeringsuppgift (alert / review / info per upptäckt); Haiku hanterar det bra till en bråkdel av Sonnets kostnad. Sonnet är det säkra standardvalet. Opus är överdrivet för rutinskanningar, men användbart om du vill ha extra noggrannhet på en säkerhetskänslig webbplats."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Chatt-modell"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Claude-modell som används för chatten-med-Claude-uppföljningen på sessionsdetaljsidan (där du ber Claude tillämpa korrigeringar eller avvisa upptäckter). Verktygsanvändning är mer krävande än klassificering, så vi rekommenderar Sonnet här även om du ställer in Haiku för skanningen &mdash; verktygsanrop som Claude gör fel kostar mer än prisskillnaden mellan modellerna."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Joomla API-token (för instrumentpanelens prompt)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Valfritt. Generera en Joomla API-token vid <em>System &rarr; Användare &rarr; Min profil &rarr; Joomla API-token</em> och klistra in den här. Instrumentpanelens skannings/korrigerings-prompts fyller då automatiskt i token i stället för platshållaren &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, så att du kan kopiera &amp; klistra direkt in i Claude utan redigering.<br><br><strong>Multi-admin-varning:</strong> Joomla API-tokens autentiserar som <em>användaren som genererade dem</em>. Om flera admins använder denna instrumentpanel kommer prompten att använda den token som sparas här &mdash; vilket betyder att Claude kommer att anropa API:et autentiserat som den enda användaren. Lämna tomt så att varje admin klistrar in sin egen token vid användningstillfället."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Åsidosättningar per skanning"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Hur många flaggade mall-åsidosättningar knappen <em>Kör automatisk skanning</em> granskar i ett enda Anthropic API-anrop. Standard <strong>10</strong>. Intervall 1&ndash;100. <strong>Lägre är säkrare för chatt-uppföljning:</strong> skanningsrapporten växer med antalet upptäckter, och chattens verktygsanvändningsslinga bevarar den rapporten som konversationshistorik. På Anthropics lägre rate-limit-nivåer (10K input-tokens per minut), kommer en skanning av 60 åsidosättningar plus en omedelbar chattomgång inom samma minut att returnera <em>HTTP 429: rate limit exceeded</em>. Med 10 åsidosättningar per körning håller sig dina chattomgångar efter skanning bekvämt under gränsen. Webbplatser med fler åsidosättningar än så behöver bara några extra körningar för att täcka allt &mdash; rapporten från varje körning sparas som sin egen session, så du kan chatta med var och en oberoende."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — snabbast, lägst kostnad (~1$ per 1M input-tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — balanserad, rekommenderad (~3$ per 1M input-tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — mest kapabel, dyr (~15$ per 1M input-tokens, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>Om kostnadsskillnaden.</strong> En typisk skanning på en webbplats med 50 åsidosättningar använder ungefär 60K input-tokens och producerar ungefär 5K output-tokens. Ungefärlig kostnad per skanning: <strong>~0,08$ med Haiku, ~0,23$ med Sonnet, ~1,13$ med Opus</strong>. Chattomgångar är mycket mindre (5K&ndash;10K input-tokens vardera), så kostnaden per omgång är ungefär 10&times; lägre än en skanning. Anthropics publicerade priser är sanningskällan på <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; siffrorna ovan är ungefärliga och kan variera över tid. Om du är ny på API:et, börja med Sonnet och håll koll på din användning på <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> för några körningar innan du bestämmer dig för att uppgradera eller nedgradera."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Komponentnavigering"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Metod 2: kör automatisk skanning (med din sparade Anthropic API-nyckel)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Ingen Anthropic API-nyckel sparad."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="API-nyckel sparad."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="Tillägget kommer att köra granskningen av åsidosättningar på servern med din Anthropic-nyckel, ingen kopiera-och-klistra krävs. Rapporten sparas automatiskt som en ny session."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Klicka nedan för att starta en skanning. Tillägget hämtar varje flaggad åsidosättning på denna webbplats, skickar den till Claude med din sparade API-nyckel, och sparar den resulterande rapporten som en ny session. Du omdirigeras till rapporten när den är klar."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Ett Anthropic API-anrop per skanning. Webbplatser med mer än %d åsidosättningar är begränsade till de första %d per körning (konfigurerbart i <em>Alternativ &rarr; AI provider &rarr; Åsidosättningar per skanning</em>); kör igen för nästa omgång, eller använd det manuella claude.ai / Claude Code-arbetsflödet nedan för obegränsad storlek. Sidan kan pausa i 30&ndash;90 sekunder medan Claude svarar &mdash; det är normalt, navigera inte bort."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Detta kommer att anropa Anthropic API:et med din sparade nyckel och kan ta 30 till 90 sekunder. Fortsätta?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Kör automatisk skanning nu"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Klicka på <em>Alternativ</em> i verktygsfältet ovan, klistra in din Anthropic API-nyckel under fliken <em>AI provider</em> och spara för att aktivera denna metod. Metod 1 ovan fungerar fortfarande utan nyckel."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Automatisk skanning pågår…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Anropar Anthropic API:et och analyserar dina åsidosättningar. Detta tar vanligtvis 30 till 90 sekunder. Stäng inte detta fönster."


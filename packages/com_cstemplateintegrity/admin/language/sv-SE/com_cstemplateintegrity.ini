COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Sessioner</strong> lagrar Claudes granskningsrapporter. <strong>Åtgärdsloggen</strong> är granskningsspåret för <em>ändringar</em> — när åsidosättningar återställdes eller rensades, när en session skapades, när en säkerhetskopia sparades före en korrigering. Om något går fel på denna webbplats senare är det här du ser vad som gjordes och när."

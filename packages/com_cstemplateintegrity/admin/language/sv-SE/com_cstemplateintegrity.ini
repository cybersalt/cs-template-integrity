COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude läser ditt meddelande och kan köra apply-fix- eller dismiss-verktyg på serversidan. Detta kan ta upp till en minut. Stäng inte detta fönster."

COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Mall-medveten Joomla-integritetsövervakare. Exponerar den inbyggda #__template_overrides-spåraren via ett Joomla Web Services-API, så att Claude (eller någon klient med en Joomla API-token) kan granska varje flaggad åsidosättning, klassificera den som alert / review / info och tillämpa patchar direkt — automatiskt säkerhetskopierade och reversibla från admin."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Innan du börjar"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Se till att du har en aktuell säkerhetskopia av din webbplats</strong> innan du låter detta tillägg ändra något. Vi rekommenderar starkt Akeeba Backup eller säkerhetskopieringsfunktionen från din hosting-leverantör.</p><p><strong>Vad detta tillägg gör:</strong> det parar din Joomla-webbplats med en AI (Claude) för att granska varje flaggad mall-åsidosättning, klassificera varje som säkerhetsvarning, kosmetisk skillnad eller legitim anpassning, och tillämpa de patchar du bekräftar. Varje patch säkerhetskopieras först automatiskt till databasen, så individuella ändringar är reversibla — men en fullständig webbplats-säkerhetskopia förblir ditt skyddsnät för allt annat.</p><p><strong>AI kan göra fel.</strong> Claude kan klassificera något fel eller föreslå en patch som bryter en funktion. Läs alltid vad som föreslås innan du säger «ja, tillämpa det», och testa webbplatsen efter att korrigeringarna har tillämpats.</p><p><strong>Osäker?</strong> Om du inte känner dig bekväm med detta verktyg, mejla Tim på <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> så pratar vi — vi kan vägleda dig, eller göra granskningen åt dig.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Visa inte detta igen"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Jag förstår — fortsätt"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="För många automatiska skanningar under den senaste timmen (gräns: %d). Vänta några minuter innan du försöker igen, eller använd det manuella claude.ai / Claude Code-arbetsflödet på instrumentpanelen."


COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Kunde inte rensa åsidosättningsspåraren: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Återställ åsidosättningar för granskning"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Har du (eller en tidigare utvecklare) godkänt åsidosättningar tidigare utan att verkligen kontrollera dem? Klicka här för att ta tillbaka varje åsidosättningsfil till spåraren så att du kan granska var och en korrekt med Claude. Användbart efter ett 'Avvisa alla' som hände innan detta verktyg installerades."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Går igenom <code>html/</code>-mappen i varje aktiverad mall och infogar en rad i <code>#__template_overrides</code> för varje åsidosättningsfil som inte redan spåras. Befintliga rader lämnas ifred. Återställda rader dyker upp igen som 'Ändringar funna'-märken i Mallar-admin så att du kan köra granskningsarbetsflödet ovan mot dem."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Återställ alla åsidosättningar för granskning"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Återställa alla åsidosättningar för granskning? Varje åsidosättningsfil på denna webbplats kommer att dyka upp igen i 'Ändringar funna'-märkena i Mallar så att den kan utvärderas på nytt."


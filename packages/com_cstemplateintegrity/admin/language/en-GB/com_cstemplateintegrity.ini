COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Every administrative event that touched the override tracker, the session log, or the file backups is recorded here. Read-only."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Sessions</strong> store Claude's review reports. <strong>The Action log</strong> is the audit trail of <em>changes</em> — when overrides got reset or cleared, when a session was created, when a backup was saved before a fix. If something goes wrong on this site later, this is where you'll see what was done and when."

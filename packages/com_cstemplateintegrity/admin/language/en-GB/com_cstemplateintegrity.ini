COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Any user with a valid Joomla API token and core.manage permission on this component can read this site's current template-override data."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="Endpoint URL"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="About"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API surfacing the native #__template_overrides tracker so Claude (or any client with a Joomla API token) can review every flagged override, classify it, and apply patches in place. Every patch is auto-backed-up to the database first and reversible from the File backups view."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Version"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Start here."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="This is the only card you need for a normal review. Run the prompt, get the report, then tell Claude in the same chat which findings to fix — no second prompt required."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Run a review with Claude"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="The extension exposes your override data via REST. Pair it with Claude (claude.ai or Claude Code) to get an automated security review of every flagged override on this site, then apply the fixes you confirm — all in one chat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Generate a Joomla API token (one-time)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="In the Joomla admin: <em>System → Users → My Profile → Joomla API Token</em> tab. Click the eye icon to reveal the token. You only need to do this once — keep the token somewhere safe."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Open Claude and paste the prompt below."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Open Claude wherever you use it — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> in a browser, run <code>claude</code> in a terminal (Claude Code), or any other tool you have Claude available in. Replace the placeholder with the token from step 1. The site URL and endpoints are already filled in for this site.<br><br><strong>claude.ai users only:</strong> if Claude replies with “Host not in allowlist”, its code-execution sandbox is blocking your site. In claude.ai, open <em>Settings → Capabilities → Code execution → Network access</em> and add this site's domain. <strong>Then close the current chat and start a new one</strong> — the running chat keeps using the old allowlist; only a fresh chat picks up the newly-added domain. (This applies to both the Claude desktop app and the web version.) Claude Code in a terminal has no such restriction and will work without changes."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Send."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude will pull the list of overrides, fetch the override and core source for each one, and produce a per-finding table plus a plain-language summary you can forward."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Tell Claude what to fix — in the same chat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Once Claude posts the report, it will ask which findings you want fixed. Reply with the ones you confirm (e.g. <em>“fix #1 and #3, leave #2 alone, the third-party one I'll ask the developer about”</em>). Claude backs each file up before patching, so anything can be rolled back. <strong>You only need the second card below if you closed the chat and want to come back to it later.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (copy and paste into Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Copy scan prompt"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Copied!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="Most users do NOT need this card."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Use this only if you're starting a <em>fresh chat</em> to apply fixes from a previous review — for example you closed the original chat overnight, you're handing the review to a teammate, or you ran the scan in claude.ai and want to do the fixes in Claude Code. If your scan chat is still open, scroll back up — just talk to Claude there."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Continue a previous review in a new chat"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Paste this prompt into a fresh Claude chat to give it the context from your earlier review. It will fetch the previous session report, list the findings, and ask you which to fix. Each file is backed up before any patch lands, so anything is reversible."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Copy fix prompt"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Session log"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Reports submitted by Claude (or pasted in by hand) are saved here as sessions. Click a session to view the full report and the actions that ran during it."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="No sessions yet. Run the prompt above and either let Claude POST the report back automatically, or click 'New session' to paste it in."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="New session"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="View all sessions"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="After review"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="When you're done acting on Claude's recommendations, you'll want to clear the 'Changes found' badges Joomla shows in Templates so they don't keep flagging the overrides you've already handled."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Recommended — per-template review"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Open the Site Templates list. Each template with a 'Changes found' badge can be opened individually so you can dismiss the specific override rows you've handled. Slower, but you keep a per-row audit trail."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Open Site Templates"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Bulk — mark every override as reviewed"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Faster path: clear every row in the override tracker in one step. Only do this once you've actually reviewed each finding. Equivalent to using Joomla's own 'Dismiss All' on every template at once."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Mark all as reviewed…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Confirm: mark all overrides as reviewed"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="This clears every row Joomla is currently tracking in the override tracker. The 'Changes found' badges in Templates will disappear, and this site's API endpoint will return zero rows until Joomla's next core update repopulates them. The action cannot be undone except by clicking 'Rebuild override tracker' below to re-scan."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="I confirm I have reviewed every flagged override and I accept responsibility for any unaddressed issues."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Yes — mark all reviewed"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="%d override row(s) marked as reviewed and cleared from the tracker."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="There were no override rows to clear."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Could not clear the override tracker: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Reset overrides for review"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Have you (or a previous developer) approved overrides in the past without truly checking them? Click here to bring every override file back into the tracker so you can review each one properly with Claude. Useful after a 'Dismiss All' that happened before this tool was installed."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Walks every enabled template's <code>html/</code> folder and inserts a row in <code>#__template_overrides</code> for any override file that isn't already tracked. Existing rows are left alone. Reset rows reappear as 'Changes found' badges in the Templates admin so you can run the review workflow above against them."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Reset all overrides for review"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Reset all overrides for review? Every override file on this site will reappear in the Templates 'Changes found' badges so it can be re-evaluated."


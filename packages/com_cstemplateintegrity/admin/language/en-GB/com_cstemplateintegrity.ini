COM_CSTEMPLATEINTEGRITY="CS Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Template-literate Joomla integrity monitor. Surfaces the native #__template_overrides tracker via a Joomla Web Services API so Claude (or any client with a Joomla API token) can review every flagged override, classify it as alert / review / info, and apply patches in place — auto-backed-up and reversible from the admin."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Before you start"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Please make sure you have a recent backup of your website</strong> before you let this extension change anything. We strongly recommend Akeeba Backup or your host's backup feature.</p><p><strong>What this extension does:</strong> it pairs your Joomla site with an AI (Claude) to review every flagged template override, classify each one as a security alert, a cosmetic difference, or a legitimate customisation, and apply the patches you confirm. Every patch is auto-backed-up to the database first, so individual changes are reversible — but a full-site backup is still your safety net for everything else.</p><p><strong>AI can make mistakes.</strong> Claude may misclassify something or propose a patch that breaks a feature. Always read what it proposes before saying “yes, apply it”, and test the site after fixes are applied.</p><p><strong>Not sure?</strong> If you're not comfortable using this tool, email Tim at <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> and let's talk — we can walk you through it, or do the review for you.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Don't show this again"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="I understand — continue"

COM_CSTEMPLATEINTEGRITY_FIELD_APIKEY_REVEAL="Reveal"
COM_CSTEMPLATEINTEGRITY_FIELD_APIKEY_HIDE="Hide"

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="AI provider"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Optional. Save an Anthropic API key here so the extension can run scans automatically — no copy-paste prompt into Claude required. Leave blank to keep using the manual claude.ai / Claude Code workflow on the dashboard."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API key"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Your personal Anthropic API key (starts with <code>sk-ant-…</code>). Get one from <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. The key is stored on this server and used only to call api.anthropic.com on your behalf. With a key saved, the Dashboard exposes a <em>Run automated scan</em> button that hands the override review off to Claude server-side and saves the report back as a session — no copy-paste needed."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Each automated scan makes one Anthropic API call against your key. Pricing is whatever Anthropic charges for the model used (defaults to Claude Sonnet 4.6). Sites with very large numbers of overrides are capped to the first 60 per run; rerun for the rest, or use the manual Claude Code workflow on the dashboard for unlimited size."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Scan model"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Claude model used for the one-shot <em>Run automated scan</em> call on the dashboard. The scan is a classification job (alert / review / info per finding); Haiku handles it well at a fraction of Sonnet's cost. Sonnet is the safe default. Opus is overkill for routine scans but useful if you want extra rigor on a security-sensitive site."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Chat model"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Claude model used for the chat-with-Claude follow-up on the session detail page (where you ask Claude to apply fixes or dismiss findings). Tool use is more demanding than classification, so we recommend Sonnet here even if you set the scan model to Haiku &mdash; tool calls Claude gets wrong cost more than the model price difference."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — fastest, lowest cost (~$1 per 1M input tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — balanced, recommended (~$3 per 1M input tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — most capable, expensive (~$15 per 1M input tokens, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>About the cost difference.</strong> A typical scan on a 50-override site uses about 60K input tokens and produces about 5K output tokens. Rough cost per scan: <strong>~$0.08 on Haiku, ~$0.23 on Sonnet, ~$1.13 on Opus</strong>. Chat turns are much smaller (5K&ndash;10K input tokens each) so the per-turn cost is roughly 10&times; less than a scan. Anthropic's published pricing is the source of truth at <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; the numbers above are approximate and may drift over time. If you're new to the API, start with Sonnet and watch your usage on <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> for a few runs before deciding whether to upgrade or downgrade."


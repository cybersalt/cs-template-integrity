COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Metoda 1: Użyj Claude.ai lub Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Skopiuj gotowy prompt i wklej go do claude.ai lub Claude Code. Działa bez klucza API. Przejście do promptu poniżej."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Metoda 2: Uruchom skan automatyczny"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Przekaż przegląd nadpisań do Claude po stronie serwera, używając zapisanego klucza Anthropic API. Zapisuje raport jako sesję, z którą można rozmawiać. Przejście do przycisku uruchomienia poniżej."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Najpierw należy zapisać klucz Anthropic API w panelu Opcji, aby włączyć skany automatyczne. Do tego czasu prosimy korzystać z Metody 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Ponowne przejście przez każdy włączony szablon i odbudowanie trackera nadpisań. Należy użyć po edycji plików szablonu poza Joomla lub gdy tracker Joomla jest nieaktualny."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Klucze i tokeny"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Opcjonalnie. Należy zapisać tutaj klucz Anthropic API, aby rozszerzenie mogło uruchamiać skany automatycznie — bez konieczności kopiowania promptu do Claude. Pozostawić puste, aby nadal korzystać z ręcznego procesu claude.ai / Claude Code w panelu."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Klucz Anthropic API"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Państwa osobisty klucz Anthropic API (zaczyna się od <code>sk-ant-…</code>). Można go uzyskać pod adresem <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. Klucz jest przechowywany na tym serwerze i używany wyłącznie do wywołań api.anthropic.com w Państwa imieniu. Po zapisaniu klucza panel udostępnia przycisk <em>Uruchom skan automatyczny</em>, który przekazuje przegląd nadpisań do Claude po stronie serwera i zapisuje raport jako sesję — bez kopiowania i wklejania."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Każdy automatyczny skan wykonuje jedno wywołanie Anthropic API z użyciem Państwa klucza. Cena to ta, którą Anthropic pobiera za użyty model (domyślnie Claude Sonnet 4.6). Witryny z bardzo dużą liczbą nadpisań są ograniczone do pierwszych 60 na uruchomienie; należy uruchomić ponownie dla pozostałych lub skorzystać z ręcznego procesu Claude Code w panelu, aby uzyskać nieograniczony rozmiar."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Model skanowania"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Model Claude używany do jednorazowego wywołania <em>Uruchom skan automatyczny</em> w panelu. Skan to zadanie klasyfikacyjne (alert / przegląd / informacja dla każdego ustalenia); Haiku radzi sobie z tym dobrze za ułamek kosztu Sonnet. Sonnet to bezpieczne ustawienie domyślne. Opus to przesada dla rutynowych skanów, ale przydaje się, gdy chcą Państwo dodatkowej dokładności na witrynie wrażliwej pod kątem bezpieczeństwa."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Model czatu"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Model Claude używany do rozmowy z Claude na stronie szczegółów sesji (gdzie proszą Państwo Claude o zastosowanie poprawek lub odrzucenie ustaleń). Użycie narzędzi jest bardziej wymagające niż klasyfikacja, dlatego zalecamy tutaj Sonnet, nawet jeśli ustawili Państwo model skanowania na Haiku &mdash; błędne wywołania narzędzi przez Claude kosztują więcej niż różnica w cenie modelu."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Token API Joomla (do promptu w panelu)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Opcjonalnie. Należy wygenerować token API Joomla w <em>System &rarr; Użytkownicy &rarr; Mój profil &rarr; Token Joomla API</em> i wkleić go tutaj. Prompty skanowania / poprawek w panelu automatycznie wypełnią token w miejsce zastępcy &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, więc można skopiować i wkleić bezpośrednio do Claude bez edycji.<br><br><strong>Uwaga przy wielu administratorach:</strong> tokeny API Joomla uwierzytelniają jako <em>użytkownik, który je wygenerował</em>. Jeśli z tego panelu korzysta wielu administratorów, prompt użyje tego tokenu, który jest tutaj zapisany &mdash; co oznacza, że Claude będzie wywoływał API uwierzytelniając się jako ten jeden użytkownik. Pozostawić puste, aby każdy administrator wklejał własny token w momencie użycia."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Nadpisań na skan"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Ile oznaczonych nadpisań szablonu przegląda przycisk <em>Uruchom skan automatyczny</em> w pojedynczym wywołaniu Anthropic API. Domyślnie <strong>10</strong>. Zakres 1&ndash;100. <strong>Niższa wartość jest bezpieczniejsza dla późniejszego czatu:</strong> raport ze skanu rośnie wraz z liczbą ustaleń, a pętla użycia narzędzi w czacie zachowuje ten raport jako historię konwersacji. Na niższych poziomach limitów Anthropic (10 tys. tokenów wejściowych na minutę) skan 60 nadpisań plus natychmiastowa tura czatu w tej samej minucie zwróci <em>HTTP 429: rate limit exceeded</em>. Przy 10 nadpisaniach na uruchomienie tury czatu po skanie pozostają komfortowo poniżej limitu. Witryny z większą liczbą nadpisań wymagają tylko kilku ponownych uruchomień, aby objąć wszystko &mdash; raport z każdego uruchomienia zapisuje się jako odrębna sesja, więc można rozmawiać o każdej niezależnie."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — najszybszy, najtańszy (~1 USD za 1 mln tokenów wejściowych)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — zrównoważony, zalecany (~3 USD za 1 mln tokenów wejściowych)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — najwydajniejszy, drogi (~15 USD za 1 mln tokenów wejściowych, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>O różnicy w cenie.</strong> Typowy skan na witrynie z 50 nadpisaniami zużywa około 60 tys. tokenów wejściowych i wytwarza około 5 tys. tokenów wyjściowych. Przybliżony koszt skanu: <strong>~0,08 USD na Haiku, ~0,23 USD na Sonnet, ~1,13 USD na Opus</strong>. Tury czatu są znacznie mniejsze (5&ndash;10 tys. tokenów wejściowych każda), więc koszt na turę jest mniej więcej 10&times; mniejszy niż koszt skanu. Opublikowany cennik Anthropic jest źródłem prawdy pod adresem <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; powyższe liczby są przybliżone i mogą się zmieniać w czasie. Jeśli dopiero zaczynają Państwo z API, prosimy zacząć od Sonnet i obserwować zużycie na <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> przez kilka uruchomień przed decyzją o przejściu wyżej lub niżej."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Nawigacja komponentu"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Metoda 2: Uruchom skan automatyczny (z użyciem zapisanego klucza Anthropic API)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Brak zapisanego klucza Anthropic API."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="Klucz API zapisany."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="Rozszerzenie wykona przegląd nadpisań na serwerze, używając Państwa klucza Anthropic, bez konieczności kopiowania i wklejania. Raport zostanie automatycznie zapisany jako nowa sesja."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Kliknięcie poniżej rozpoczyna skan. Rozszerzenie pobiera każde oznaczone nadpisanie z tej witryny, wysyła je do Claude z zapisanym kluczem API i zapisuje powstały raport jako nową sesję. Po zakończeniu nastąpi przekierowanie do raportu."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Jedno wywołanie Anthropic API na skan. Witryny z więcej niż %d nadpisaniami są ograniczone do pierwszych %d na uruchomienie (konfigurowalne w <em>Opcje &rarr; Dostawca AI &rarr; Nadpisań na skan</em>); należy uruchomić ponownie dla kolejnej partii lub skorzystać z ręcznego procesu claude.ai / Claude Code poniżej, aby uzyskać nieograniczony rozmiar. Strona może wstrzymać się na 30&ndash;90 sekund, gdy Claude odpowiada &mdash; to normalne, prosimy nie odchodzić od strony."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Spowoduje to wywołanie Anthropic API na zapisanym kluczu i może potrwać od 30 do 90 sekund. Kontynuować?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Uruchom teraz skan automatyczny"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Należy kliknąć <em>Opcje</em> na pasku narzędzi powyżej, wkleić klucz Anthropic API w zakładce <em>Dostawca AI</em> i zapisać, aby włączyć tę metodę. Metoda 1 powyżej działa również bez klucza."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Trwa skan automatyczny…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Wywoływanie Anthropic API i analiza nadpisań. Zwykle trwa to od 30 do 90 sekund. Prosimy nie zamykać tego okna."


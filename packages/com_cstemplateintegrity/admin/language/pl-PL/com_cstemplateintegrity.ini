COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Przywróć tę kopię zapasową"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Nadpisuje plik na żywo pod powyższą ścieżką zawartością kopii zapasowej. Przed zapisem aktualna zawartość tej ścieżki jest zapisywana jako świeża kopia zapasowa, dzięki czemu samo to przywrócenie również jest odwracalne — w razie problemu można je cofnąć, przywracając nową kopię zapasową utworzoną przed przywróceniem."

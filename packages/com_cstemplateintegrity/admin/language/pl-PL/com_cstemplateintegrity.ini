COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_API_BASE="Bazowy adres URL API"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_AUTOSCAN_CAP="Limit skanu automatycznego"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_NO_KEY="Nie zapisano klucza Anthropic API. Należy kliknąć Opcje na pasku narzędzi i dodać klucz w zakładce Dostawca AI, a następnie spróbować ponownie."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_SUCCESS="Skan automatyczny zakończony: przejrzano %1$d nadpisań i zapisano jako sesja #%2$d."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_TRUNCATED="Ta witryna ma więcej niż %d nadpisań; pozostałe wymagają ponownego uruchomienia. Należy skorzystać z ręcznego promptu claude.ai / Claude Code dla jednorazowych przeglądów o nieograniczonym rozmiarze."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_ERROR="Skan automatyczny nie powiódł się: %s"

COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Wyświetlanie danych cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Pozwala użytkownikom z dopasowanych grup odczytywać nadpisania, sesje, dziennik akcji oraz zawartość kopii zapasowych (widoki administracyjne i odczytowe punkty końcowe API)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Modyfikowanie danych cstemplateintegrity i plików nadpisań"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Pozwala użytkownikom z dopasowanych grup stosować poprawki, przywracać kopie zapasowe, odrzucać oznaczenia nadpisań oraz tworzyć i usuwać sesje. Implikuje uprawnienie Wyświetlanie."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Panel"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="Punkt końcowy API aktywny"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Każdy użytkownik z prawidłowym tokenem API Joomla i uprawnieniem core.manage do tego komponentu może odczytać aktualne dane o nadpisaniach szablonu tej witryny."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="Adres URL punktu końcowego"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Informacje"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API udostępniające natywny tracker #__template_overrides, dzięki czemu Claude (lub dowolny klient z tokenem API Joomla) może przeglądać każde oznaczone nadpisanie, klasyfikować je i stosować poprawki na miejscu. Każda poprawka jest najpierw automatycznie kopiowana do bazy danych i można ją cofnąć z widoku Kopie zapasowe plików."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Wersja"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Zacznij tutaj."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="To jedyna karta potrzebna do zwykłego przeglądu. Należy uruchomić prompt, otrzymać raport, a następnie powiedzieć Claude w tym samym czacie, które ustalenia naprawić — bez potrzeby drugiego promptu."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Metoda 1: Przegląd przy użyciu Claude.ai lub Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="Rozszerzenie udostępnia dane o nadpisaniach przez REST. Połącz to z Claude (claude.ai lub Claude Code), aby uzyskać automatyczny przegląd bezpieczeństwa każdego oznaczonego nadpisania na tej witrynie, a następnie zastosować potwierdzone poprawki — wszystko w jednym czacie."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Wygeneruj token API Joomla (jednorazowo)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="W panelu administracyjnym Joomla: zakładka <em>System → Użytkownicy → Mój profil → Token Joomla API</em>. Należy kliknąć ikonę oka, aby ujawnić token. Trzeba to zrobić tylko raz — token należy przechować w bezpiecznym miejscu."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Otwórz Claude i wklej prompt poniżej."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Należy otworzyć Claude tam, gdzie się go używa — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> w przeglądarce, polecenie <code>claude</code> w terminalu (Claude Code) lub dowolne inne narzędzie, w którym dostępny jest Claude. Należy zastąpić zastępcę tokenem z kroku 1. Adres URL witryny i punkty końcowe są już wypełnione dla tej witryny.<br><br><strong>Tylko dla użytkowników claude.ai:</strong> jeśli Claude odpowiada „Host not in allowlist”, jego piaskownica wykonywania kodu blokuje Państwa witrynę. W claude.ai należy otworzyć <em>Settings → Capabilities → Code execution → Network access</em> i dodać domenę tej witryny. <strong>Następnie należy zamknąć bieżący czat i rozpocząć nowy</strong> &mdash; działający czat dalej używa starej listy dozwolonych; tylko świeży czat odbiera świeżo dodaną domenę. (Dotyczy to zarówno aplikacji Claude na komputery, jak i wersji webowej.) Claude Code w terminalu nie ma takiego ograniczenia i będzie działał bez zmian."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Wyślij."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude pobierze listę nadpisań, sprowadzi źródła nadpisania i pliku rdzenia dla każdego z nich oraz wytworzy tabelę dla każdego ustalenia plus podsumowanie w prostym języku, które można przekazać dalej."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Powiedz Claude, co naprawić — w tym samym czacie."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Po opublikowaniu raportu przez Claude zapyta on, które ustalenia chcą Państwo naprawić. Należy odpowiedzieć tymi, które się potwierdza (np. <em>„napraw #1 i #3, zostaw #2 w spokoju, o trzecim porozmawiam z deweloperem”</em>). Claude tworzy kopię zapasową każdego pliku przed wprowadzeniem poprawek, więc każdą zmianę można wycofać. <strong>Druga karta poniżej jest potrzebna tylko, jeśli zamknęli Państwo czat i chcą do niego wrócić później.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (skopiuj i wklej do Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Kopiuj prompt skanowania"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Skopiowano!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="Większość użytkowników NIE potrzebuje tej karty."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Należy z niej korzystać tylko, jeśli rozpoczynają Państwo <em>nowy czat</em>, aby zastosować poprawki z wcześniejszego przeglądu — na przykład gdy zamknęli Państwo pierwotny czat na noc, przekazują przegląd współpracownikowi lub uruchomili skan w claude.ai i chcą wykonać poprawki w Claude Code. Jeśli Państwa czat skanowania jest nadal otwarty, prosimy przewinąć w górę — wystarczy tam porozmawiać z Claude."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Kontynuuj wcześniejszy przegląd w nowym czacie"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Wklejenie tego promptu do nowego czatu Claude przekaże mu kontekst wcześniejszego przeglądu. Pobierze poprzedni raport sesji, wyświetli ustalenia i zapyta, które naprawić. Każdy plik jest kopiowany przed wprowadzeniem poprawki, więc każdą zmianę można cofnąć."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Kopiuj prompt poprawek"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Dziennik sesji"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Raporty przesłane przez Claude (lub wklejone ręcznie) są tu zapisywane jako sesje. Kliknięcie sesji pozwala wyświetlić pełny raport oraz akcje wykonane podczas tej sesji."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Brak sesji. Należy uruchomić prompt powyżej i albo pozwolić Claude automatycznie odesłać raport metodą POST, albo kliknąć „Nowa sesja”, aby go wkleić."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Nowa sesja"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Wyświetl wszystkie sesje"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Po przeglądzie"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Po zakończeniu działań na podstawie zaleceń Claude warto wyczyścić plakietki „Wykryto zmiany”, które Joomla pokazuje w Szablonach, aby nie oznaczały dalej nadpisań, którymi już się Państwo zajęli."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Zalecane — przegląd dla każdego szablonu"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Otwiera listę Szablonów witryny. Każdy szablon z plakietką „Wykryto zmiany” można otworzyć osobno, aby odrzucić konkretne wiersze nadpisań, które już zostały obsłużone. Wolniejsze, ale zachowuje ślad audytowy dla każdego wiersza."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Otwórz zarządzanie szablonami witryny"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Zbiorczo — oznacz każde nadpisanie jako przejrzane"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Szybsza droga: czyści wszystkie wiersze w trackerze nadpisań w jednym kroku. Należy użyć tylko, gdy faktycznie przejrzano każde ustalenie. Odpowiednik użycia funkcji „Odrzuć wszystkie” w Joomla na każdym szablonie naraz."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Oznacz wszystkie jako przejrzane…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Potwierdź: oznacz wszystkie nadpisania jako przejrzane"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Czyści to każdy wiersz, który Joomla obecnie śledzi w trackerze nadpisań. Plakietki „Wykryto zmiany” w Szablonach znikną, a punkt końcowy API tej witryny będzie zwracał zero wierszy aż do następnej aktualizacji rdzenia Joomla, która je odtworzy. Akcji nie można cofnąć inaczej niż przez kliknięcie „Odbuduj tracker nadpisań” poniżej, aby ponownie przeskanować."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Potwierdzam, że przejrzałem/przejrzałam każde oznaczone nadpisanie i przyjmuję odpowiedzialność za wszelkie nieobsłużone problemy."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Tak — oznacz wszystkie jako przejrzane"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="Oznaczono jako przejrzane i wyczyszczono z trackera %d wierszy nadpisań."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="Nie było wierszy nadpisań do wyczyszczenia."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Nie można było wyczyścić trackera nadpisań: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Zresetuj nadpisania do przeglądu"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Czy Państwo (lub poprzedni deweloper) zatwierdzili w przeszłości nadpisania bez prawdziwego ich sprawdzenia? Kliknięcie tutaj wprowadza ponownie każdy plik nadpisania do trackera, aby można było rzetelnie przejrzeć każdy z nich razem z Claude. Przydatne po „Odrzuć wszystkie”, które miało miejsce przed instalacją tego narzędzia."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Przechodzi przez folder <code>html/</code> każdego włączonego szablonu i wstawia wiersz w <code>#__template_overrides</code> dla każdego pliku nadpisania, który nie jest jeszcze śledzony. Istniejące wiersze są pozostawiane bez zmian. Zresetowane wiersze pojawiają się ponownie jako plakietki „Wykryto zmiany” w panelu Szablonów, dzięki czemu można uruchomić względem nich proces przeglądu opisany powyżej."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Zresetuj wszystkie nadpisania do przeglądu"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Zresetować wszystkie nadpisania do przeglądu? Każdy plik nadpisania na tej witrynie pojawi się ponownie w plakietkach „Wykryto zmiany” w Szablonach, aby można było go ponownie ocenić."


COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Wklej raport Claude"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Ręczne wklejenie dla użytkowników Claude w przeglądarce.</strong> Jeśli uruchomili Państwo prompt skanowania na <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, prosimy skopiować odpowiedź Claude i wkleić ją tutaj, aby zapisać jako sesję. Jeśli używali Państwo <em>Claude Code</em> (w terminalu), ten formularz nie jest potrzebny — Claude odsyła raport do witryny automatycznie. Sesja jest domyślnie nazywana znacznikiem czasu z dzisiejszej daty; można to zmienić."

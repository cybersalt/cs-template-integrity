COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Kontynuuj z Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Należy powiedzieć Claude, co zrobić dalej. Dla ustaleń potwierdzonych w raporcie powyżej można napisać coś w stylu <em>&ldquo;napraw #1 i #3, odrzuć resztę&rdquo;</em>. Claude wykona pracę po stronie serwera i zaktualizuje ten wątek o tym, co zrobił. Każda akcja zastosowania poprawki automatycznie tworzy kopię zapasową oryginalnego pliku, więc każdą zmianę można cofnąć z widoku Kopie zapasowe plików."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_PLACEHOLDER="Powiedz Claude, co naprawić lub odrzucić…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_SEND="Wyślij do Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_CALLED="Wywołano:"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_NOKEY="Aby rozmawiać z Claude z poziomu panelu administracyjnego i zlecać mu stosowanie poprawek, należy zapisać klucz Anthropic API pod przyciskiem <em>Opcje</em> panelu (zakładka Dostawca AI). Bez zapisanego klucza prosimy korzystać z ręcznego promptu claude.ai / Claude Code w panelu, aby podjąć działania na podstawie tego raportu."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_TITLE="Pytamy Claude…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude czyta wiadomość i może uruchomić narzędzia stosowania poprawek lub odrzucania po stronie serwera. Może to potrwać do minuty. Prosimy nie zamykać tego okna."

COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Monitor integralności Joomla zorientowany na szablony. Udostępnia natywny tracker #__template_overrides poprzez Joomla Web Services API, dzięki czemu Claude (lub dowolny klient z tokenem API Joomla) może przejrzeć każde oznaczone nadpisanie, sklasyfikować je jako alert / przegląd / informację oraz zastosować poprawki na miejscu — z automatyczną kopią zapasową i możliwością cofnięcia z poziomu panelu administracyjnego."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Zanim zaczniesz"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Prosimy upewnić się, że posiadają Państwo aktualną kopię zapasową witryny</strong>, zanim pozwolą Państwo temu rozszerzeniu cokolwiek zmienić. Zdecydowanie zalecamy Akeeba Backup lub funkcję kopii zapasowej oferowaną przez hosting.</p><p><strong>Co robi to rozszerzenie:</strong> łączy Państwa stronę Joomla ze sztuczną inteligencją (Claude), aby przejrzeć każde oznaczone nadpisanie szablonu, sklasyfikować je jako alert bezpieczeństwa, różnicę kosmetyczną lub uzasadnioną modyfikację, a następnie zastosować potwierdzone przez Państwa poprawki. Każda poprawka jest najpierw automatycznie kopiowana do bazy danych, więc poszczególne zmiany można cofnąć — pełna kopia zapasowa witryny pozostaje jednak siatką bezpieczeństwa dla wszystkiego pozostałego.</p><p><strong>Sztuczna inteligencja może popełniać błędy.</strong> Claude może coś źle sklasyfikować lub zaproponować poprawkę, która zepsuje funkcjonalność. Należy zawsze przeczytać propozycję przed wyrażeniem zgody na jej zastosowanie i przetestować witrynę po wprowadzeniu poprawek.</p><p><strong>Nie ma pewności?</strong> Jeśli nie czują się Państwo komfortowo, korzystając z tego narzędzia, prosimy napisać do Tima na adres <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> i porozmawiajmy — przeprowadzimy Państwa przez ten proces lub wykonamy przegląd za Państwa.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Nie pokazuj ponownie"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Rozumiem — kontynuuj"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Zbyt wiele automatycznych skanów w ciągu ostatniej godziny (limit: %d). Prosimy poczekać kilka minut przed ponowną próbą lub skorzystać z ręcznego procesu claude.ai / Claude Code dostępnego w panelu."


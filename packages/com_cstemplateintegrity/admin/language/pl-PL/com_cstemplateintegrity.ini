COM_CSTEMPLATEINTEGRITY_SESSIONFORM_NAME_HELP="Domyślnie ustawiana na bieżący znacznik czasu YYYY-MM-DD-HHMMSS. Używana jako widoczna etykieta w dzienniku sesji."

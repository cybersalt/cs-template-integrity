COM_CSTEMPLATEINTEGRITY_ACTIONS_TITLE="Cybersalt Template Integrity — Dziennik akcji"
COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Każde zdarzenie administracyjne, które dotknęło tracker nadpisań, dziennik sesji lub kopie zapasowe plików, jest tu rejestrowane. Tylko do odczytu."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Sesje</strong> przechowują raporty z przeglądów Claude. <strong>Dziennik akcji</strong> to ślad audytowy <em>zmian</em> — kiedy nadpisania zostały zresetowane lub wyczyszczone, kiedy utworzono sesję, kiedy zapisano kopię zapasową przed poprawką. Jeśli coś pójdzie nie tak na tej witrynie później, tutaj zobaczą Państwo, co i kiedy zostało zrobione."

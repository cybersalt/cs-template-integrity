COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_TITLE="Przywróć ręcznie (FTP / Państwa edytor)"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="Jeśli wolą Państwo, aby rozszerzenie nie zapisywało na dysku:"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="Należy kliknąć <em>Pobierz kopię zapasową</em> powyżej (lub skopiować blok Zawartość kopii zapasowej)."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="Należy otworzyć klienta FTP, klienta SFTP lub menedżera plików hostingu."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="Należy zastąpić plik pod ścieżką docelową poniżej pobraną kopią."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_DESTINATION="Ścieżka docelowa na serwerze"

COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Gdzie znajduje się ta kopia zapasowa"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="Zawartość kopii zapasowych jest przechowywana w bazie danych, nie na dysku. Konkretnie w tabeli <code>#__cstemplateintegrity_backups</code> &mdash; kolumna <code>contents_b64</code> przechowuje zawartość pliku zakodowaną w base64."
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="Oznacza to, że kopia zapasowa bazy danych obejmuje również te dane. Odinstalowanie komponentu usuwa tabelę wraz ze wszystkimi przechowywanymi kopiami zapasowymi."

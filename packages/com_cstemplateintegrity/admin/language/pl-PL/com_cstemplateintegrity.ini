COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Rozumiem: przywrócenie teraz nadpisze plik na żywo. Kopia sprzed przywrócenia zostanie automatycznie zapisana jako nowa kopia zapasowa."

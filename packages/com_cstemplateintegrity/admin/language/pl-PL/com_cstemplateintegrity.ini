COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST="Test połączenia"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Wysyła niewielkie żądanie testowe do api.anthropic.com z użyciem zapisanego klucza. Kosztuje niemal nic — weryfikuje, czy klucz jest prawidłowy i osiągalny z tego serwera."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_BUTTON="Uruchom test"

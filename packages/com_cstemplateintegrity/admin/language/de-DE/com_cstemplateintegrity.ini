COM_CSTEMPLATEINTEGRITY_ACTIONS_TITLE="Cybersalt Template Integrity — Aktionsprotokoll"
COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Jedes administrative Ereignis, das den Override-Tracker, das Sitzungsprotokoll oder die Datei-Backups berührt hat, wird hier aufgezeichnet. Schreibgeschützt."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Sitzungen</strong> speichern Claudes Prüfberichte. <strong>Das Aktionsprotokoll</strong> ist die Audit-Spur der <em>Änderungen</em> — wann Overrides zurückgesetzt oder gelöscht wurden, wann eine Sitzung erstellt wurde, wann ein Backup vor einem Fix gespeichert wurde. Wenn auf dieser Site später etwas schiefgeht, sehen Sie hier, was wann getan wurde."

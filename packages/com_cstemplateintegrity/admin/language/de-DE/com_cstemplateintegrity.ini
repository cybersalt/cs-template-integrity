COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Einen Claude-Bericht einfügen"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Manuelles Einfügen für Browser-Claude-Nutzer.</strong> Wenn Sie den Scan-Prompt unter <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> ausgeführt haben, kopieren Sie Claudes Antwort und fügen Sie sie hier ein, um sie als Sitzung zu speichern. Wenn Sie <em>Claude Code</em> (im Terminal) verwendet haben, benötigen Sie dieses Formular nicht — Claude POSTet den Bericht automatisch zurück an die Site. Die Sitzung wird standardmäßig mit dem heutigen Zeitstempel benannt; ändern Sie es, wenn Sie möchten."
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_NAME="Sitzungsname"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_NAME_HELP="Standardmäßig der aktuelle Zeitstempel YYYY-MM-DD-HHMMSS. Wird als sichtbare Bezeichnung im Sitzungsprotokoll verwendet."

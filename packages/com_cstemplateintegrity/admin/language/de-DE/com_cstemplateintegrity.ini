COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Sendet eine winzige Testanfrage an api.anthropic.com mit dem gespeicherten Schlüssel. Kostet fast nichts — überprüft, dass der Schlüssel gültig und von diesem Server aus erreichbar ist."

COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="Wenn Sie lieber nicht möchten, dass die Erweiterung auf die Festplatte schreibt:"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="Klicken Sie oben auf <em>Backup herunterladen</em> (oder kopieren Sie den Backup-Inhalt-Block)."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="Öffnen Sie Ihren FTP-Client, SFTP-Client oder Hosting-Dateimanager."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="Ersetzen Sie die Datei am unten angegebenen Zielpfad mit der heruntergeladenen Kopie."

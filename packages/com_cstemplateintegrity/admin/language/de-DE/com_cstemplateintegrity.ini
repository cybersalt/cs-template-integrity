COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Template-bewusster Joomla-Integritätsmonitor. Stellt den nativen #__template_overrides-Tracker über eine Joomla Web Services API bereit, sodass Claude (oder jeder Client mit einem Joomla API-Token) jeden gemeldeten Override prüfen, als alert / review / info klassifizieren und Patches direkt anwenden kann — automatisch gesichert und vom Admin aus rückgängig zu machen."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Bevor Sie beginnen"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Bitte stellen Sie sicher, dass Sie eine aktuelle Sicherung Ihrer Website haben</strong>, bevor Sie diese Erweiterung etwas ändern lassen. Wir empfehlen dringend Akeeba Backup oder die Sicherungsfunktion Ihres Hosters.</p><p><strong>Was diese Erweiterung tut:</strong> Sie verbindet Ihre Joomla-Site mit einer KI (Claude), um jeden gemeldeten Template-Override zu prüfen, jeden als Sicherheitswarnung, kosmetischen Unterschied oder legitime Anpassung zu klassifizieren und die von Ihnen bestätigten Patches anzuwenden. Jeder Patch wird zuerst automatisch in der Datenbank gesichert, sodass einzelne Änderungen rückgängig gemacht werden können — eine vollständige Site-Sicherung ist aber dennoch Ihr Sicherheitsnetz für alles andere.</p><p><strong>KI kann Fehler machen.</strong> Claude kann etwas falsch klassifizieren oder einen Patch vorschlagen, der eine Funktion bricht. Lesen Sie immer, was vorgeschlagen wird, bevor Sie „ja, anwenden“ sagen, und testen Sie die Site nach dem Anwenden der Korrekturen.</p><p><strong>Nicht sicher?</strong> Wenn Sie sich mit diesem Werkzeug nicht wohl fühlen, schreiben Sie Tim eine E-Mail an <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> und lassen Sie uns reden — wir können Sie durchführen oder die Prüfung für Sie übernehmen.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Dies nicht mehr anzeigen"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Verstanden — fortfahren"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Zu viele automatische Scans in der letzten Stunde (Grenze: %d). Warten Sie ein paar Minuten, bevor Sie es erneut versuchen, oder verwenden Sie den manuellen claude.ai / Claude Code-Workflow im Dashboard."


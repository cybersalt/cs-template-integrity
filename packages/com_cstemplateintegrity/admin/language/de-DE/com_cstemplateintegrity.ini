COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Wo dieses Backup liegt"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="Backup-Inhalte werden in der Datenbank gespeichert, nicht auf der Festplatte. Genauer in der Tabelle <code>#__cstemplateintegrity_backups</code> — die Spalte <code>contents_b64</code> enthält den base64-codierten Dateiinhalt."
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="Das bedeutet, dass eine Datenbank-Sicherung diese ebenfalls erfasst. Das Deinstallieren der Komponente löscht die Tabelle zusammen mit allen gespeicherten Backups."

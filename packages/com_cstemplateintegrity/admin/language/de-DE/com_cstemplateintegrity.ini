COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Dieses Backup wiederherstellen"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Überschreibt die Live-Datei am Pfad oben mit dem gesicherten Inhalt. Bevor geschrieben wird, wird der aktuelle Inhalt an diesem Pfad als frisches Backup gespeichert, sodass diese Wiederherstellung selbst rückgängig gemacht werden kann — wenn etwas schiefgeht, machen Sie es rückgängig, indem Sie das neue Pre-Restore-Backup wiederherstellen."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="Die Datei wird per PHP von dieser Admin-Seite aus geschrieben; kein FTP nötig. Der Webbenutzer muss Schreibrechte auf den Zielpfad haben. Das Joomla-Site-Root ist die Grenze — die Wiederherstellung verweigert das Schreiben außerhalb davon."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_BUTTON="Jetzt wiederherstellen…"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="Bestätigen: Backup wiederherstellen"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_BODY="Beim Wiederherstellen wird die Live-Datei an %s mit dem oben gezeigten gesicherten Inhalt überschrieben. Der aktuelle Inhalt wird zuerst als frisches Backup gespeichert, sodass dies rückgängig gemacht werden kann."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Ich verstehe: jetzt wiederherzustellen überschreibt die Live-Datei. Die Pre-Restore-Kopie wird automatisch als neues Backup gespeichert."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="Ja — wiederherstellen"


COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="cstemplateintegrity-Daten ansehen"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Erlaubt Benutzern in den passenden Gruppen, Overrides, Sitzungen, das Aktionsprotokoll und Backup-Inhalte zu lesen (Admin-Ansichten und lesende API-Endpunkte)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="cstemplateintegrity-Daten und Override-Dateien ändern"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Erlaubt Benutzern in den passenden Gruppen, Korrekturen anzuwenden, Backups wiederherzustellen, Override-Markierungen abzulehnen und Sitzungen anzulegen oder zu löschen. Schließt Ansicht ein."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Dashboard"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="API-Endpunkt aktiv"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Jeder Benutzer mit einem gültigen Joomla API-Token und core.manage-Berechtigung auf dieser Komponente kann die aktuellen Template-Override-Daten dieser Site lesen."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="Endpunkt-URL"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Über"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API, die den nativen #__template_overrides-Tracker bereitstellt, sodass Claude (oder jeder Client mit einem Joomla API-Token) jeden gemeldeten Override prüfen, klassifizieren und Patches direkt anwenden kann. Jeder Patch wird zuerst automatisch in der Datenbank gesichert und ist über die Datei-Backups-Ansicht rückgängig zu machen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Version"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Hier beginnen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Dies ist die einzige Karte, die Sie für eine normale Prüfung benötigen. Führen Sie den Prompt aus, holen Sie den Bericht und sagen Sie Claude im selben Chat, welche Befunde behoben werden sollen — kein zweiter Prompt erforderlich."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Methode 1: Prüfung mit Claude.ai oder Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="Die Erweiterung stellt Ihre Override-Daten per REST bereit. Kombinieren Sie sie mit Claude (claude.ai oder Claude Code), um eine automatisierte Sicherheitsprüfung jedes markierten Overrides auf dieser Site zu erhalten und anschließend die von Ihnen bestätigten Korrekturen anzuwenden — alles in einem Chat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Joomla API-Token erzeugen (einmalig)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="Im Joomla-Admin: <em>System → Benutzer → Mein Profil → Joomla API-Token</em> Registerkarte. Klicken Sie auf das Augensymbol, um das Token anzuzeigen. Sie müssen das nur einmal tun — bewahren Sie das Token sicher auf."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Claude öffnen und den Prompt unten einfügen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Öffnen Sie Claude dort, wo Sie es nutzen — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> im Browser, führen Sie <code>claude</code> in einem Terminal aus (Claude Code), oder ein anderes Tool, in dem Claude verfügbar ist. Ersetzen Sie den Platzhalter durch das Token aus Schritt 1. Site-URL und Endpunkte sind für diese Site bereits eingetragen.<br><br><strong>Nur claude.ai-Nutzer:</strong> wenn Claude mit „Host not in allowlist“ antwortet, blockiert seine Code-Ausführungs-Sandbox Ihre Site. Öffnen Sie in claude.ai <em>Einstellungen → Funktionen → Code-Ausführung → Netzwerkzugriff</em> und fügen Sie die Domain dieser Site hinzu. <strong>Schließen Sie dann den aktuellen Chat und starten Sie einen neuen</strong> — der laufende Chat verwendet weiterhin die alte Allowlist; nur ein frischer Chat übernimmt die neu hinzugefügte Domain. (Das gilt sowohl für die Claude-Desktop-App als auch für die Web-Version.) Claude Code im Terminal hat keine solche Einschränkung und funktioniert ohne Änderungen."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Senden."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude holt die Liste der Overrides, ruft Override- und Kernquelle für jeden ab und erstellt eine Tabelle pro Befund plus eine in einfacher Sprache verfasste Zusammenfassung, die Sie weiterleiten können."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Sagen Sie Claude, was zu beheben ist — im selben Chat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Sobald Claude den Bericht gepostet hat, fragt es, welche Befunde behoben werden sollen. Antworten Sie mit denen, die Sie bestätigen (z. B. <em>„behebe #1 und #3, lass #2 in Ruhe, den Drittanbieter-Punkt frage ich beim Entwickler nach“</em>). Claude sichert jede Datei vor dem Patchen, sodass alles rückgängig gemacht werden kann. <strong>Die zweite Karte unten benötigen Sie nur, wenn Sie den Chat geschlossen haben und später darauf zurückkommen möchten.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (kopieren und in Claude einfügen):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Scan-Prompt kopieren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Kopiert!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="Die meisten Benutzer benötigen diese Karte NICHT."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Verwenden Sie dies nur, wenn Sie einen <em>frischen Chat</em> starten, um Korrekturen aus einer früheren Prüfung anzuwenden — etwa weil Sie den ursprünglichen Chat über Nacht geschlossen haben, die Prüfung an einen Kollegen übergeben oder den Scan in claude.ai durchgeführt haben und die Korrekturen in Claude Code vornehmen möchten. Wenn Ihr Scan-Chat noch geöffnet ist, scrollen Sie nach oben — sprechen Sie dort einfach mit Claude."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Frühere Prüfung in einem neuen Chat fortsetzen"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Fügen Sie diesen Prompt in einen frischen Claude-Chat ein, um ihm den Kontext Ihrer früheren Prüfung zu geben. Er holt den Bericht der vorherigen Sitzung, listet die Befunde auf und fragt Sie, welche behoben werden sollen. Jede Datei wird vor jedem Patch gesichert, sodass alles rückgängig gemacht werden kann."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Fix-Prompt kopieren"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Sitzungsprotokoll"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Berichte, die von Claude (oder von Hand) übermittelt werden, werden hier als Sitzungen gespeichert. Klicken Sie auf eine Sitzung, um den vollständigen Bericht und die während dieser Sitzung ausgeführten Aktionen anzusehen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Noch keine Sitzungen. Führen Sie den Prompt oben aus und lassen Sie entweder Claude den Bericht automatisch zurück-POSTen oder klicken Sie auf 'Neue Sitzung', um ihn einzufügen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Neue Sitzung"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Alle Sitzungen ansehen"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Nach der Prüfung"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Wenn Sie mit dem Umsetzen von Claudes Empfehlungen fertig sind, möchten Sie die 'Änderungen gefunden'-Markierungen löschen, die Joomla in Templates anzeigt, damit sie nicht weiterhin die bereits behandelten Overrides melden."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Empfohlen — Prüfung pro Template"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Öffnen Sie die Liste der Site-Templates. Jedes Template mit einer 'Änderungen gefunden'-Markierung kann einzeln geöffnet werden, sodass Sie die spezifischen Override-Zeilen, die Sie behandelt haben, ablehnen können. Langsamer, aber Sie behalten ein Audit-Protokoll pro Zeile."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Site-Template-Verwaltung öffnen"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Massenaktion — alle Overrides als geprüft markieren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Schnellerer Weg: jede Zeile im Override-Tracker in einem Schritt löschen. Tun Sie das nur, nachdem Sie tatsächlich jeden Befund geprüft haben. Entspricht Joomlas eigener 'Alle ablehnen'-Funktion gleichzeitig auf jedem Template."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Alle als geprüft markieren…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Bestätigen: alle Overrides als geprüft markieren"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Dies löscht jede Zeile, die Joomla derzeit im Override-Tracker führt. Die 'Änderungen gefunden'-Markierungen in Templates verschwinden, und der API-Endpunkt dieser Site liefert null Zeilen, bis Joomlas nächstes Kern-Update sie wieder auffüllt. Die Aktion kann nicht rückgängig gemacht werden, außer durch Klicken auf 'Override-Tracker neu aufbauen' unten."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Ich bestätige, dass ich jeden gemeldeten Override geprüft habe und übernehme die Verantwortung für nicht behandelte Probleme."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Ja — alle als geprüft markieren"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="%d Override-Zeile(n) als geprüft markiert und aus dem Tracker entfernt."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="Es gab keine Override-Zeilen zum Löschen."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Override-Tracker konnte nicht geleert werden: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Overrides für die Prüfung zurücksetzen"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Haben Sie (oder ein früherer Entwickler) Overrides in der Vergangenheit genehmigt, ohne sie wirklich zu prüfen? Klicken Sie hier, um jede Override-Datei wieder in den Tracker zu bringen, sodass Sie jede einzeln mit Claude richtig prüfen können. Nützlich nach einem 'Alle ablehnen', das vor der Installation dieses Tools stattfand."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Durchläuft den <code>html/</code>-Ordner jedes aktivierten Templates und fügt eine Zeile in <code>#__template_overrides</code> für jede Override-Datei ein, die noch nicht verfolgt wird. Bestehende Zeilen bleiben unangetastet. Zurückgesetzte Zeilen erscheinen wieder als 'Änderungen gefunden'-Markierungen in der Templates-Verwaltung, sodass Sie den Prüfungsworkflow oben dagegen ausführen können."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Alle Overrides zur Prüfung zurücksetzen"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Alle Overrides zur Prüfung zurücksetzen? Jede Override-Datei auf dieser Site erscheint wieder in den 'Änderungen gefunden'-Markierungen in Templates, sodass sie neu bewertet werden kann."


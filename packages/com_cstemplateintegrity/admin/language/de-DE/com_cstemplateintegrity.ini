COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Methode 1: Claude.ai oder Code verwenden"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Einen vorbereiteten Prompt kopieren und in claude.ai oder Claude Code einfügen. Funktioniert ohne API-Schlüssel. Springt zum Prompt unten."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Methode 2: Automatischen Scan ausführen"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Übergibt die Override-Prüfung serverseitig an Claude über Ihren gespeicherten Anthropic API-Schlüssel. Speichert den Bericht als Sitzung, mit der Sie chatten können. Springt zur Schaltfläche unten."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Speichern Sie Ihren Anthropic API-Schlüssel zuerst im Optionen-Bereich, um automatische Scans zu aktivieren. Verwenden Sie bis dahin Methode 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Jedes aktivierte Template erneut durchlaufen und den Override-Tracker neu aufbauen. Verwenden Sie dies, nachdem Template-Dateien außerhalb von Joomla bearbeitet wurden, oder wenn Joomlas Tracker veraltet ist."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Schlüssel &amp; Tokens"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Optional. Speichern Sie hier einen Anthropic API-Schlüssel, damit die Erweiterung Scans automatisch ausführen kann — kein Kopieren und Einfügen des Prompts in Claude erforderlich. Lassen Sie das Feld leer, um den manuellen claude.ai / Claude Code-Workflow im Dashboard weiter zu verwenden."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API-Schlüssel"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Ihr persönlicher Anthropic API-Schlüssel (beginnt mit <code>sk-ant-…</code>). Holen Sie sich einen unter <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. Der Schlüssel wird auf diesem Server gespeichert und ausschließlich für Aufrufe an api.anthropic.com in Ihrem Auftrag verwendet. Mit gespeichertem Schlüssel zeigt das Dashboard eine Schaltfläche <em>Automatischen Scan ausführen</em>, die die Override-Prüfung serverseitig an Claude übergibt und den Bericht als Sitzung zurückspeichert — kein Kopieren und Einfügen nötig."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Jeder automatische Scan tätigt einen Anthropic API-Aufruf mit Ihrem Schlüssel. Die Kosten richten sich nach der von Anthropic für das verwendete Modell berechneten Gebühr (Standard ist Claude Sonnet 4.6). Sites mit sehr vielen Overrides werden auf die ersten 60 pro Lauf begrenzt; führen Sie für den Rest einen weiteren Lauf durch oder nutzen Sie den manuellen Claude Code-Workflow im Dashboard für unbegrenzte Größe."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Scan-Modell"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Claude-Modell, das für den einmaligen <em>Automatischen Scan</em>-Aufruf im Dashboard verwendet wird. Der Scan ist eine Klassifizierungsaufgabe (alert / review / info pro Befund); Haiku bewältigt das gut zu einem Bruchteil der Sonnet-Kosten. Sonnet ist die sichere Standardwahl. Opus ist für routinemäßige Scans übertrieben, aber nützlich, wenn Sie auf einer sicherheitskritischen Site zusätzliche Sorgfalt wünschen."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Chat-Modell"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Claude-Modell, das für den Chat-mit-Claude-Folgedialog auf der Sitzungsdetailseite verwendet wird (wo Sie Claude bitten, Korrekturen anzuwenden oder Befunde abzulehnen). Tool-Nutzung ist anspruchsvoller als Klassifizierung, daher empfehlen wir hier Sonnet, selbst wenn Sie das Scan-Modell auf Haiku setzen &mdash; falsch gewählte Tool-Aufrufe kosten mehr als der Modellpreisunterschied."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Joomla API-Token (für den Dashboard-Prompt)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Optional. Erzeugen Sie ein Joomla API-Token unter <em>System &rarr; Benutzer &rarr; Mein Profil &rarr; Joomla API-Token</em> und fügen Sie es hier ein. Die Scan-/Fix-Prompts des Dashboards füllen das Token dann automatisch anstelle des Platzhalters &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo; ein, sodass Sie ohne Bearbeitung direkt in Claude kopieren &amp; einfügen können.<br><br><strong>Mehrere-Admins-Hinweis:</strong> Joomla API-Tokens authentifizieren sich als <em>der Benutzer, der sie erzeugt hat</em>. Wenn mehrere Admins dieses Dashboard verwenden, nutzt der Prompt das hier gespeicherte Token &mdash; das heißt, Claude ruft die API authentifiziert als dieser eine Benutzer auf. Lassen Sie das Feld leer, damit jeder Admin sein eigenes Token bei der Verwendung einfügt."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Overrides pro Scan"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Wie viele markierte Template-Overrides die Schaltfläche <em>Automatischen Scan ausführen</em> in einem einzigen Anthropic API-Aufruf prüft. Standard <strong>10</strong>. Bereich 1&ndash;100. <strong>Niedriger ist sicherer für den anschließenden Chat:</strong> der Scan-Bericht wächst mit der Anzahl der Befunde, und die Tool-Use-Schleife im Chat behält diesen Bericht als Konversationsverlauf. Auf Anthropics niedrigeren Rate-Limit-Stufen (10K Eingabe-Tokens pro Minute) gibt ein 60-Override-Scan plus eine sofortige Chat-Runde innerhalb derselben Minute <em>HTTP 429: rate limit exceeded</em> zurück. Mit 10 Overrides pro Lauf bleiben Ihre Chat-Runden nach dem Scan komfortabel unter dem Limit. Sites mit mehr Overrides als das benötigen einfach einige weitere Läufe, um alles abzudecken &mdash; der Bericht jedes Laufs wird als eigene Sitzung gespeichert, sodass Sie mit jeder unabhängig chatten können."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — am schnellsten, niedrigste Kosten (~$1 pro 1M Eingabe-Tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — ausgewogen, empfohlen (~$3 pro 1M Eingabe-Tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — leistungsfähigstes, teuer (~$15 pro 1M Eingabe-Tokens, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>Zu den Kostenunterschieden.</strong> Ein typischer Scan auf einer Site mit 50 Overrides verbraucht etwa 60K Eingabe-Tokens und produziert etwa 5K Ausgabe-Tokens. Grobe Kosten pro Scan: <strong>~$0,08 mit Haiku, ~$0,23 mit Sonnet, ~$1,13 mit Opus</strong>. Chat-Runden sind viel kleiner (jeweils 5K&ndash;10K Eingabe-Tokens), sodass die Kosten pro Runde etwa 10&times; geringer sind als ein Scan. Anthropics veröffentlichte Preise sind die Wahrheitsquelle unter <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; die Zahlen oben sind Annäherungen und können sich im Laufe der Zeit ändern. Wenn Sie neu bei der API sind, beginnen Sie mit Sonnet und beobachten Sie Ihre Nutzung auf <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> für ein paar Läufe, bevor Sie sich für ein Upgrade oder Downgrade entscheiden."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Komponentennavigation"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Methode 2: Automatischen Scan ausführen (mit Ihrem gespeicherten Anthropic API-Schlüssel)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Kein Anthropic API-Schlüssel gespeichert."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="API-Schlüssel gespeichert."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="Die Erweiterung führt die Override-Prüfung auf dem Server mit Ihrem Anthropic-Schlüssel durch, ohne Kopieren und Einfügen. Der Bericht wird automatisch als neue Sitzung gespeichert."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Klicken Sie unten, um einen Scan zu starten. Die Erweiterung holt jeden markierten Override auf dieser Site, schickt ihn mit Ihrem gespeicherten API-Schlüssel an Claude und speichert den resultierenden Bericht als neue Sitzung. Sie werden zum Bericht weitergeleitet, sobald er fertig ist."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Ein Anthropic API-Aufruf pro Scan. Sites mit mehr als %d Overrides werden auf die ersten %d pro Lauf begrenzt (konfigurierbar unter <em>Optionen &rarr; AI provider &rarr; Overrides pro Scan</em>); führen Sie für den nächsten Stapel einen weiteren Lauf durch oder verwenden Sie den manuellen claude.ai / Claude Code-Workflow unten für unbegrenzte Größe. Die Seite kann 30&ndash;90 Sekunden pausieren, während Claude antwortet &mdash; das ist normal, navigieren Sie nicht weg."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Dies ruft die Anthropic API mit Ihrem gespeicherten Schlüssel auf und kann 30 bis 90 Sekunden dauern. Fortfahren?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Automatischen Scan jetzt ausführen"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Klicken Sie oben in der Symbolleiste auf <em>Optionen</em>, fügen Sie Ihren Anthropic API-Schlüssel auf der Registerkarte <em>AI provider</em> ein und speichern Sie, um diese Methode zu aktivieren. Methode 1 oben funktioniert weiterhin auch ohne Schlüssel."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Automatischer Scan läuft…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Anthropic API wird aufgerufen und Ihre Overrides werden analysiert. Das dauert üblicherweise 30 bis 90 Sekunden. Bitte schließen Sie dieses Fenster nicht."


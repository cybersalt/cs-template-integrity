COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Mit Claude fortsetzen"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Sagen Sie Claude, was als Nächstes zu tun ist. Für Befunde, die Sie im Bericht oben bestätigt haben, sagen Sie etwas wie <em>&ldquo;behebe #1 und #3, lehne den Rest ab&rdquo;</em>. Claude führt die Arbeit serverseitig aus und aktualisiert diesen Thread mit dem, was es getan hat. Jeder Apply-Fix sichert die Originaldatei zuerst automatisch, sodass alles über die Datei-Backups-Ansicht rückgängig gemacht werden kann."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_PLACEHOLDER="Sagen Sie Claude, was zu beheben oder abzulehnen ist…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_SEND="An Claude senden"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_CALLED="Aufgerufen:"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_NOKEY="Um aus diesem Admin mit Claude zu chatten und Korrekturen für Sie anwenden zu lassen, speichern Sie Ihren Anthropic API-Schlüssel unter der <em>Optionen</em>-Schaltfläche des Dashboards (Registerkarte AI provider). Ohne gespeicherten Schlüssel verwenden Sie den manuellen claude.ai / Claude Code-Prompt im Dashboard, um auf diesen Bericht zu reagieren."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_TITLE="Claude wird gefragt…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude liest Ihre Nachricht und kann serverseitig Apply-Fix- oder Dismiss-Tools ausführen. Das kann bis zu einer Minute dauern. Bitte schließen Sie dieses Fenster nicht."

COM_CSTEMPLATEINTEGRITY_FIELD_APIKEY_CLEAR_TITLE="清空此字段。在您点击工具栏中的&ldquo;保存&rdquo;之前，更改不会被保存。"
COM_CSTEMPLATEINTEGRITY_FIELD_APIKEY_HELP_DEFAULT="帮助"
COM_CSTEMPLATEINTEGRITY_FIELD_GET_JOOMLA_TOKEN="获取令牌"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="方法 1：使用 Claude.ai 或 Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="复制现成的提示词并粘贴到 claude.ai 或 Claude Code 中。无需 API 密钥即可使用。跳转到下方的提示词。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="方法 2：运行自动扫描"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="使用您保存的 Anthropic API 密钥，将覆盖审查交给 Claude 在服务器端处理。报告会保存为可与之对话的会话。跳转到下方的运行按钮。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="请先在&ldquo;选项&rdquo;面板中保存您的 Anthropic API 密钥以启用自动扫描。在此之前，请使用方法 1。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="重新遍历每个已启用的模板并重建覆盖跟踪器。在 Joomla 之外编辑模板文件后，或当 Joomla 的跟踪器过期时使用。"

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="密钥 &amp; 令牌"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="可选。在此保存 Anthropic API 密钥后，本扩展即可自动运行扫描——无需向 Claude 复制粘贴提示词。留空则继续使用仪表板上的手动 claude.ai / Claude Code 工作流。"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API 密钥"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="您的个人 Anthropic API 密钥（以 <code>sk-ant-…</code> 开头）。可在 <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a> 获取。该密钥存储在本服务器上，仅用于代您调用 api.anthropic.com。保存密钥后，仪表板会显示&ldquo;<em>运行自动扫描</em>&rdquo;按钮，将覆盖审查交给 Claude 在服务器端处理，并将报告保存回会话——无需复制粘贴。"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="每次自动扫描都会向您的密钥发起一次 Anthropic API 调用。定价以 Anthropic 对所用模型的收费为准（默认为 Claude Sonnet 4.6）。覆盖数量非常多的站点每次运行被限制为前 60 个；其余请重新运行，或使用仪表板上的手动 Claude Code 工作流来获得无限制的处理量。"

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="扫描模型"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="用于仪表板上一次性<em>运行自动扫描</em>调用的 Claude 模型。扫描属于分类任务（每个发现项分为警报 / 审查 / 信息）；Haiku 能很好地胜任，且成本仅为 Sonnet 的零头。Sonnet 是稳妥的默认选择。Opus 对常规扫描属于杀鸡用牛刀，但如果您希望对安全敏感站点格外严谨，会很有用。"

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="聊天模型"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="用于会话详情页&ldquo;与 Claude 对话&rdquo;后续交流（您让 Claude 应用修复或忽略发现项的地方）的 Claude 模型。工具使用比分类要求更高，因此即使您将扫描模型设置为 Haiku，也建议在此使用 Sonnet &mdash; Claude 出错的工具调用所造成的成本超过模型本身的差价。"

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Joomla API 令牌（用于仪表板提示词）"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="可选。在<em>系统 &rarr; 用户 &rarr; 我的资料 &rarr; Joomla API 令牌</em>处生成 Joomla API 令牌并粘贴到这里。仪表板的扫描 / 修复提示词随后会自动用此令牌替换&ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;占位符，您即可直接复制 &amp; 粘贴到 Claude，无需编辑。<br><br><strong>多管理员注意事项：</strong>Joomla API 令牌以<em>生成它的用户身份</em>进行身份验证。如果多位管理员使用此仪表板，提示词将使用此处保存的任一令牌 &mdash; 也就是说 Claude 调用 API 时将以那一位用户的身份验证。留空可让每位管理员在使用时各自粘贴自己的令牌。"

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="每次扫描的覆盖数"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="<em>运行自动扫描</em>按钮在单次 Anthropic API 调用中审查多少个被标记的模板覆盖。默认 <strong>10</strong>。范围 1&ndash;100。<strong>数值越低，对后续聊天越安全：</strong>扫描报告会随着发现项数量增长，而聊天工具使用循环会将该报告作为对话历史保留。在 Anthropic 较低的速率限制等级（每分钟 10K 输入令牌）上，60 个覆盖的扫描加上同一分钟内的即时聊天会返回 <em>HTTP 429：超出速率限制</em>。每次运行 10 个覆盖时，您扫描后的聊天交流会舒适地保持在限制之下。覆盖数超过此值的站点只需多运行几次即可覆盖全部 &mdash; 每次运行的报告都会保存为独立会话，因此您可以分别与之对话。"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — 最快，成本最低（约每 100 万输入令牌 $1）"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — 均衡，推荐（约每 100 万输入令牌 $3）"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — 最强大，价格高（约每 100 万输入令牌 $15，是 Sonnet 的 5×）"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>关于成本差异。</strong>对一个有 50 个覆盖的站点进行典型扫描会使用约 60K 输入令牌并产生约 5K 输出令牌。每次扫描的大致成本：<strong>Haiku 约 $0.08，Sonnet 约 $0.23，Opus 约 $1.13</strong>。聊天交流要小得多（每轮 5K&ndash;10K 输入令牌），因此每轮成本大约是扫描的 10&times; 之一。Anthropic 公布的定价为准，请参阅 <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; 上述数字为约值，可能会随时间变化。如果您是 API 新用户，建议从 Sonnet 开始，并在 <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> 上观察几次运行的用量后，再决定升级或降级。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="组件导航"


COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="允许匹配组中的用户读取覆盖、会话、操作日志和备份内容（管理后台视图和读取端 API 端点）。"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="修改 cstemplateintegrity 数据和覆盖文件"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="允许匹配组中的用户应用修复、还原备份、忽略覆盖标记，以及创建或删除会话。隐含查看权限。"


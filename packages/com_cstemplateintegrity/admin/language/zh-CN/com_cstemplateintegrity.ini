COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="端点 URL"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="关于"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API 暴露原生的 #__template_overrides 跟踪器，让 Claude（或任何持有 Joomla API 令牌的客户端）可以审查每个被标记的覆盖、对其进行分类，并就地应用补丁。每个补丁在应用前都会自动备份到数据库，并可在文件备份视图中撤销。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="版本"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="从这里开始。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="对于一次常规审查，您只需要这一张卡。运行提示词、获取报告，然后在同一个对话里告诉 Claude 要修复哪些发现项——无需第二条提示词。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="方法 1：使用 Claude.ai 或 Claude Code 进行审查"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="本扩展通过 REST 暴露您的覆盖数据。将其与 Claude（claude.ai 或 Claude Code）配对，即可获得对本站每个被标记覆盖的自动安全审查，然后应用您确认的修复——全部在一个对话里完成。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="生成 Joomla API 令牌（一次性）。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="在 Joomla 管理后台：<em>系统 → 用户 → 我的资料 → Joomla API 令牌</em>选项卡。点击眼睛图标显示令牌。这只需做一次——请将令牌妥善保管。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="打开 Claude 并粘贴下方提示词。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="在您使用 Claude 的任何地方打开它——浏览器中的 <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>、终端中运行 <code>claude</code>（Claude Code）或您拥有 Claude 的任何其他工具。用步骤 1 中的令牌替换占位符。本站的站点 URL 和端点已为您填好。<br><br><strong>仅限 claude.ai 用户：</strong>如果 Claude 回复&ldquo;Host not in allowlist&rdquo;，说明它的代码执行沙箱阻止了您的站点。在 claude.ai 中打开<em>设置 → 功能 → 代码执行 → 网络访问</em>，并添加本站点的域名。<strong>然后关闭当前对话并新开一个</strong>——正在进行的对话仍使用旧的允许列表；只有新对话才会启用刚添加的域名。（这适用于 Claude 桌面应用和网页版。）终端中的 Claude Code 没有此限制，无需更改即可工作。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="发送。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude 将拉取覆盖列表，为每个覆盖获取覆盖文件和核心源代码，并产出一份按发现项的表格以及一段可转发的通俗摘要。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="告诉 Claude 要修复什么——在同一个对话里。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="一旦 Claude 发布报告，它会询问您希望修复哪些发现项。回复您确认的项（例如 <em>&ldquo;修复 #1 和 #3，保持 #2 不变，第三方那个我会去问开发者&rdquo;</em>）。Claude 会在打补丁前备份每个文件，所以一切都可以回滚。<strong>仅当您关闭对话后想稍后再回来继续时，才需要下方的第二张卡。</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="提示词（复制并粘贴到 Claude 中）："
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="复制扫描提示词"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="已复制！"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="多数用户不需要这张卡。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="仅当您要开<em>新对话</em>来应用之前一次审查的修复时使用——例如您在隔夜后关闭了原对话、把审查交接给同事，或您在 claude.ai 中运行了扫描而想在 Claude Code 中执行修复。如果您的扫描对话仍开着，请向上滚动——直接在那里和 Claude 对话即可。"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="在新对话中继续之前的审查"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="将此提示词粘贴到一个全新的 Claude 对话中，把之前审查的上下文交给它。它将获取上一次的会话报告、列出发现项，并询问您要修复哪些。任何补丁落地之前都会备份文件，因此一切都是可逆的。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="复制修复提示词"


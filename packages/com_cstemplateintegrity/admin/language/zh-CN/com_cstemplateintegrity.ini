COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="未保存 Anthropic API 密钥。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="API 密钥已保存。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="本扩展将使用您的 Anthropic 密钥在服务器上运行覆盖审查，无需复制粘贴。报告将自动保存为新会话。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="点击下方开始扫描。本扩展将获取本站所有被标记的覆盖，使用您保存的 API 密钥发送给 Claude，并将生成的报告保存为新会话。完成后您将被重定向到该报告。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="每次扫描进行一次 Anthropic API 调用。覆盖数超过 %d 的站点每次运行被限制为前 %d 个（可在<em>选项 &rarr; AI 提供商 &rarr; 每次扫描的覆盖数</em>中配置）；下一批请重新运行，或使用下方的手动 claude.ai / Claude Code 工作流来获得无限制的处理量。在 Claude 响应期间，页面可能会暂停 30&ndash;90 秒 &mdash; 这是正常的，请勿离开。"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="这将使用您保存的密钥调用 Anthropic API，可能需要 30 到 90 秒。是否继续？"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="立即运行自动扫描"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="点击上方工具栏中的<em>选项</em>，在 <em>AI 提供商</em>选项卡下粘贴您的 Anthropic API 密钥并保存，即可启用此方法。无密钥时，上方的方法 1 仍可使用。"


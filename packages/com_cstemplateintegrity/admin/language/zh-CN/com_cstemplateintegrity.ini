COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="模板感知的 Joomla 完整性监控工具。通过 Joomla Web Services API 暴露原生的 #__template_overrides 跟踪器，让 Claude（或任何持有 Joomla API 令牌的客户端）可以审查每个被标记的覆盖，将其分类为警报 / 审查 / 信息，并就地应用补丁——自动备份，可在管理后台撤销。"

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="开始之前"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>请确保您拥有近期的网站备份</strong>，再让本扩展进行任何更改。我们强烈推荐 Akeeba Backup 或您的主机自带的备份功能。</p><p><strong>本扩展的功能：</strong>它将您的 Joomla 站点与 AI（Claude）配对，审查每个被标记的模板覆盖，将其分类为安全警报、外观差异或合理的自定义，并应用您确认的补丁。每个补丁在应用前都会自动备份到数据库，因此单项更改是可还原的——但完整站点备份仍是您应对其他情况的安全网。</p><p><strong>AI 也会出错。</strong>Claude 可能会错误分类，或提出会破坏功能的补丁。在说&ldquo;是的，应用它&rdquo;之前，请务必阅读它提议的内容，并在修复后测试站点。</p><p><strong>不确定？</strong>如果您对使用本工具不放心，请通过 <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> 给 Tim 发邮件——我们可以指导您操作，或代您完成审查。</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="不再显示"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="我明白了——继续"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="过去一小时内的自动扫描次数过多（上限：%d）。请稍候几分钟后重试，或在仪表板上使用手动 claude.ai / Claude Code 工作流。"


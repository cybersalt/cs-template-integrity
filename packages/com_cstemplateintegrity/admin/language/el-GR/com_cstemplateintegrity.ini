COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Στέλνει ένα μικρό δοκιμαστικό αίτημα στο api.anthropic.com με χρήση του αποθηκευμένου κλειδιού. Κοστίζει σχεδόν τίποτα — επαληθεύει ότι το κλειδί είναι έγκυρο και προσβάσιμο από αυτόν τον διακομιστή."

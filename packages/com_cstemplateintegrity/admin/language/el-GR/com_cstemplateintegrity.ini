COM_CSTEMPLATEINTEGRITY_ACTIONS_COL_DETAILS="Λεπτομέρειες"

COM_CSTEMPLATEINTEGRITY_BACKUPS_TITLE="Cybersalt Template Integrity — Αντίγραφα ασφαλείας αρχείων"
COM_CSTEMPLATEINTEGRITY_BACKUPS_DESCRIPTION="Στιγμιότυπα αρχείων πριν την αλλαγή τους, που το Claude (ή εσείς) επρόκειτο να τροποποιήσει. Μόνο για ανάγνωση εδώ· το Claude τα υποβάλλει μέσω του API πριν προτείνει μια επιδιόρθωση."

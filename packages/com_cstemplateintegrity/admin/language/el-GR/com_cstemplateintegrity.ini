COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Μέθοδος 1: Χρήση Claude.ai ή Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Αντιγράψτε ένα έτοιμο prompt και επικολλήστε το στο claude.ai ή στο Claude Code. Λειτουργεί χωρίς κλειδί API. Μεταβαίνει στο prompt παρακάτω."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Μέθοδος 2: Εκτέλεση αυτοματοποιημένης σάρωσης"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Αναθέστε την επιθεώρηση των παρακάμψεων στο Claude από την πλευρά του διακομιστή χρησιμοποιώντας το αποθηκευμένο σας κλειδί Anthropic API. Αποθηκεύει την αναφορά ως συνεδρία με την οποία μπορείτε να συνομιλήσετε. Μεταβαίνει στο κουμπί εκτέλεσης παρακάτω."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Αποθηκεύστε πρώτα το κλειδί Anthropic API στον πίνακα Επιλογών για να ενεργοποιηθούν οι αυτοματοποιημένες σαρώσεις. Έως τότε, χρησιμοποιήστε τη Μέθοδο 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Σαρώστε ξανά κάθε ενεργοποιημένο πρότυπο και ανακατασκευάστε τον πίνακα παρακολούθησης παρακάμψεων. Χρησιμοποιήστε το μετά από επεξεργασία αρχείων προτύπου εκτός Joomla, ή εάν ο πίνακας παρακολούθησης του Joomla δεν είναι ενημερωμένος."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Κλειδιά &amp; διακριτικά"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Προαιρετικό. Αποθηκεύστε εδώ ένα κλειδί Anthropic API ώστε η επέκταση να μπορεί να εκτελεί σαρώσεις αυτόματα — χωρίς να χρειάζεται αντιγραφή-επικόλληση prompt στο Claude. Αφήστε το κενό για να συνεχίσετε να χρησιμοποιείτε τη χειροκίνητη ροή εργασίας claude.ai / Claude Code στον πίνακα ελέγχου."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Κλειδί Anthropic API"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Το προσωπικό σας κλειδί Anthropic API (αρχίζει με <code>sk-ant-…</code>). Αποκτήστε ένα από το <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. Το κλειδί αποθηκεύεται σε αυτόν τον διακομιστή και χρησιμοποιείται μόνο για την κλήση του api.anthropic.com εκ μέρους σας. Με αποθηκευμένο κλειδί, ο πίνακας ελέγχου εκθέτει ένα κουμπί <em>Εκτέλεση αυτοματοποιημένης σάρωσης</em> που αναθέτει την επιθεώρηση παρακάμψεων στο Claude από την πλευρά του διακομιστή και αποθηκεύει την αναφορά ως συνεδρία — χωρίς να απαιτείται αντιγραφή-επικόλληση."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Κάθε αυτοματοποιημένη σάρωση πραγματοποιεί μία κλήση στο Anthropic API με το κλειδί σας. Η τιμολόγηση είναι ό,τι χρεώνει η Anthropic για το χρησιμοποιούμενο μοντέλο (προεπιλογή Claude Sonnet 4.6). Σε ιστοτόπους με πολύ μεγάλο αριθμό παρακάμψεων εφαρμόζεται όριο στις πρώτες 60 ανά εκτέλεση· εκτελέστε ξανά για τις υπόλοιπες ή χρησιμοποιήστε τη χειροκίνητη ροή Claude Code στον πίνακα ελέγχου για απεριόριστο μέγεθος."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Μοντέλο σάρωσης"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Μοντέλο Claude που χρησιμοποιείται για την κλήση μίας εκτέλεσης <em>Εκτέλεση αυτοματοποιημένης σάρωσης</em> στον πίνακα ελέγχου. Η σάρωση είναι εργασία ταξινόμησης (ειδοποίηση / προς επανεξέταση / πληροφοριακή ανά εύρημα)· το Haiku τη διεκπεραιώνει ικανοποιητικά με κλάσμα του κόστους του Sonnet. Το Sonnet είναι η ασφαλής προεπιλογή. Το Opus είναι υπερβολικό για συνηθισμένες σαρώσεις, αλλά χρήσιμο εάν θέλετε επιπλέον αυστηρότητα σε έναν ιστότοπο με ευαισθησία ασφαλείας."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Μοντέλο συνομιλίας"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Μοντέλο Claude που χρησιμοποιείται για τη συνομιλία-με-Claude στη σελίδα λεπτομερειών συνεδρίας (όπου ζητάτε από το Claude να εφαρμόσει επιδιορθώσεις ή να απορρίψει ευρήματα). Η χρήση εργαλείων είναι πιο απαιτητική από την ταξινόμηση, οπότε συνιστούμε εδώ Sonnet ακόμη κι αν έχετε ορίσει το Haiku ως μοντέλο σάρωσης &mdash; οι εσφαλμένες κλήσεις εργαλείων από το Claude κοστίζουν περισσότερο από τη διαφορά τιμής μεταξύ μοντέλων."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Διακριτικό Joomla API (για το prompt του πίνακα ελέγχου)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Προαιρετικό. Δημιουργήστε ένα διακριτικό Joomla API στο <em>Σύστημα &rarr; Χρήστες &rarr; Το προφίλ μου &rarr; Joomla API Token</em> και επικολλήστε το εδώ. Τα prompts σάρωσης / επιδιόρθωσης του πίνακα ελέγχου θα συμπληρώνουν αυτόματα το διακριτικό στη θέση του placeholder &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, ώστε να μπορείτε να αντιγράφετε &amp; επικολλάτε απευθείας στο Claude χωρίς επεξεργασία.<br><br><strong>Επισήμανση για πολλαπλούς διαχειριστές:</strong> Τα διακριτικά Joomla API πιστοποιούν ως <em>τον χρήστη που τα δημιούργησε</em>. Εάν πολλοί διαχειριστές χρησιμοποιούν αυτόν τον πίνακα ελέγχου, το prompt θα χρησιμοποιεί όποιο διακριτικό είναι αποθηκευμένο εδώ &mdash; που σημαίνει ότι το Claude θα καλεί το API πιστοποιώντας ως αυτόν τον έναν χρήστη. Αφήστε το κενό για να επικολλά κάθε διαχειριστής το δικό του διακριτικό κατά τη χρήση."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Παρακάμψεις ανά σάρωση"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Πόσες επισημασμένες παρακάμψεις προτύπου επιθεωρεί το κουμπί <em>Εκτέλεση αυτοματοποιημένης σάρωσης</em> σε μία κλήση Anthropic API. Προεπιλογή <strong>10</strong>. Εύρος 1&ndash;100. <strong>Χαμηλότερη τιμή είναι ασφαλέστερη για επόμενη συνομιλία:</strong> η αναφορά σάρωσης μεγαλώνει με τον αριθμό των ευρημάτων και ο βρόχος χρήσης εργαλείων στη συνομιλία διατηρεί την αναφορά ως ιστορικό συνομιλίας. Στις χαμηλότερες βαθμίδες ορίων ρυθμού της Anthropic (10K input tokens ανά λεπτό), μια σάρωση 60 παρακάμψεων συν μια άμεση συνομιλία εντός του ίδιου λεπτού θα επιστρέψει <em>HTTP 429: rate limit exceeded</em>. Με 10 παρακάμψεις ανά εκτέλεση, οι συνομιλίες μετά τη σάρωση παραμένουν άνετα κάτω από το όριο. Σε ιστοτόπους με περισσότερες παρακάμψεις χρειάζονται απλώς λίγες επανεκτελέσεις για να καλυφθούν όλες &mdash; η αναφορά κάθε εκτέλεσης αποθηκεύεται ως ξεχωριστή συνεδρία, οπότε μπορείτε να συνομιλήσετε με την καθεμία ανεξάρτητα."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — ταχύτερο, χαμηλότερο κόστος (~$1 ανά 1M input tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — ισορροπημένο, συνιστώμενο (~$3 ανά 1M input tokens)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — πιο ικανό, ακριβό (~$15 ανά 1M input tokens, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>Σχετικά με τη διαφορά κόστους.</strong> Μια τυπική σάρωση σε ιστότοπο με 50 παρακάμψεις χρησιμοποιεί περίπου 60K input tokens και παράγει περίπου 5K output tokens. Κατά προσέγγιση κόστος ανά σάρωση: <strong>~$0,08 σε Haiku, ~$0,23 σε Sonnet, ~$1,13 σε Opus</strong>. Οι συνομιλίες είναι πολύ μικρότερες (5K&ndash;10K input tokens η καθεμία), οπότε το κόστος ανά συνομιλία είναι περίπου 10&times; μικρότερο από μια σάρωση. Η δημοσιευμένη τιμολόγηση της Anthropic είναι η αυθεντική πηγή στο <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; οι παραπάνω αριθμοί είναι κατά προσέγγιση και μπορεί να μεταβληθούν με τον χρόνο. Εάν είστε νέος στο API, ξεκινήστε με Sonnet και παρακολουθήστε τη χρήση σας στο <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> για μερικές εκτελέσεις πριν αποφασίσετε αν θα αναβαθμίσετε ή θα υποβαθμίσετε."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Πλοήγηση στοιχείου"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Μέθοδος 2: Εκτέλεση αυτοματοποιημένης σάρωσης (με χρήση του αποθηκευμένου κλειδιού Anthropic API)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Δεν έχει αποθηκευτεί κλειδί Anthropic API."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="Το κλειδί API αποθηκεύτηκε."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="Η επέκταση θα εκτελέσει την επιθεώρηση παρακάμψεων στον διακομιστή χρησιμοποιώντας το κλειδί σας Anthropic, χωρίς να απαιτείται αντιγραφή-επικόλληση. Η αναφορά αποθηκεύεται αυτόματα ως νέα συνεδρία."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Πατήστε παρακάτω για να ξεκινήσετε μια σάρωση. Η επέκταση ανακτά κάθε επισημασμένη παράκαμψη σε αυτόν τον ιστότοπο, την αποστέλλει στο Claude με το αποθηκευμένο κλειδί API σας και αποθηκεύει την προκύπτουσα αναφορά ως νέα συνεδρία. Θα ανακατευθυνθείτε στην αναφορά όταν ολοκληρωθεί."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Μία κλήση Anthropic API ανά σάρωση. Σε ιστοτόπους με περισσότερες από %d παρακάμψεις εφαρμόζεται όριο στις πρώτες %d ανά εκτέλεση (διαμορφώσιμο στο <em>Επιλογές &rarr; Πάροχος AI &rarr; Παρακάμψεις ανά σάρωση</em>)· εκτελέστε ξανά για την επόμενη παρτίδα ή χρησιμοποιήστε τη χειροκίνητη ροή claude.ai / Claude Code παρακάτω για απεριόριστο μέγεθος. Η σελίδα μπορεί να κάνει παύση 30&ndash;90 δευτερολέπτων όσο απαντά το Claude &mdash; αυτό είναι φυσιολογικό, μην απομακρυνθείτε."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Αυτό θα καλέσει το Anthropic API με το αποθηκευμένο σας κλειδί και μπορεί να διαρκέσει 30 έως 90 δευτερόλεπτα. Συνέχεια;"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Εκτέλεση αυτοματοποιημένης σάρωσης τώρα"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Πατήστε <em>Επιλογές</em> στη γραμμή εργαλείων παραπάνω, επικολλήστε το κλειδί Anthropic API στην καρτέλα <em>Πάροχος AI</em> και αποθηκεύστε για να ενεργοποιήσετε αυτή τη μέθοδο. Η Μέθοδος 1 παραπάνω εξακολουθεί να λειτουργεί χωρίς κλειδί."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Εκτέλεση αυτοματοποιημένης σάρωσης…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Πραγματοποιείται κλήση στο Anthropic API και ανάλυση των παρακάμψεών σας. Συνήθως διαρκεί 30 έως 90 δευτερόλεπτα. Παρακαλούμε μην κλείσετε αυτό το παράθυρο."


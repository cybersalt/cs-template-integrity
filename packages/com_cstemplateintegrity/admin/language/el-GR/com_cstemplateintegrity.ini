COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Συνέχεια με το Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Πείτε στο Claude τι να κάνει στη συνέχεια. Για ευρήματα που εγκρίνατε στην παραπάνω αναφορά, πείτε κάτι όπως <em>&ldquo;διόρθωσε το #1 και το #3, απόρριψε τα υπόλοιπα&rdquo;</em>. Το Claude θα εκτελέσει την εργασία στον διακομιστή και θα ενημερώσει αυτό το νήμα με όσα έκανε. Κάθε εφαρμογή επιδιόρθωσης δημιουργεί αυτόματα αντίγραφο ασφαλείας του αρχικού αρχείου, οπότε όλα είναι αναστρέψιμα από την προβολή Αντίγραφα ασφαλείας αρχείων."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_PLACEHOLDER="Πείτε στο Claude τι να επιδιορθώσει ή να απορρίψει…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_SEND="Αποστολή στο Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_CALLED="Κλήθηκε:"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_NOKEY="Για να συνομιλήσετε με το Claude από μέσα από αυτό το διαχειριστικό και να εφαρμόσει επιδιορθώσεις για εσάς, αποθηκεύστε το κλειδί Anthropic API σας στο κουμπί <em>Επιλογές</em> του πίνακα ελέγχου (καρτέλα Πάροχος AI). Χωρίς αποθηκευμένο κλειδί, χρησιμοποιήστε το χειροκίνητο prompt claude.ai / Claude Code στον πίνακα ελέγχου για να ενεργήσετε σε αυτή την αναφορά."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_TITLE="Γίνεται ερώτηση στο Claude…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Το Claude διαβάζει το μήνυμά σας και ενδέχεται να εκτελέσει εργαλεία εφαρμογής επιδιόρθωσης ή απόρριψης στον διακομιστή. Αυτό μπορεί να διαρκέσει έως ένα λεπτό. Παρακαλούμε μην κλείσετε αυτό το παράθυρο."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_BAD_ID="Μη έγκυρο αναγνωριστικό συνεδρίας."

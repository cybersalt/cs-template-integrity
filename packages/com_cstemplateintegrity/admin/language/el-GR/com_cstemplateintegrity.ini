COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="Άκρο API ενεργό"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Οποιοσδήποτε χρήστης με έγκυρο διακριτικό Joomla API και δικαίωμα core.manage σε αυτό το στοιχείο μπορεί να διαβάσει τα τρέχοντα δεδομένα παρακάμψεων προτύπων αυτού του ιστοτόπου."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="URL άκρου"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="Πληροφορίες"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API που εκθέτει τον εγγενή πίνακα παρακολούθησης #__template_overrides ώστε το Claude (ή οποιοσδήποτε πελάτης με διακριτικό Joomla API) να μπορεί να επιθεωρεί κάθε επισημασμένη παράκαμψη, να την κατατάσσει και να εφαρμόζει επιδιορθώσεις επί τόπου. Κάθε επιδιόρθωση αντιγράφεται αυτόματα στη βάση δεδομένων πρώτα και είναι αναστρέψιμη από την προβολή Αντίγραφα ασφαλείας αρχείων."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Έκδοση"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Ξεκινήστε από εδώ."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Αυτή είναι η μόνη κάρτα που χρειάζεστε για μια κανονική επιθεώρηση. Εκτελέστε το prompt, λάβετε την αναφορά και έπειτα πείτε στο Claude στην ίδια συνομιλία ποια ευρήματα να επιδιορθώσει — δεν απαιτείται δεύτερο prompt."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Μέθοδος 1: Επιθεώρηση με χρήση Claude.ai ή Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="Η επέκταση εκθέτει τα δεδομένα παρακάμψεών σας μέσω REST. Συνδυάστε την με το Claude (claude.ai ή Claude Code) για να λάβετε αυτοματοποιημένη επιθεώρηση ασφαλείας κάθε επισημασμένης παράκαμψης σε αυτόν τον ιστότοπο και έπειτα εφαρμόστε τις επιδιορθώσεις που εγκρίνετε — όλα σε μία συνομιλία."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Δημιουργήστε ένα διακριτικό Joomla API (μία φορά)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="Στη διαχείριση Joomla: <em>Σύστημα → Χρήστες → Το προφίλ μου → καρτέλα Joomla API Token</em>. Πατήστε το εικονίδιο ματιού για να εμφανίσετε το διακριτικό. Χρειάζεται να το κάνετε μόνο μία φορά — φυλάξτε το διακριτικό σε ασφαλές σημείο."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Ανοίξτε το Claude και επικολλήστε το παρακάτω prompt."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Ανοίξτε το Claude όπου το χρησιμοποιείτε — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> σε φυλλομετρητή, εκτελέστε <code>claude</code> σε τερματικό (Claude Code), ή οποιοδήποτε άλλο εργαλείο μέσω του οποίου έχετε διαθέσιμο το Claude. Αντικαταστήστε το placeholder με το διακριτικό από το βήμα 1. Η διεύθυνση URL του ιστοτόπου και τα άκρα είναι ήδη συμπληρωμένα για αυτόν τον ιστότοπο.<br><br><strong>Μόνο για χρήστες claude.ai:</strong> εάν το Claude απαντήσει με «Host not in allowlist», το sandbox εκτέλεσης κώδικα μπλοκάρει τον ιστότοπό σας. Στο claude.ai, ανοίξτε <em>Settings → Capabilities → Code execution → Network access</em> και προσθέστε τον τομέα αυτού του ιστοτόπου. <strong>Έπειτα κλείστε την τρέχουσα συνομιλία και ξεκινήστε νέα</strong> — η ενεργή συνομιλία συνεχίζει να χρησιμοποιεί την παλιά λίστα επιτρεπόμενων· μόνο μια νέα συνομιλία αναγνωρίζει τον προστιθέμενο τομέα. (Αυτό ισχύει τόσο για την εφαρμογή υπολογιστή όσο και για την διαδικτυακή έκδοση του Claude.) Το Claude Code σε τερματικό δεν έχει τέτοιο περιορισμό και θα λειτουργήσει χωρίς αλλαγές."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Αποστολή."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Το Claude θα ανακτήσει τη λίστα των παρακάμψεων, θα φέρει την παράκαμψη και τον πηγαίο κώδικα του πυρήνα για κάθε μία και θα παραγάγει έναν πίνακα ανά εύρημα συν μια περιγραφή σε απλή γλώσσα που μπορείτε να προωθήσετε."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Πείτε στο Claude τι να επιδιορθώσει — στην ίδια συνομιλία."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Μόλις το Claude δημοσιεύσει την αναφορά, θα ρωτήσει ποια ευρήματα θέλετε να επιδιορθωθούν. Απαντήστε με όσα εγκρίνετε (π.χ. <em>«διόρθωσε το #1 και το #3, άσε το #2 ως έχει, για το τρίτο θα ρωτήσω τον προγραμματιστή»</em>). Το Claude δημιουργεί αντίγραφο ασφαλείας κάθε αρχείου πριν την επιδιόρθωση, οπότε όλα μπορούν να αναιρεθούν. <strong>Χρειάζεστε τη δεύτερη κάρτα παρακάτω μόνο εάν κλείσατε τη συνομιλία και θέλετε να επανέλθετε αργότερα.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (αντιγράψτε και επικολλήστε στο Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Αντιγραφή prompt σάρωσης"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Αντιγράφηκε!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="Οι περισσότεροι χρήστες ΔΕΝ χρειάζονται αυτή την κάρτα."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Χρησιμοποιήστε την μόνο εάν ξεκινάτε μια <em>νέα συνομιλία</em> για να εφαρμόσετε επιδιορθώσεις από προηγούμενη επιθεώρηση — για παράδειγμα κλείσατε την αρχική συνομιλία τη νύχτα, αναθέτετε την επιθεώρηση σε συνεργάτη ή εκτελέσατε τη σάρωση στο claude.ai και θέλετε να κάνετε τις επιδιορθώσεις στο Claude Code. Εάν η συνομιλία σάρωσης παραμένει ανοιχτή, μετακινηθείτε προς τα πάνω — απλώς μιλήστε εκεί στο Claude."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Συνέχιση προηγούμενης επιθεώρησης σε νέα συνομιλία"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Επικολλήστε αυτό το prompt σε μια νέα συνομιλία Claude για να του δώσετε το πλαίσιο της προηγούμενης επιθεώρησής σας. Θα ανακτήσει την προηγούμενη αναφορά συνεδρίας, θα παραθέσει τα ευρήματα και θα σας ρωτήσει ποια να επιδιορθώσει. Κάθε αρχείο αντιγράφεται πριν εφαρμοστεί οποιαδήποτε επιδιόρθωση, οπότε όλα είναι αναστρέψιμα."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Αντιγραφή prompt επιδιόρθωσης"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Αρχείο συνεδριών"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Οι αναφορές που υποβάλλει το Claude (ή που επικολλάτε με το χέρι) αποθηκεύονται εδώ ως συνεδρίες. Πατήστε σε μια συνεδρία για να δείτε την πλήρη αναφορά και τις ενέργειες που εκτελέστηκαν κατά τη διάρκειά της."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Δεν υπάρχουν ακόμη συνεδρίες. Εκτελέστε το παραπάνω prompt και είτε αφήστε το Claude να υποβάλει την αναφορά αυτόματα είτε πατήστε «Νέα συνεδρία» για να την επικολλήσετε."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Νέα συνεδρία"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Προβολή όλων των συνεδριών"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Μετά την επιθεώρηση"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Όταν ολοκληρώσετε τις ενέργειες με βάση τις συστάσεις του Claude, θα θελήσετε να εκκαθαρίσετε τις σημάνσεις «Changes found» που εμφανίζει το Joomla στα Πρότυπα ώστε να μην επισημαίνουν συνεχώς τις παρακάμψεις που έχετε ήδη χειριστεί."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Συνιστώμενο — επιθεώρηση ανά πρότυπο"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Ανοίξτε τη λίστα Προτύπων Ιστοτόπου. Κάθε πρότυπο με σήμανση «Changes found» μπορεί να ανοιχτεί ξεχωριστά ώστε να μπορείτε να απορρίψετε τις συγκεκριμένες γραμμές παράκαμψης που έχετε χειριστεί. Πιο αργό, αλλά διατηρείτε ίχνος ελέγχου ανά γραμμή."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Άνοιγμα Διαχείρισης Προτύπων Ιστοτόπου"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Μαζικά — σήμανση κάθε παράκαμψης ως ελεγμένης"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Ταχύτερη διαδρομή: εκκαθαρίστε κάθε γραμμή στον πίνακα παρακολούθησης παρακάμψεων σε ένα βήμα. Κάντε το μόνο εφόσον έχετε όντως επιθεωρήσει κάθε εύρημα. Ισοδύναμο με τη χρήση της λειτουργίας «Dismiss All» του Joomla σε όλα τα πρότυπα ταυτόχρονα."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Σήμανση όλων ως ελεγμένων…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Επιβεβαίωση: σήμανση όλων των παρακάμψεων ως ελεγμένων"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Αυτό εκκαθαρίζει κάθε γραμμή που παρακολουθεί αυτή τη στιγμή το Joomla στον πίνακα παρακάμψεων. Οι σημάνσεις «Changes found» στα Πρότυπα θα εξαφανιστούν και το άκρο API αυτού του ιστοτόπου θα επιστρέφει μηδέν γραμμές μέχρι την επόμενη ενημέρωση πυρήνα του Joomla που θα τις επανασυμπληρώσει. Η ενέργεια δεν μπορεί να αναιρεθεί παρά μόνο με κλικ στο «Ανακατασκευή πίνακα παρακάμψεων» παρακάτω για επανάληψη σάρωσης."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Επιβεβαιώνω ότι έχω επιθεωρήσει κάθε επισημασμένη παράκαμψη και αναλαμβάνω την ευθύνη για τυχόν ζητήματα που δεν αντιμετωπίστηκαν."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Ναι — σήμανση όλων ως ελεγμένων"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="%d γραμμή(ές) παράκαμψης σημάνθηκαν ως ελεγμένες και εκκαθαρίστηκαν από τον πίνακα παρακολούθησης."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="Δεν υπήρχαν γραμμές παράκαμψης προς εκκαθάριση."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Δεν ήταν δυνατή η εκκαθάριση του πίνακα παρακολούθησης παρακάμψεων: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Επαναφορά παρακάμψεων για επιθεώρηση"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Έχετε εσείς (ή προηγούμενος προγραμματιστής) εγκρίνει παρακάμψεις στο παρελθόν χωρίς πραγματικό έλεγχο; Πατήστε εδώ για να επιστρέψετε κάθε αρχείο παράκαμψης στον πίνακα παρακολούθησης ώστε να μπορείτε να επιθεωρήσετε σωστά την καθεμία με το Claude. Χρήσιμο μετά από «Dismiss All» που πραγματοποιήθηκε πριν εγκατασταθεί αυτό το εργαλείο."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Σαρώνει τον φάκελο <code>html/</code> κάθε ενεργοποιημένου προτύπου και εισάγει μια γραμμή στο <code>#__template_overrides</code> για κάθε αρχείο παράκαμψης που δεν παρακολουθείται ήδη. Οι υπάρχουσες γραμμές μένουν αμετάβλητες. Οι επανασημασμένες γραμμές επανεμφανίζονται ως σημάνσεις «Changes found» στη διαχείριση Προτύπων ώστε να μπορείτε να εκτελέσετε τη ροή εργασίας επιθεώρησης παραπάνω."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Επαναφορά όλων των παρακάμψεων για επιθεώρηση"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Επαναφορά όλων των παρακάμψεων για επιθεώρηση; Κάθε αρχείο παράκαμψης σε αυτόν τον ιστότοπο θα επανεμφανιστεί στις σημάνσεις «Changes found» των Προτύπων ώστε να επανεκτιμηθεί."

COM_CSTEMPLATEINTEGRITY_RESCAN_SUCCESS="Ο πίνακας παρακολούθησης παρακάμψεων ανακατασκευάστηκε: %1$d γραμμή(ές) εισήχθησαν σε %3$d πρότυπο(α) (%2$d αρχεία σαρώθηκαν)."

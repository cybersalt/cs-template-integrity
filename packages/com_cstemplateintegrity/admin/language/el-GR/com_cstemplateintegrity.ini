COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Προβολή δεδομένων cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Επιτρέπει σε χρήστες των αντίστοιχων ομάδων να διαβάζουν παρακάμψεις, συνεδρίες, το αρχείο καταγραφής ενεργειών και το περιεχόμενο των αντιγράφων ασφαλείας (διαχειριστικές προβολές και άκρα API ανάγνωσης)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Τροποποίηση δεδομένων cstemplateintegrity και αρχείων παράκαμψης"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Επιτρέπει σε χρήστες των αντίστοιχων ομάδων να εφαρμόζουν επιδιορθώσεις, να αποκαθιστούν αντίγραφα ασφαλείας, να απορρίπτουν επισημάνσεις παρακάμψεων και να δημιουργούν ή να διαγράφουν συνεδρίες. Συνεπάγεται την Προβολή."


COM_CSTEMPLATEINTEGRITY_BACKUPS_VIEW="Προβολή αντιγράφου ασφαλείας"
COM_CSTEMPLATEINTEGRITY_BACKUPS_STORAGE_NOTE="Τα αντίγραφα ασφαλείας αποθηκεύονται στη βάση δεδομένων (πίνακας <code>#__cstemplateintegrity_backups</code>) ως αντίγραφα του αρχείου κωδικοποιημένα σε base64 τη στιγμή του αντιγράφου ασφαλείας. Κάθε γραμμή κρατά την αρχική διαδρομή, sha256, μέγεθος και πλήρες περιεχόμενο. Δεν εγγράφονται στον δίσκο· κάντε κλικ σε μια γραμμή αντιγράφου ασφαλείας για επιλογές αποκατάστασης ή για να κατεβάσετε το περιεχόμενο."

COM_CSTEMPLATEINTEGRITY_BACKUPS_RESTORE_BAD_ID="Μη έγκυρο αναγνωριστικό αντιγράφου ασφαλείας."
COM_CSTEMPLATEINTEGRITY_BACKUPS_RESTORE_SUCCESS="Το αντίγραφο ασφαλείας αποκαταστάθηκε στο %1$s (γράφτηκαν %2$d bytes). Το προηγούμενο περιεχόμενο του αρχείου αποθηκεύτηκε ως αντίγραφο ασφαλείας #%3$d, οπότε αυτή η αποκατάσταση είναι κι αυτή αναστρέψιμη."

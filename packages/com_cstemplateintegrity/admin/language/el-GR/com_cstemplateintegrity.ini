COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Παρακολούθηση ακεραιότητας Joomla με γνώση των προτύπων. Εκθέτει τον εγγενή πίνακα παρακολούθησης #__template_overrides μέσω ενός Joomla Web Services API ώστε το Claude (ή οποιοσδήποτε πελάτης με διακριτικό Joomla API) να μπορεί να επιθεωρεί κάθε επισημασμένη παράκαμψη, να την κατατάσσει ως ειδοποίηση / προς επανεξέταση / πληροφοριακή και να εφαρμόζει επιδιορθώσεις επί τόπου — με αυτόματη δημιουργία αντιγράφων ασφαλείας και δυνατότητα αναίρεσης από το διαχειριστικό."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Πριν ξεκινήσετε"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Παρακαλούμε βεβαιωθείτε ότι έχετε πρόσφατο αντίγραφο ασφαλείας του ιστοτόπου σας</strong> πριν επιτρέψετε σε αυτή την επέκταση να αλλάξει οτιδήποτε. Σας συνιστούμε ανεπιφύλακτα το Akeeba Backup ή τη λειτουργία αντιγράφων ασφαλείας του παρόχου φιλοξενίας σας.</p><p><strong>Τι κάνει αυτή η επέκταση:</strong> συνδυάζει τον ιστότοπό σας Joomla με μια τεχνητή νοημοσύνη (Claude) για να επιθεωρήσει κάθε επισημασμένη παράκαμψη προτύπου, να κατατάξει την καθεμία ως ειδοποίηση ασφαλείας, αισθητική διαφορά ή νόμιμη προσαρμογή, και να εφαρμόσει τις επιδιορθώσεις που εγκρίνετε. Κάθε επιδιόρθωση αντιγράφεται αυτόματα στη βάση δεδομένων πρώτα, οπότε οι μεμονωμένες αλλαγές είναι αναστρέψιμες — αλλά ένα πλήρες αντίγραφο ασφαλείας ολόκληρου του ιστοτόπου παραμένει το δίχτυ ασφαλείας σας για όλα τα υπόλοιπα.</p><p><strong>Η τεχνητή νοημοσύνη μπορεί να κάνει λάθη.</strong> Το Claude ενδέχεται να κατατάξει εσφαλμένα κάτι ή να προτείνει μια επιδιόρθωση που χαλάει κάποια λειτουργία. Διαβάζετε πάντα τι προτείνει πριν πείτε «ναι, εφαρμόστε το» και δοκιμάζετε τον ιστότοπο μετά την εφαρμογή των επιδιορθώσεων.</p><p><strong>Δεν είστε σίγουροι;</strong> Εάν δεν αισθάνεστε άνετα να χρησιμοποιήσετε αυτό το εργαλείο, στείλτε email στον Tim στο <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> και ας μιλήσουμε — μπορούμε να σας καθοδηγήσουμε ή να κάνουμε εμείς την επιθεώρηση για εσάς.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Να μην εμφανιστεί ξανά"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Κατανοητό — συνέχεια"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Πάρα πολλές αυτοματοποιημένες σαρώσεις την τελευταία ώρα (όριο: %d). Περιμένετε λίγα λεπτά πριν δοκιμάσετε ξανά ή χρησιμοποιήστε τη χειροκίνητη ροή εργασίας claude.ai / Claude Code στον πίνακα ελέγχου."


COM_CSTEMPLATEINTEGRITY_BACKUP_CONTENTS_HEADING="Περιεχόμενο αντιγράφου ασφαλείας"
COM_CSTEMPLATEINTEGRITY_BACKUP_CONTENTS_HELP="Τα ακριβή bytes που αποτυπώθηκαν τη στιγμή του αντιγράφου ασφαλείας. Αλλάξτε το μέγεθος του πλαισίου σύροντας την κάτω δεξιά γωνία του. Χρησιμοποιήστε το παραπάνω κουμπί Λήψη για να αποθηκεύσετε αυτό το περιεχόμενο ως αρχείο."

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Αποκατάσταση αυτού του αντιγράφου ασφαλείας"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Αντικαταστήστε το ζωντανό αρχείο στην παραπάνω διαδρομή με το περιεχόμενο του αντιγράφου ασφαλείας. Πριν την εγγραφή, το τρέχον περιεχόμενο σε αυτή τη διαδρομή αποθηκεύεται ως νέο αντίγραφο ασφαλείας, οπότε αυτή η αποκατάσταση είναι κι αυτή αναστρέψιμη — αν πάει κάτι στραβά, αναιρέστε την αποκαθιστώντας το νέο αντίγραφο ασφαλείας προ της αποκατάστασης."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="Το αρχείο γράφεται μέσω PHP από αυτή τη διαχειριστική σελίδα· δεν απαιτείται FTP. Ο χρήστης web πρέπει να έχει δικαίωμα εγγραφής στη διαδρομή προορισμού. Η ρίζα του ιστοτόπου Joomla είναι το όριο — η αποκατάσταση αρνείται να γράψει εκτός αυτής."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_BUTTON="Αποκατάσταση τώρα…"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="Επιβεβαίωση: αποκατάσταση αντιγράφου ασφαλείας"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_BODY="Η αποκατάσταση θα αντικαταστήσει το ζωντανό αρχείο στο %s με το περιεχόμενο του αντιγράφου ασφαλείας που εμφανίζεται παραπάνω. Το τρέχον περιεχόμενο θα αποθηκευτεί πρώτα ως νέο αντίγραφο ασφαλείας, ώστε αυτό να μπορεί να αντιστραφεί."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Κατανοητό: η αποκατάσταση τώρα θα αντικαταστήσει το ζωντανό αρχείο. Το αντίγραφο πριν την αποκατάσταση θα αποθηκευτεί αυτόματα ως νέο αντίγραφο ασφαλείας."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="Ναι — αποκατάσταση"

COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_TITLE="Χειροκίνητη αποκατάσταση (FTP / ο επεξεργαστής σας)"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="Εάν προτιμάτε να μην αφήσετε την επέκταση να γράψει στον δίσκο:"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="Πατήστε <em>Λήψη αντιγράφου ασφαλείας</em> παραπάνω (ή αντιγράψτε το μπλοκ Περιεχόμενο αντιγράφου ασφαλείας)."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="Ανοίξτε τον πελάτη FTP, τον πελάτη SFTP ή τον Διαχειριστή Αρχείων της φιλοξενίας σας."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="Αντικαταστήστε το αρχείο στην παρακάτω διαδρομή προορισμού με το αντίγραφο που κατεβάσατε."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_DESTINATION="Διαδρομή προορισμού στον διακομιστή"

COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Πού βρίσκεται αυτό το αντίγραφο ασφαλείας"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="Το περιεχόμενο των αντιγράφων ασφαλείας αποθηκεύεται στη βάση δεδομένων, όχι στον δίσκο. Συγκεκριμένα, στον πίνακα <code>#__cstemplateintegrity_backups</code> — η στήλη <code>contents_b64</code> κρατά το περιεχόμενο του αρχείου κωδικοποιημένο σε base64."
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="Αυτό σημαίνει ότι ένα αντίγραφο ασφαλείας της βάσης δεδομένων αποτυπώνει επίσης αυτά τα αντίγραφα. Η απεγκατάσταση του στοιχείου διαγράφει τον πίνακα μαζί με όλα τα αποθηκευμένα αντίγραφα ασφαλείας."

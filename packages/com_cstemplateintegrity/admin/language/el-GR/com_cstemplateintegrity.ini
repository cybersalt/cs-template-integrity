COM_CSTEMPLATEINTEGRITY_SESSIONFORM_TITLE="Νέα συνεδρία"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Επικόλληση αναφοράς Claude"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Χειροκίνητη επικόλληση για χρήστες του Claude μέσω φυλλομετρητή.</strong> Εάν εκτελέσατε το prompt σάρωσης στο <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, αντιγράψτε την απάντηση του Claude και επικολλήστε την εδώ για να αποθηκευτεί ως συνεδρία. Εάν χρησιμοποιήσατε το <em>Claude Code</em> (σε τερματικό), δεν χρειάζεστε αυτή τη φόρμα — το Claude υποβάλλει την αναφορά στον ιστότοπο αυτόματα. Η συνεδρία ονομάζεται με τη σημερινή χρονοσήμανση από προεπιλογή· αλλάξτε την αν θέλετε."
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_NAME="Όνομα συνεδρίας"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_NAME_HELP="Από προεπιλογή χρησιμοποιείται η τρέχουσα χρονοσήμανση YYYY-MM-DD-HHMMSS. Χρησιμοποιείται ως η ορατή ετικέτα στο αρχείο συνεδριών."
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_SUMMARY="Περίληψη μίας γραμμής"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_SUMMARY_PLACEHOLDER="π.χ. 1 εύρημα XSS, 14 στοιχεία απόκλισης θέματος, 1 αισθητικό σφάλμα"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_REPORT="Αναφορά (Markdown)"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_REPORT_PLACEHOLDER="Επικολλήστε εδώ την πλήρη αναφορά που παρήγαγε το Claude. Θα αποθηκευτεί κατά λέξη και θα εμφανιστεί όταν ανοιχτεί η συνεδρία."
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_SAVE="Αποθήκευση συνεδρίας"

COM_CSTEMPLATEINTEGRITY_ACTIONS_TITLE="Cybersalt Template Integrity — Αρχείο καταγραφής ενεργειών"
COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Κάθε διαχειριστικό συμβάν που άγγιξε τον πίνακα παρακολούθησης παρακάμψεων, το αρχείο συνεδριών ή τα αντίγραφα ασφαλείας αρχείων καταγράφεται εδώ. Μόνο για ανάγνωση."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="Οι <strong>Συνεδρίες</strong> αποθηκεύουν τις αναφορές επιθεώρησης του Claude. Το <strong>Αρχείο καταγραφής ενεργειών</strong> είναι το ίχνος ελέγχου των <em>αλλαγών</em> — πότε επαναφέρθηκαν ή εκκαθαρίστηκαν παρακάμψεις, πότε δημιουργήθηκε μια συνεδρία, πότε αποθηκεύτηκε ένα αντίγραφο ασφαλείας πριν από μια επιδιόρθωση. Εάν κάτι πάει στραβά αργότερα σε αυτόν τον ιστότοπο, εδώ θα δείτε τι έγινε και πότε."
COM_CSTEMPLATEINTEGRITY_ACTIONS_EMPTY="Δεν καταγράφηκαν ακόμη ενέργειες."
COM_CSTEMPLATEINTEGRITY_ACTIONS_COL_TIME="Χρόνος"
COM_CSTEMPLATEINTEGRITY_ACTIONS_COL_ACTION="Ενέργεια"

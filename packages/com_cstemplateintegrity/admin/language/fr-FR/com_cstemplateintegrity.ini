COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude lit votre message et peut exécuter les outils apply-fix ou dismiss côté serveur. Cela peut prendre jusqu'à une minute. Veuillez ne pas fermer cette fenêtre."

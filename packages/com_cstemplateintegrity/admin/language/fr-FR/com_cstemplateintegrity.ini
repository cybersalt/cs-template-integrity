COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Moniteur d'intégrité Joomla pour les surcharges de modèles. Expose le suivi natif #__template_overrides via une API Web Services Joomla, afin que Claude (ou tout client disposant d'un token API Joomla) puisse examiner chaque surcharge signalée, la classer comme alert / review / info et appliquer des correctifs sur place — automatiquement sauvegardés et réversibles depuis l'admin."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Avant de commencer"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Veuillez vous assurer que vous disposez d'une sauvegarde récente de votre site web</strong> avant de laisser cette extension modifier quoi que ce soit. Nous recommandons vivement Akeeba Backup ou la fonction de sauvegarde de votre hébergeur.</p><p><strong>Ce que fait cette extension :</strong> elle associe votre site Joomla à une IA (Claude) pour examiner chaque surcharge de modèle signalée, classer chacune comme alerte de sécurité, différence cosmétique ou personnalisation légitime, et appliquer les correctifs que vous confirmez. Chaque correctif est d'abord automatiquement sauvegardé dans la base de données, donc les modifications individuelles sont réversibles — mais une sauvegarde complète du site reste votre filet de sécurité pour tout le reste.</p><p><strong>L'IA peut faire des erreurs.</strong> Claude peut mal classer quelque chose ou proposer un correctif qui casse une fonctionnalité. Lisez toujours ce qui est proposé avant de dire « oui, applique-le », et testez le site après l'application des correctifs.</p><p><strong>Pas sûr ?</strong> Si vous n'êtes pas à l'aise avec cet outil, écrivez à Tim à <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> et discutons-en — nous pouvons vous guider, ou faire la révision pour vous.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Ne plus afficher ceci"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="J'ai compris — continuer"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Trop de scans automatiques au cours de la dernière heure (limite : %d). Attendez quelques minutes avant de réessayer, ou utilisez le workflow manuel claude.ai / Claude Code dans le tableau de bord."


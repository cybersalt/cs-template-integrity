COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Réinitialiser les surcharges pour révision"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Avez-vous (ou un développeur précédent) approuvé des surcharges dans le passé sans les vérifier vraiment ? Cliquez ici pour ramener chaque fichier de surcharge dans le suivi afin que vous puissiez réviser chacun correctement avec Claude. Utile après un 'Tout rejeter' qui a eu lieu avant l'installation de cet outil."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Parcourt le dossier <code>html/</code> de chaque modèle activé et insère une ligne dans <code>#__template_overrides</code> pour tout fichier de surcharge qui n'est pas déjà suivi. Les lignes existantes sont laissées telles quelles. Les lignes réinitialisées réapparaissent comme badges 'Modifications trouvées' dans l'admin Modèles afin que vous puissiez exécuter le workflow de révision ci-dessus contre eux."

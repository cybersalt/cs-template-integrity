COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Continuer avec Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Dites à Claude quoi faire ensuite. Pour les découvertes que vous avez confirmées dans le rapport ci-dessus, dites quelque chose comme <em>&ldquo;corrige #1 et #3, rejette le reste&rdquo;</em>. Claude exécutera le travail côté serveur et mettra à jour ce fil avec ce qu'il a fait. Chaque correctif applique d'abord automatiquement une sauvegarde du fichier d'origine, donc tout est réversible depuis la vue Sauvegardes de fichiers."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_PLACEHOLDER="Dites à Claude quoi corriger ou rejeter…"

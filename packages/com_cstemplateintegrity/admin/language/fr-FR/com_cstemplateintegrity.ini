COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Envoie une minuscule requête de test à api.anthropic.com avec la clé enregistrée. Coûte presque rien — vérifie que la clé est valide et accessible depuis ce serveur."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_BUTTON="Lancer le test"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_TITLE="Restaurer cette sauvegarde"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_INTRO="Écrase le fichier en direct au chemin ci-dessus avec le contenu sauvegardé. Avant l'écriture, le contenu actuel à ce chemin est enregistré comme une nouvelle sauvegarde, afin que cette restauration soit elle-même réversible — si quelque chose tourne mal, annulez-la en restaurant la nouvelle sauvegarde pré-restauration."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_NOTE="Le fichier est écrit via PHP depuis cette page admin ; pas de FTP nécessaire. L'utilisateur web doit avoir la permission d'écriture sur le chemin cible. La racine du site Joomla est la limite — la restauration refuse d'écrire en dehors."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_BUTTON="Restaurer maintenant…"

COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="Confirmer : restaurer la sauvegarde"
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_BODY="Restaurer écrasera le fichier en direct à %s avec le contenu sauvegardé montré ci-dessus. Le contenu actuel sera enregistré comme une nouvelle sauvegarde d'abord afin que ceci puisse être inversé."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="Je comprends : restaurer maintenant écrasera le fichier en direct. La copie pré-restauration sera automatiquement enregistrée comme une nouvelle sauvegarde."
COM_CSTEMPLATEINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="Oui — restaurer"


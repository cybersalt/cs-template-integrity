COM_CSTEMPLATEINTEGRITY_RUN_SCAN_TRUNCATED="Ce site a plus de %d surcharges ; le reste nécessitera une exécution supplémentaire. Utilisez le prompt manuel claude.ai / Claude Code pour des révisions ponctuelles de taille illimitée."

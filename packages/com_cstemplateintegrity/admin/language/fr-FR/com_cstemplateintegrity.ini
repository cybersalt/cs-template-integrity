COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_TITLE="Où vit cette sauvegarde"
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_INTRO="Le contenu des sauvegardes est stocké dans la base de données, pas sur le disque. Plus précisément, dans la table <code>#__cstemplateintegrity_backups</code> — la colonne <code>contents_b64</code> contient le contenu du fichier base64-encodé."
COM_CSTEMPLATEINTEGRITY_BACKUP_STORAGE_NOTE="Cela signifie qu'une sauvegarde de base de données les capture également. Désinstaller le composant supprime la table avec toutes les sauvegardes stockées."

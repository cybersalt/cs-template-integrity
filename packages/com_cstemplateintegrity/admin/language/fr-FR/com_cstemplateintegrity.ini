COM_CSTEMPLATEINTEGRITY_FIELD_GET_JOOMLA_TOKEN="Obtenir le token"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Méthode 1 : utiliser Claude.ai ou Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Copier un prompt prêt à l'emploi et le coller dans claude.ai ou Claude Code. Fonctionne sans clé API. Saute au prompt ci-dessous."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Méthode 2 : exécuter un scan automatique"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Confier la révision des surcharges à Claude côté serveur en utilisant votre clé API Anthropic enregistrée. Enregistre le rapport comme une session avec laquelle vous pouvez discuter. Saute au bouton d'exécution ci-dessous."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Enregistrez d'abord votre clé API Anthropic dans le panneau Options pour activer les scans automatiques. En attendant, utilisez la Méthode 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Re-parcourir tous les modèles activés et reconstruire le suivi des surcharges. Utilisez ceci après avoir édité des fichiers de modèle en dehors de Joomla, ou si le suivi de Joomla est obsolète."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Clés &amp; tokens"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Optionnel. Enregistrez ici une clé API Anthropic pour que l'extension puisse exécuter les scans automatiquement — pas besoin de copier-coller le prompt dans Claude. Laissez vide pour continuer à utiliser le workflow manuel claude.ai / Claude Code dans le tableau de bord."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Clé API Anthropic"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Votre clé API Anthropic personnelle (commence par <code>sk-ant-…</code>). Obtenez-en une sur <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. La clé est stockée sur ce serveur et utilisée uniquement pour appeler api.anthropic.com en votre nom. Avec une clé enregistrée, le tableau de bord expose un bouton <em>Exécuter un scan automatique</em> qui transfère la révision des surcharges à Claude côté serveur et enregistre le rapport en tant que session — pas besoin de copier-coller."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Chaque scan automatique effectue un appel à l'API Anthropic avec votre clé. La tarification correspond à ce qu'Anthropic facture pour le modèle utilisé (par défaut Claude Sonnet 4.6). Les sites avec un très grand nombre de surcharges sont limités aux 60 premières par exécution ; relancez pour le reste, ou utilisez le workflow manuel Claude Code dans le tableau de bord pour une taille illimitée."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Modèle de scan"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Modèle Claude utilisé pour l'appel unique <em>Exécuter un scan automatique</em> dans le tableau de bord. Le scan est une tâche de classification (alert / review / info par découverte) ; Haiku la gère bien à une fraction du coût de Sonnet. Sonnet est le choix par défaut sûr. Opus est excessif pour les scans de routine, mais utile si vous voulez une rigueur supplémentaire sur un site sensible à la sécurité."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Modèle de chat"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Modèle Claude utilisé pour le chat-avec-Claude de suivi sur la page de détail de session (où vous demandez à Claude d'appliquer des correctifs ou de rejeter des découvertes). L'utilisation d'outils est plus exigeante que la classification, nous recommandons donc Sonnet ici même si vous définissez Haiku pour le scan &mdash; les appels d'outils que Claude fait mal coûtent plus que la différence de prix entre les modèles."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Token API Joomla (pour le prompt du tableau de bord)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Optionnel. Générez un token API Joomla à <em>Système &rarr; Utilisateurs &rarr; Mon profil &rarr; Token API Joomla</em> et collez-le ici. Les prompts de scan/correction du tableau de bord rempliront alors automatiquement le token à la place de l'espace réservé &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, afin que vous puissiez copier &amp; coller directement dans Claude sans modification.<br><br><strong>Avertissement multi-admins :</strong> les tokens API Joomla s'authentifient en tant que <em>l'utilisateur qui les a générés</em>. Si plusieurs admins utilisent ce tableau de bord, le prompt utilisera le token enregistré ici &mdash; ce qui signifie que Claude appellera l'API authentifié en tant que cet utilisateur unique. Laissez vide pour que chaque admin colle son propre token au moment de l'utilisation."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Surcharges par scan"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Combien de surcharges de modèle signalées le bouton <em>Exécuter un scan automatique</em> examine en un seul appel à l'API Anthropic. Par défaut <strong>10</strong>. Plage 1&ndash;100. <strong>Plus bas est plus sûr pour le chat de suivi :</strong> le rapport de scan grandit avec le nombre de découvertes, et la boucle d'utilisation d'outils du chat conserve ce rapport comme historique de conversation. Sur les niveaux de limite de débit inférieurs d'Anthropic (10K tokens d'entrée par minute), un scan de 60 surcharges plus un tour de chat immédiat dans la même minute renverra <em>HTTP 429: rate limit exceeded</em>. Avec 10 surcharges par exécution, vos tours de chat post-scan restent confortablement sous la limite. Les sites avec plus de surcharges que cela ont juste besoin de quelques exécutions supplémentaires pour tout couvrir &mdash; le rapport de chaque exécution est enregistré comme sa propre session, donc vous pouvez discuter avec chacune indépendamment."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — le plus rapide, coût le plus bas (~1 $ pour 1M de tokens d'entrée)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — équilibré, recommandé (~3 $ pour 1M de tokens d'entrée)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — le plus capable, cher (~15 $ pour 1M de tokens d'entrée, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>À propos de la différence de coût.</strong> Un scan typique sur un site avec 50 surcharges utilise environ 60K tokens d'entrée et produit environ 5K tokens de sortie. Coût approximatif par scan : <strong>~0,08 $ avec Haiku, ~0,23 $ avec Sonnet, ~1,13 $ avec Opus</strong>. Les tours de chat sont beaucoup plus petits (5K&ndash;10K tokens d'entrée chacun), donc le coût par tour est environ 10&times; inférieur à un scan. La tarification publiée par Anthropic est la source de vérité sur <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; les chiffres ci-dessus sont approximatifs et peuvent évoluer dans le temps. Si vous êtes nouveau dans l'API, commencez par Sonnet et surveillez votre utilisation sur <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a> pendant quelques exécutions avant de décider de monter ou descendre en gamme."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Navigation du composant"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Méthode 2 : exécuter un scan automatique (avec votre clé API Anthropic enregistrée)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Aucune clé API Anthropic enregistrée."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="Clé API enregistrée."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="L'extension exécutera la révision des surcharges sur le serveur en utilisant votre clé Anthropic, sans copier-coller. Le rapport est enregistré automatiquement comme une nouvelle session."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Cliquez ci-dessous pour démarrer un scan. L'extension récupère chaque surcharge signalée sur ce site, l'envoie à Claude avec votre clé API enregistrée, et enregistre le rapport résultant comme une nouvelle session. Vous serez redirigé vers le rapport quand il sera terminé."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Un appel à l'API Anthropic par scan. Les sites avec plus de %d surcharges sont limités aux %d premières par exécution (configurable dans <em>Options &rarr; AI provider &rarr; Surcharges par scan</em>) ; relancez pour le lot suivant, ou utilisez le workflow manuel claude.ai / Claude Code ci-dessous pour une taille illimitée. La page peut faire une pause de 30&ndash;90 secondes pendant que Claude répond &mdash; c'est normal, ne quittez pas la page."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Ceci appellera l'API Anthropic avec votre clé enregistrée et peut prendre 30 à 90 secondes. Continuer ?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Exécuter un scan automatique maintenant"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Cliquez sur <em>Options</em> dans la barre d'outils ci-dessus, collez votre clé API Anthropic dans l'onglet <em>AI provider</em> et enregistrez pour activer cette méthode. La Méthode 1 ci-dessus fonctionne toujours sans clé."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Scan automatique en cours…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Appel à l'API Anthropic et analyse de vos surcharges. Cela prend généralement 30 à 90 secondes. Veuillez ne pas fermer cette fenêtre."


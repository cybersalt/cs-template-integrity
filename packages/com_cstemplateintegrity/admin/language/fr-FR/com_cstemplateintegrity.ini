COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_INTRO="Si vous préférez ne pas laisser l'extension écrire sur le disque :"
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP1="Cliquez sur <em>Télécharger la sauvegarde</em> ci-dessus (ou copiez le bloc Contenu de la sauvegarde)."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP2="Ouvrez votre client FTP, client SFTP ou gestionnaire de fichiers d'hébergement."
COM_CSTEMPLATEINTEGRITY_BACKUP_MANUAL_STEP3="Remplacez le fichier au chemin de destination ci-dessous par la copie téléchargée."

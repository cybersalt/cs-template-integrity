COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Coller un rapport Claude"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Collage manuel pour les utilisateurs de Claude dans le navigateur.</strong> Si vous avez exécuté le prompt de scan sur <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, copiez la réponse de Claude et collez-la ici pour l'enregistrer comme session. Si vous avez utilisé <em>Claude Code</em> (dans un terminal), vous n'avez pas besoin de ce formulaire — Claude POSTe le rapport automatiquement vers le site. La session est nommée par défaut avec l'horodatage d'aujourd'hui ; modifiez-le si vous le souhaitez."

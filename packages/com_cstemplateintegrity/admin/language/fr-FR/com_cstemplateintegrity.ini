COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Voir les données cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Permet aux utilisateurs des groupes correspondants de lire les surcharges, les sessions, le journal d'actions et le contenu des sauvegardes (vues admin et points d'accès API en lecture)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Modifier les données cstemplateintegrity et les fichiers de surcharge"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Permet aux utilisateurs des groupes correspondants d'appliquer des correctifs, de restaurer des sauvegardes, de rejeter des indicateurs de surcharge, et de créer ou supprimer des sessions. Implique Voir."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Tableau de bord"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="Point d'accès API actif"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Tout utilisateur disposant d'un token API Joomla valide et de l'autorisation core.manage sur ce composant peut lire les données actuelles de surcharge de modèle de ce site."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="URL du point d'accès"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="À propos"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="API Web Services exposant le suivi natif #__template_overrides afin que Claude (ou tout client disposant d'un token API Joomla) puisse examiner chaque surcharge signalée, la classer et appliquer des correctifs sur place. Chaque correctif est d'abord automatiquement sauvegardé dans la base de données et réversible depuis la vue Sauvegardes de fichiers."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Version"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Commencez ici."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="C'est la seule carte dont vous avez besoin pour une révision normale. Exécutez le prompt, obtenez le rapport, puis dites à Claude dans le même chat quelles découvertes corriger — pas besoin d'un second prompt."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Méthode 1 : Révision avec Claude.ai ou Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="L'extension expose vos données de surcharge via REST. Associez-les à Claude (claude.ai ou Claude Code) pour obtenir une révision de sécurité automatisée de chaque surcharge signalée sur ce site, puis appliquez les correctifs que vous confirmez — le tout dans un seul chat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Générer un token API Joomla (une seule fois)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="Dans l'admin Joomla : <em>Système → Utilisateurs → Mon profil → Token API Joomla</em>. Cliquez sur l'icône en forme d'œil pour révéler le token. Vous n'avez besoin de le faire qu'une seule fois — gardez le token en lieu sûr."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Ouvrir Claude et coller le prompt ci-dessous."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Ouvrez Claude où vous l'utilisez — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> dans un navigateur, exécutez <code>claude</code> dans un terminal (Claude Code), ou tout autre outil dans lequel Claude est disponible. Remplacez l'espace réservé par le token de l'étape 1. L'URL du site et les points d'accès sont déjà remplis pour ce site.<br><br><strong>Utilisateurs claude.ai uniquement :</strong> si Claude répond avec « Host not in allowlist », son sandbox d'exécution de code bloque votre site. Dans claude.ai, ouvrez <em>Paramètres → Capacités → Exécution de code → Accès réseau</em> et ajoutez le domaine de ce site. <strong>Puis fermez le chat actuel et démarrez-en un nouveau</strong> — le chat en cours continue d'utiliser l'ancienne liste blanche ; seul un nouveau chat prend en compte le domaine nouvellement ajouté. (Cela s'applique à la fois à l'application bureau Claude et à la version web.) Claude Code dans un terminal n'a pas une telle restriction et fonctionnera sans modification."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Envoyer."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude récupérera la liste des surcharges, fetchera la surcharge et le source du noyau pour chacune, et produira un tableau par découverte plus un résumé en langage simple que vous pouvez transférer."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Dites à Claude quoi corriger — dans le même chat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Une fois que Claude a posté le rapport, il demandera quelles découvertes vous voulez corriger. Répondez avec celles que vous confirmez (par ex. <em>« corrige #1 et #3, laisse #2 tranquille, le tiers, je demanderai au développeur »</em>). Claude sauvegarde chaque fichier avant de patcher, donc tout peut être annulé. <strong>Vous n'avez besoin de la deuxième carte ci-dessous que si vous avez fermé le chat et voulez y revenir plus tard.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (copier et coller dans Claude) :"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Copier le prompt de scan"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Copié !"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="La plupart des utilisateurs n'ont PAS besoin de cette carte."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Utilisez ceci uniquement si vous démarrez un <em>nouveau chat</em> pour appliquer des correctifs d'une révision précédente — par exemple vous avez fermé le chat d'origine pendant la nuit, vous transmettez la révision à un coéquipier, ou vous avez fait le scan dans claude.ai et voulez faire les corrections dans Claude Code. Si votre chat de scan est encore ouvert, faites défiler vers le haut — parlez simplement à Claude là-bas."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Continuer une révision précédente dans un nouveau chat"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Collez ce prompt dans un nouveau chat Claude pour lui donner le contexte de votre révision précédente. Il récupérera le rapport de la session précédente, listera les découvertes et vous demandera lesquelles corriger. Chaque fichier est sauvegardé avant tout correctif, donc tout est réversible."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Copier le prompt de correction"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Journal de sessions"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Les rapports soumis par Claude (ou collés à la main) sont enregistrés ici comme des sessions. Cliquez sur une session pour voir le rapport complet et les actions exécutées pendant celle-ci."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Pas encore de sessions. Exécutez le prompt ci-dessus et soit laissez Claude POSTer le rapport automatiquement, soit cliquez sur 'Nouvelle session' pour le coller."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Nouvelle session"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Voir toutes les sessions"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Après la révision"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Quand vous avez fini d'agir sur les recommandations de Claude, vous voudrez effacer les badges 'Modifications trouvées' que Joomla affiche dans Modèles afin qu'ils ne continuent pas à signaler les surcharges que vous avez déjà traitées."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Recommandé — révision par modèle"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Ouvrez la liste des modèles du site. Chaque modèle avec un badge 'Modifications trouvées' peut être ouvert individuellement afin que vous puissiez rejeter les lignes de surcharge spécifiques que vous avez traitées. Plus lent, mais vous gardez une piste d'audit par ligne."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Ouvrir la gestion des modèles du site"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="En masse — marquer toutes les surcharges comme révisées"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Voie plus rapide : effacer chaque ligne du suivi des surcharges en une seule étape. Ne faites cela qu'après avoir réellement révisé chaque découverte. Équivalent à utiliser le 'Tout rejeter' de Joomla sur chaque modèle à la fois."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Marquer tout comme révisé…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Confirmer : marquer toutes les surcharges comme révisées"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Ceci efface chaque ligne actuellement suivie par Joomla dans le suivi des surcharges. Les badges 'Modifications trouvées' dans Modèles disparaîtront, et le point d'accès API de ce site renverra zéro ligne jusqu'à ce que la prochaine mise à jour du noyau Joomla les repeuple. L'action ne peut pas être annulée sauf en cliquant sur 'Reconstruire le suivi des surcharges' ci-dessous pour re-scanner."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Je confirme avoir révisé chaque surcharge signalée et j'accepte la responsabilité pour tout problème non traité."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Oui — marquer tout comme révisé"


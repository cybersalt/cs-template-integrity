COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Les sessions</strong> stockent les rapports de révision de Claude. <strong>Le journal des actions</strong> est la piste d'audit des <em>changements</em> — quand des surcharges ont été réinitialisées ou effacées, quand une session a été créée, quand une sauvegarde a été enregistrée avant un correctif. Si quelque chose tourne mal sur ce site plus tard, c'est ici que vous verrez ce qui a été fait et quand."

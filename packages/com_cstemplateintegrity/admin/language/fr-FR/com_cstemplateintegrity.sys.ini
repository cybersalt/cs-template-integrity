COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Moniteur d'intégrité Joomla compétent en matière de templates. Expose le suivi natif #__template_overrides via une API Joomla Web Services afin que Claude (ou tout client disposant d'un jeton API Joomla) puisse examiner chaque surcharge signalée, la classer comme alerte / à examiner / information, et appliquer des correctifs sur place — sauvegardés automatiquement et réversibles depuis l'administration."


COM_CSTEMPLATEINTEGRITY_SESSIONFORM_HEADING="Vložit zprávu od Claude"
COM_CSTEMPLATEINTEGRITY_SESSIONFORM_INTRO="<strong>Ruční vložení pro uživatele Claude v prohlížeči.</strong> Pokud jste skenovací prompt spustili na <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, zkopírujte odpověď Claude a vložte ji sem, abyste ji uložili jako relaci. Pokud jste použili <em>Claude Code</em> (v terminálu), tento formulář nepotřebujete — Claude pošle zprávu zpět na web automaticky. Relace je standardně pojmenována dnešním časovým razítkem; můžete jej změnit, pokud chcete."

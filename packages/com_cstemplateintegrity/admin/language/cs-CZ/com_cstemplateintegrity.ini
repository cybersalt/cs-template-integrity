COM_CSTEMPLATEINTEGRITY_ACTIONS_DESCRIPTION="Zde je zaznamenána každá administrátorská událost, která se dotkla sledovače overrides, protokolu relací nebo záloh souborů. Pouze pro čtení."
COM_CSTEMPLATEINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Relace</strong> uchovávají kontrolní zprávy Claude. <strong>Protokol akcí</strong> je auditní stopa <em>změn</em> — kdy byly overrides resetovány nebo vyčištěny, kdy byla vytvořena relace, kdy byla uložena záloha před opravou. Pokud se na tomto webu později něco pokazí, zde uvidíte, co a kdy bylo provedeno."

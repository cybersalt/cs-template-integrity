COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_CALLED="Voláno:"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_NOKEY="Pokud chcete chatovat s Claude přímo z této administrace a nechat jej aplikovat opravy za vás, uložte svůj Anthropic API klíč pod tlačítkem <em>Možnosti</em> na nástěnce (záložka AI poskytovatel). Bez uloženého klíče použijte ruční prompt claude.ai / Claude Code na nástěnce, abyste s touto zprávou pracovali."
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_TITLE="Dotazuji se Claude…"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_LOADING_BODY="Claude čte vaši zprávu a může na straně serveru spouštět nástroje pro aplikaci oprav nebo zamítnutí. To může trvat až minutu. Prosím, nezavírejte toto okno."

COM_CSTEMPLATEINTEGRITY_FIELD_APIKEY_HELP_DEFAULT="Nápověda"
COM_CSTEMPLATEINTEGRITY_FIELD_GET_JOOMLA_TOKEN="Získat token"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL="Metoda 1: Použít Claude.ai nebo Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_MANUAL_TOOLTIP="Zkopírujte připravený prompt a vložte jej do claude.ai nebo Claude Code. Funguje bez API klíče. Skočí na prompt níže."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN="Metoda 2: Spustit automatizovaný sken"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_OK="Předá kontrolu overrides Claude na straně serveru pomocí vašeho uloženého Anthropic API klíče. Uloží zprávu jako relaci, se kterou můžete chatovat. Skočí na tlačítko spuštění níže."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ACTION_AUTOSCAN_TOOLTIP_NOKEY="Nejprve uložte svůj Anthropic API klíč v panelu Možnosti, abyste umožnili automatizované skeny. Do té doby použijte Metodu 1."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TOOLTIP="Znovu projde každou povolenou šablonu a obnoví sledovač overrides. Použijte po úpravě souborů šablony mimo Joomla, nebo pokud je sledovač Joomly zastaralý."

COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_LABEL="Klíče &amp; tokeny"
COM_CSTEMPLATEINTEGRITY_CONFIG_AI_FIELDSET_DESC="Volitelné. Uložte sem Anthropic API klíč, aby rozšíření mohlo spouštět skeny automaticky — bez nutnosti kopírovat prompt do Claude. Ponechte prázdné, pokud chcete dále používat ruční postup claude.ai / Claude Code na nástěnce."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_LABEL="Anthropic API klíč"
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_DESC="Váš osobní Anthropic API klíč (začíná na <code>sk-ant-…</code>). Získáte jej na <a href=\"https://console.anthropic.com/\" target=\"_blank\" rel=\"noopener\">console.anthropic.com</a>. Klíč je uložen na tomto serveru a používá se pouze pro volání api.anthropic.com vaším jménem. S uloženým klíčem se na nástěnce zobrazí tlačítko <em>Spustit automatizovaný sken</em>, které předá kontrolu overrides Claude na straně serveru a uloží zprávu zpět jako relaci — žádné kopírování není potřeba."
COM_CSTEMPLATEINTEGRITY_CONFIG_ANTHROPIC_API_KEY_NOTE="Každý automatizovaný sken provede jedno volání Anthropic API proti vašemu klíči. Cena odpovídá tomu, co Anthropic účtuje za použitý model (výchozí je Claude Sonnet 4.6). Weby s velmi vysokým počtem overrides jsou omezeny na prvních 60 na běh; pro zbytek spusťte sken znovu, nebo použijte ruční postup Claude Code na nástěnce pro neomezenou velikost."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_LABEL="Model pro skenování"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MODEL_DESC="Model Claude použitý pro jednorázové volání <em>Spustit automatizovaný sken</em> na nástěnce. Sken je klasifikační úloha (alert / review / info pro každý nález); Haiku ji zvládne dobře za zlomek ceny Sonnetu. Sonnet je bezpečná výchozí volba. Opus je pro běžné skeny zbytečně silný, ale je užitečný, pokud chcete extra důslednost na webu citlivém na bezpečnost."

COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_LABEL="Model pro chat"
COM_CSTEMPLATEINTEGRITY_CONFIG_CHAT_MODEL_DESC="Model Claude použitý pro navazující chat-with-Claude na stránce s detailem relace (kde žádáte Claude o aplikaci oprav nebo zamítnutí nálezů). Použití nástrojů je náročnější než klasifikace, takže zde doporučujeme Sonnet, i když pro skenovací model nastavíte Haiku &mdash; chyby v tool calls Claude vás stojí více než cenový rozdíl mezi modely."

COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_LABEL="Joomla API token (pro prompt na nástěnce)"
COM_CSTEMPLATEINTEGRITY_CONFIG_JOOMLA_API_TOKEN_DESC="Volitelné. Vygenerujte Joomla API token v <em>Systém &rarr; Uživatelé &rarr; Můj profil &rarr; Joomla API Token</em> a vložte jej sem. Skenovací / opravné prompty na nástěnce pak automaticky vyplní token namísto zástupného textu &ldquo;PASTE YOUR JOOMLA API TOKEN HERE&rdquo;, takže můžete kopírovat &amp; vkládat přímo do Claude bez úprav.<br><br><strong>Upozornění pro více administrátorů:</strong> Joomla API tokeny se autentizují jako <em>uživatel, který je vygeneroval</em>. Pokud tuto nástěnku používá více administrátorů, prompt použije ten token, který je zde uložen &mdash; což znamená, že Claude bude API volat jménem onoho jediného uživatele. Ponechte prázdné, aby si každý administrátor vložil vlastní token v okamžiku použití."

COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_LABEL="Overrides na sken"
COM_CSTEMPLATEINTEGRITY_CONFIG_SCAN_MAX_OVERRIDES_DESC="Kolik označených overrides šablony zkontroluje tlačítko <em>Spustit automatizovaný sken</em> v jediném volání Anthropic API. Výchozí <strong>10</strong>. Rozsah 1&ndash;100. <strong>Nižší hodnota je bezpečnější pro navazující chat:</strong> zpráva ze skenu roste s počtem nálezů a smyčka tool-use v chatu si tuto zprávu uchovává jako historii konverzace. Na nižších rate-limit úrovních Anthropicu (10K vstupních tokenů za minutu) sken se 60 overrides plus okamžitý chat ve stejné minutě vrátí <em>HTTP 429: rate limit exceeded</em>. S 10 overrides na běh zůstanou vaše chatové reakce po skenu pohodlně pod limitem. Weby s více overrides než toto prostě potřebují několik opakovaných spuštění, aby pokryly vše &mdash; zpráva z každého běhu se uloží jako vlastní relace, takže s každou můžete chatovat nezávisle."

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_HAIKU="Haiku 4.5 — nejrychlejší, nejnižší cena (~$1 za 1M vstupních tokenů)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_SONNET="Sonnet 4.6 — vyvážený, doporučený (~$3 za 1M vstupních tokenů)"
COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_OPUS="Opus 4.7 — nejschopnější, drahý (~$15 za 1M vstupních tokenů, 5× Sonnet)"

COM_CSTEMPLATEINTEGRITY_CONFIG_MODEL_COST_WARNING="<strong>O cenovém rozdílu.</strong> Typický sken na webu s 50 overrides spotřebuje asi 60K vstupních tokenů a vyprodukuje asi 5K výstupních tokenů. Přibližná cena za sken: <strong>~$0,08 na Haiku, ~$0,23 na Sonnet, ~$1,13 na Opus</strong>. Chatové reakce jsou mnohem menší (5K&ndash;10K vstupních tokenů na reakci), takže cena za reakci je zhruba 10&times; menší než za sken. Zveřejněný ceník Anthropicu je zdrojem pravdy na <a href=\"https://www.anthropic.com/pricing\" target=\"_blank\" rel=\"noopener\">anthropic.com/pricing</a> &mdash; čísla výše jsou přibližná a mohou se v čase měnit. Pokud s API začínáte, začněte se Sonnetem a několik běhů sledujte své využití na <a href=\"https://console.anthropic.com/usage\" target=\"_blank\" rel=\"noopener\">console.anthropic.com/usage</a>, než se rozhodnete pro upgrade nebo downgrade."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_QUICKNAV_LABEL="Navigace komponenty"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_TITLE="Metoda 2: Spustit automatizovaný sken (s vaším uloženým Anthropic API klíčem)"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_TITLE="Není uložen žádný Anthropic API klíč."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_TITLE="API klíč uložen."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_AVAILABLE_BODY="Rozšíření spustí kontrolu overrides na serveru pomocí vašeho Anthropic klíče, žádné kopírování není potřeba. Zpráva se automaticky uloží jako nová relace."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_INTRO="Klikněte níže pro spuštění skenu. Rozšíření načte každý označený override na tomto webu, odešle jej Claude s vaším uloženým API klíčem a výslednou zprávu uloží jako novou relaci. Po dokončení budete přesměrováni na zprávu."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOTE="Jedno volání Anthropic API na sken. Weby s více než %d overrides jsou omezeny na prvních %d na běh (lze konfigurovat v <em>Možnosti &rarr; AI poskytovatel &rarr; Overrides na sken</em>); pro další dávku spusťte sken znovu, nebo použijte ruční postup claude.ai / Claude Code níže pro neomezenou velikost. Stránka se může pozastavit na 30&ndash;90 sekund, zatímco Claude odpovídá &mdash; to je normální, neopouštějte ji."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_CONFIRM="Toto zavolá Anthropic API s vaším uloženým klíčem a může trvat 30 až 90 sekund. Pokračovat?"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_BUTTON="Spustit automatizovaný sken nyní"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_NOKEY_BODY="Klikněte na <em>Možnosti</em> v nástrojové liště výše, vložte svůj Anthropic API klíč na záložce <em>AI poskytovatel</em> a uložením povolte tuto metodu. Metoda 1 výše stále funguje i bez klíče."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_TITLE="Probíhá automatizovaný sken…"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_AUTOSCAN_LOADING_BODY="Volá se Anthropic API a analyzují se vaše overrides. Obvykle to trvá 30 až 90 sekund. Prosím, nezavírejte toto okno."


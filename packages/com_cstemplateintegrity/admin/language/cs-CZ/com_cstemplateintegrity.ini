COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_TITLE="Pokračovat s Claude"
COM_CSTEMPLATEINTEGRITY_SESSION_CHAT_INTRO="Řekněte Claude, co dělat dál. U nálezů, které jste potvrdili ve zprávě výše, řekněte něco jako <em>&ldquo;oprav #1 a #3, zbytek zamítni&rdquo;</em>. Claude provede práci na straně serveru a do tohoto vlákna doplní, co provedl. Každá aplikace opravy nejprve automaticky zazálohuje původní soubor, takže cokoli lze vrátit zpět ze zobrazení Zálohy souborů."

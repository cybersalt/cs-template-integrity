COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_TEST_INTRO="Odešle drobný testovací požadavek na api.anthropic.com pomocí uloženého klíče. Stojí téměř nic — ověří, že je klíč platný a z tohoto serveru dosažitelný."

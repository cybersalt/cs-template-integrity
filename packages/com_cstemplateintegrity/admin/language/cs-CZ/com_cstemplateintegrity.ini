COM_CSTEMPLATEINTEGRITY_DASHBOARD_DIAGNOSTICS_AUTOSCAN_CAP="Limit auto-skenu"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_NO_KEY="Není uložen žádný Anthropic API klíč. Klikněte na Možnosti v nástrojové liště, přidejte klíč na záložce AI poskytovatel a zkuste to znovu."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_SUCCESS="Automatizovaný sken dokončen: zkontrolováno %1$d override(s) a uloženo jako relace #%2$d."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_TRUNCATED="Tento web má více než %d overrides; pro zbytek bude potřeba navazující běh. Pro jednorázové kontroly neomezené velikosti použijte ruční prompt claude.ai / Claude Code."
COM_CSTEMPLATEINTEGRITY_RUN_SCAN_ERROR="Automatizovaný sken selhal: %s"

COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_TITLE="Zobrazit data cstemplateintegrity"
COM_CSTEMPLATEINTEGRITY_ACTION_VIEW_DESC="Umožňuje uživatelům ve vybraných skupinách číst overrides, relace, protokol akcí a obsah záloh (administrační pohledy a API endpointy pro čtení)."
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_TITLE="Upravovat data cstemplateintegrity a soubory overrides"
COM_CSTEMPLATEINTEGRITY_ACTION_WRITE_DESC="Umožňuje uživatelům ve vybraných skupinách aplikovat opravy, obnovovat zálohy, zamítat příznaky overrides a vytvářet nebo mazat relace. Implikuje oprávnění Zobrazit."

COM_CSTEMPLATEINTEGRITY_DASHBOARD="Nástěnka"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_ACTIVE="API endpoint aktivní"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Jakýkoli uživatel s platným Joomla API tokenem a oprávněním core.manage na tuto komponentu může číst aktuální data o override šablon tohoto webu."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ENDPOINT_LABEL="URL endpointu"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_TITLE="O rozšíření"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Web Services API zpřístupňující nativní sledovač #__template_overrides, takže Claude (nebo jakýkoli klient s Joomla API tokenem) může zkontrolovat každý označený override, klasifikovat jej a aplikovat opravy přímo na místě. Každá oprava je nejprve automaticky zálohována do databáze a lze ji vrátit zpět ze zobrazení Zálohy souborů."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_VERSION_LABEL="Verze"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_TITLE="Začněte zde."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_AUDIENCE_BODY="Toto je jediná karta, kterou potřebujete pro běžnou kontrolu. Spusťte prompt, získejte zprávu a poté ve stejném chatu Claude řekněte, které nálezy opravit — žádný druhý prompt není potřeba."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_TITLE="Metoda 1: Kontrola pomocí Claude.ai nebo Claude Code"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_INTRO="Rozšíření zpřístupňuje vaše data o overrides přes REST. Spárujte je s Claude (claude.ai nebo Claude Code) pro automatizovanou bezpečnostní kontrolu každého označeného override na tomto webu, a pak aplikujte opravy, které potvrdíte — to vše v jednom chatu."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Vygenerujte Joomla API token (jednou)."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="V administraci Joomla: záložka <em>Systém → Uživatelé → Můj profil → Joomla API Token</em>. Klikněte na ikonu oka pro zobrazení tokenu. Toto stačí udělat jen jednou — uložte si token na bezpečné místo."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Otevřete Claude a vložte níže uvedený prompt."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Otevřete Claude tam, kde jej používáte — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> v prohlížeči, spusťte <code>claude</code> v terminálu (Claude Code), nebo jakýkoli jiný nástroj, ve kterém máte Claude k dispozici. Nahraďte zástupný text tokenem z kroku 1. URL webu a endpointy jsou pro tento web již vyplněny.<br><br><strong>Pouze pro uživatele claude.ai:</strong> pokud Claude odpoví „Host not in allowlist“, jeho sandbox pro spouštění kódu blokuje váš web. V claude.ai otevřete <em>Settings → Capabilities → Code execution → Network access</em> a přidejte doménu tohoto webu. <strong>Pak zavřete aktuální chat a začněte nový</strong> — běžící chat dále používá starý allowlist; pouze nový chat zachytí nově přidanou doménu. (Toto platí jak pro desktopovou aplikaci Claude, tak pro webovou verzi.) Claude Code v terminálu žádné takové omezení nemá a bude fungovat bez úprav."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Odeslat."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude stáhne seznam overrides, načte zdroj override a core souboru pro každý z nich a vytvoří tabulku jednotlivých nálezů plus shrnutí v běžném jazyce, které můžete přeposlat."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_TITLE="Řekněte Claude, co opravit — ve stejném chatu."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_STEP4_BODY="Jakmile Claude pošle zprávu, zeptá se, které nálezy chcete opravit. Odpovězte s těmi, které potvrzujete (např. <em>„oprav #1 a #3, #2 nech být, na ten třetí stranou se zeptám vývojáře“</em>). Claude před opravou zazálohuje každý soubor, takže cokoli lze vrátit zpět. <strong>Druhou kartu níže potřebujete jen tehdy, pokud jste chat zavřeli a chcete se k němu vrátit později.</strong>"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (zkopírujte a vložte do Claude):"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Zkopírovat skenovací prompt"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_USAGE_COPIED="Zkopírováno!"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_TITLE="Většina uživatelů tuto kartu NEpotřebuje."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_AUDIENCE_BODY="Použijte ji jen tehdy, pokud začínáte <em>nový chat</em> pro aplikaci oprav z předchozí kontroly — například jste přes noc zavřeli původní chat, předáváte kontrolu kolegovi, nebo jste sken spustili v claude.ai a chcete opravy provést v Claude Code. Pokud je váš skenovací chat stále otevřený, přejděte nahoru — prostě tam mluvte s Claude."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_TITLE="Pokračovat v předchozí kontrole v novém chatu"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_INTRO="Vložte tento prompt do nového chatu Claude, abyste mu poskytli kontext z vaší dřívější kontroly. Načte zprávu z předchozí relace, vypíše nálezy a zeptá se, které opravit. Každý soubor je před aplikací jakékoli opravy zazálohován, takže cokoli lze vrátit zpět."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Zkopírovat opravný prompt"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_TITLE="Protokol relací"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_INTRO="Zprávy odeslané Claude (nebo vložené ručně) jsou zde uloženy jako relace. Klikněte na relaci pro zobrazení celé zprávy a akcí, které během ní proběhly."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_EMPTY="Zatím žádné relace. Spusťte výše uvedený prompt a buď nechte Claude POSTnout zprávu zpět automaticky, nebo klikněte na 'Nová relace' a vložte ji."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_NEW="Nová relace"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_SESSIONS_ALL="Zobrazit všechny relace"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_TITLE="Po kontrole"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_INTRO="Až budete hotovi s reakcí na doporučení Claude, budete chtít vyčistit odznaky 'Changes found', které Joomla zobrazuje v Šablonách, aby přestaly označovat overrides, které jste již vyřešili."

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Doporučeno — kontrola po šablonách"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Otevřete seznam šablon webu. Každou šablonu s odznakem 'Changes found' lze otevřít individuálně, takže můžete zamítnout konkrétní řádky overrides, které jste vyřešili. Pomalejší, ale zachováte si auditní stopu po jednotlivých řádcích."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Otevřít správu šablon webu"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Hromadně — označit každý override jako zkontrolovaný"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Rychlejší cesta: vyčistit každý řádek ve sledovači overrides v jednom kroku. Udělejte to teprve poté, co jste skutečně zkontrolovali každý nález. Ekvivalent použití vlastního 'Dismiss All' Joomly na všechny šablony najednou."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Označit vše jako zkontrolované…"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Potvrdit: označit všechny overrides jako zkontrolované"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="Tímto se vyčistí každý řádek, který Joomla aktuálně sleduje ve sledovači overrides. Odznaky 'Changes found' v Šablonách zmizí a API endpoint tohoto webu bude vracet nula řádků až do dalšího jádrového updatu Joomly, který je znovu naplní. Akci nelze vrátit zpět, leda kliknutím na 'Obnovit sledovač overrides' níže pro nový sken."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="Potvrzuji, že jsem zkontroloval každý označený override, a přijímám odpovědnost za případné nevyřešené problémy."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Ano — označit vše jako zkontrolované"

COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_SUCCESS="%d řádek(ů) overrides označeno jako zkontrolovaných a vyčištěno ze sledovače."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_NONE="Nebyly žádné řádky overrides ke smazání."
COM_CSTEMPLATEINTEGRITY_MARK_REVIEWED_ERROR="Nepodařilo se vyčistit sledovač overrides: %s"

COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_TITLE="Resetovat overrides ke kontrole"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Schválili jste vy (nebo předchozí vývojář) v minulosti overrides bez skutečné kontroly? Klikněte sem, abyste vrátili každý soubor override zpět do sledovače a mohli jej s Claude řádně zkontrolovat. Užitečné po 'Dismiss All', které proběhlo dříve, než byl tento nástroj nainstalován."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_NOTE="Projde složku <code>html/</code> každé povolené šablony a vloží řádek do <code>#__template_overrides</code> pro každý soubor override, který ještě není sledován. Stávající řádky zůstávají beze změny. Resetované řádky se znovu objeví jako odznaky 'Changes found' v administraci Šablon, takže proti nim můžete spustit kontrolní postup výše."
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_BUTTON="Resetovat všechny overrides ke kontrole"
COM_CSTEMPLATEINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Resetovat všechny overrides ke kontrole? Každý soubor override na tomto webu se znovu objeví v odznacích 'Changes found' v Šablonách, takže jej bude možné znovu vyhodnotit."

COM_CSTEMPLATEINTEGRITY_RESCAN_SUCCESS="Sledovač overrides obnoven: vloženo %1$d řádek(ů) napříč %3$d šablonami (skenováno %2$d souborů)."

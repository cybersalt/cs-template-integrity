COM_CSTEMPLATEINTEGRITY="Cybersalt Template Integrity"
COM_CSTEMPLATEINTEGRITY_XML_DESCRIPTION="Monitor integrity šablon Joomla. Zpřístupňuje nativní sledovač #__template_overrides prostřednictvím Joomla Web Services API, takže Claude (nebo jakýkoli klient s Joomla API tokenem) může zkontrolovat každý označený override, klasifikovat jej jako alert / review / info a aplikovat opravy přímo na místě — s automatickou zálohou a možností vrácení změn z administrace."

COM_CSTEMPLATEINTEGRITY_DISCLAIMER_TITLE="Než začnete"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_BODY="<p><strong>Před tím, než necháte toto rozšíření cokoli změnit, ujistěte se, že máte aktuální zálohu svého webu.</strong> Důrazně doporučujeme Akeeba Backup nebo zálohovací funkci vašeho hostingu.</p><p><strong>Co toto rozšíření dělá:</strong> spojuje váš web Joomla s umělou inteligencí (Claude), která zkontroluje každý označený override šablony, klasifikuje jej jako bezpečnostní upozornění, kosmetickou odlišnost nebo legitimní úpravu a aplikuje opravy, které potvrdíte. Každá oprava je nejprve automaticky zálohována do databáze, takže jednotlivé změny lze vrátit zpět — ale úplná záloha webu je stále vaše záchranná síť pro vše ostatní.</p><p><strong>Umělá inteligence se může mýlit.</strong> Claude může něco nesprávně klasifikovat nebo navrhnout opravu, která rozbije nějakou funkci. Vždy si přečtěte, co Claude navrhuje, než řeknete „ano, aplikovat to“, a po aplikaci oprav web otestujte.</p><p><strong>Nejste si jisti?</strong> Pokud vám práce s tímto nástrojem není pohodlná, napište Timovi na <a href=\"mailto:tim@cybersalt.com\">tim@cybersalt.com</a> a domluvíme se — můžeme vás tím provést, nebo kontrolu provést za vás.</p>"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_DONT_SHOW_AGAIN="Příště nezobrazovat"
COM_CSTEMPLATEINTEGRITY_DISCLAIMER_CONFIRM_BUTTON="Rozumím — pokračovat"

COM_CSTEMPLATEINTEGRITY_RUN_SCAN_RATE_LIMITED="Příliš mnoho automatizovaných skenů za poslední hodinu (limit: %d). Počkejte několik minut a zkuste to znovu, nebo použijte ruční postup claude.ai / Claude Code na nástěnce."


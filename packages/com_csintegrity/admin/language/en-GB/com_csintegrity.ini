COM_CSINTEGRITY_BACKUPS_STORAGE_NOTE="Backups are stored in the database (table <code>#__csintegrity_backups</code>) as base64-encoded copies of the file at the time of backup. Each row holds the original path, sha256, size, and full contents. They are not written to disk; click into a backup row for restore options or to download the contents."


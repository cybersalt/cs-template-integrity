COM_CSINTEGRITY_BACKUP_CONTENTS_HEADING="Backup contents"
COM_CSINTEGRITY_BACKUP_CONTENTS_HELP="The exact bytes that were captured at backup time. Resize the box by dragging its bottom-right corner. Use the Download button above to save these contents as a file."

COM_CSINTEGRITY_BACKUP_RESTORE_TITLE="Restore this backup"
COM_CSINTEGRITY_BACKUP_RESTORE_INTRO="Overwrite the live file at the path above with the backed-up contents. Before writing, the current contents at that path are saved as a fresh backup, so this restore is itself reversible — if it goes wrong, undo it by restoring the new pre-restore backup."
COM_CSINTEGRITY_BACKUP_RESTORE_NOTE="The file is written via PHP from this admin page; no FTP needed. The web user must have write permission on the target path. The Joomla site root is the boundary — restore refuses to write outside it."
COM_CSINTEGRITY_BACKUP_RESTORE_BUTTON="Restore now…"

COM_CSINTEGRITY_BACKUP_RESTORE_MODAL_TITLE="Confirm: restore backup"
COM_CSINTEGRITY_BACKUP_RESTORE_MODAL_BODY="Restoring will overwrite the live file at %s with the backed-up contents shown above. The current contents will be saved as a fresh backup first so this can be reversed."
COM_CSINTEGRITY_BACKUP_RESTORE_MODAL_AGREE="I understand: restore now will overwrite the live file. The pre-restore copy will be auto-saved as a new backup."
COM_CSINTEGRITY_BACKUP_RESTORE_MODAL_CONFIRM="Yes — restore"

COM_CSINTEGRITY_BACKUP_MANUAL_TITLE="Restore manually (FTP / your editor)"
COM_CSINTEGRITY_BACKUP_MANUAL_INTRO="If you'd rather not let the extension write to disk:"
COM_CSINTEGRITY_BACKUP_MANUAL_STEP1="Click <em>Download backup</em> above (or copy the Backup Contents block)."
COM_CSINTEGRITY_BACKUP_MANUAL_STEP2="Open your FTP client, SFTP client, or hosting File Manager."
COM_CSINTEGRITY_BACKUP_MANUAL_STEP3="Replace the file at the destination path below with the downloaded copy."
COM_CSINTEGRITY_BACKUP_MANUAL_DESTINATION="Destination path on the server"

COM_CSINTEGRITY_BACKUP_STORAGE_TITLE="Where this backup lives"
COM_CSINTEGRITY_BACKUP_STORAGE_INTRO="Backup contents are stored in the database, not on disk. Specifically, in the <code>#__csintegrity_backups</code> table — the <code>contents_b64</code> column holds the file contents base64-encoded."
COM_CSINTEGRITY_BACKUP_STORAGE_NOTE="That means a database backup also captures these. Uninstalling the component drops the table along with all stored backups."

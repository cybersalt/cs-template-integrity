COM_CSINTEGRITY="Cybersalt Template Integrity"
COM_CSINTEGRITY_XML_DESCRIPTION="Template-literate Joomla integrity monitor. v0.1 exposes the native #__template_overrides data via a read-only Web Services endpoint."

COM_CSINTEGRITY_DASHBOARD="Dashboard"
COM_CSINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSINTEGRITY_DASHBOARD_STATUS_ACTIVE="API endpoint active"
COM_CSINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Any user with a valid Joomla API token and core.manage permission on this component can read this site's current template-override data."

COM_CSINTEGRITY_DASHBOARD_ENDPOINT_LABEL="Endpoint URL"

COM_CSINTEGRITY_DASHBOARD_ABOUT_TITLE="About"
COM_CSINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Read-only Web Services API exposing #__template_overrides data so external tools can list flagged overrides and read both the override and core source contents. Classifier output, findings browser, and email alerts are in later sprints."
COM_CSINTEGRITY_DASHBOARD_VERSION_LABEL="Version"

COM_CSINTEGRITY_DASHBOARD_USAGE_TITLE="Use with Claude"
COM_CSINTEGRITY_DASHBOARD_USAGE_INTRO="The extension exposes your override data via REST. Pair it with Claude (claude.ai or Claude Code) to get an automated security review of every flagged override on this site."

COM_CSINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="1. Generate a Joomla API token (one-time)."
COM_CSINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="In the Joomla admin: <em>System → Users → My Profile → Joomla API Token</em> tab. Click the eye icon to reveal the token. You only need to do this once — keep the token somewhere safe."

COM_CSINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="2. Open Claude and paste the prompt below."
COM_CSINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Open <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> (or run <code>claude</code> in a terminal if you use Claude Code). Replace the placeholder with the token from step 1. The site URL and endpoints are already filled in for this site."

COM_CSINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="3. Send."
COM_CSINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude will pull the list of overrides, fetch the override and core source for each one, and produce a per-finding table plus a plain-language summary you can forward."

COM_CSINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (copy and paste into Claude):"
COM_CSINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Copy prompt"
COM_CSINTEGRITY_DASHBOARD_USAGE_COPIED="Copied!"

COM_CSINTEGRITY_DASHBOARD_RESCAN_TITLE="Rebuild override tracker"
COM_CSINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Walks every enabled template's <code>html/</code> folder and inserts a row in <code>#__template_overrides</code> for any override file that isn't already tracked. Use this if you've previously run Joomla's 'Dismiss All' on the override badges and want a real test corpus back."
COM_CSINTEGRITY_DASHBOARD_RESCAN_NOTE="Testing utility. Existing override rows are not modified. New rows use <code>action = 'Joomla Update'</code> to match Joomla's own convention. Inserted rows will reappear as 'Changes found' badges in the Templates admin."
COM_CSINTEGRITY_DASHBOARD_RESCAN_BUTTON="Rebuild now"
COM_CSINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Rebuild the override tracker now? New rows will be inserted for every override file that isn't already tracked. This is intended for testing."

COM_CSINTEGRITY_RESCAN_SUCCESS="Override tracker rebuilt: %1$d row(s) inserted across %3$d template(s) (%2$d files scanned)."
COM_CSINTEGRITY_RESCAN_ERROR="Override tracker rebuild failed: %s"

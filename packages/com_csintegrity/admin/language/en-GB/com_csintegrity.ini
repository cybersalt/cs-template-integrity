COM_CSINTEGRITY_SESSIONFORM_TITLE="New session"
COM_CSINTEGRITY_SESSIONFORM_HEADING="Paste a Claude report"
COM_CSINTEGRITY_SESSIONFORM_INTRO="<strong>Manual paste-in for browser-Claude users.</strong> If you ran the scan prompt at <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a>, copy Claude's reply and paste it here to save it as a session. If you used <em>Claude Code</em> (in a terminal), you don't need this form — Claude posts the report back to the site automatically. The session is named with today's timestamp by default; change it if you'd like."
COM_CSINTEGRITY_SESSIONFORM_NAME="Session name"
COM_CSINTEGRITY_SESSIONFORM_NAME_HELP="Defaults to the current YYYY-MM-DD-HHMMSS timestamp. Used as the visible label in the session log."
COM_CSINTEGRITY_SESSIONFORM_SUMMARY="One-line summary"
COM_CSINTEGRITY_SESSIONFORM_SUMMARY_PLACEHOLDER="e.g. 1 XSS finding, 14 theming-drift items, 1 cosmetic bug"
COM_CSINTEGRITY_SESSIONFORM_REPORT="Report (Markdown)"
COM_CSINTEGRITY_SESSIONFORM_REPORT_PLACEHOLDER="Paste the full report Claude produced here. It will be stored verbatim and shown when the session is opened."
COM_CSINTEGRITY_SESSIONFORM_SAVE="Save session"

COM_CSINTEGRITY_ACTIONS_TITLE="CS Template Integrity — Action log"
COM_CSINTEGRITY_ACTIONS_DESCRIPTION="Every administrative event that touched the override tracker, the session log, or the file backups is recorded here. Read-only."
COM_CSINTEGRITY_ACTIONS_VS_SESSIONS="<strong>Sessions</strong> store Claude's review reports. <strong>The Action log</strong> is the audit trail of <em>changes</em> — when overrides got reset or cleared, when a session was created, when a backup was saved before a fix. If something goes wrong on this site later, this is where you'll see what was done and when."

COM_CSINTEGRITY="CS Template Integrity"
COM_CSINTEGRITY_XML_DESCRIPTION="Template-literate Joomla integrity monitor. v0.1 exposes the native #__template_overrides data via a read-only Web Services endpoint."

COM_CSINTEGRITY_DASHBOARD="Dashboard"
COM_CSINTEGRITY_DASHBOARD_TITLE="Cybersalt Template Integrity"

COM_CSINTEGRITY_DASHBOARD_STATUS_ACTIVE="API endpoint active"
COM_CSINTEGRITY_DASHBOARD_STATUS_DESCRIPTION="Any user with a valid Joomla API token and core.manage permission on this component can read this site's current template-override data."

COM_CSINTEGRITY_DASHBOARD_ENDPOINT_LABEL="Endpoint URL"

COM_CSINTEGRITY_DASHBOARD_ABOUT_TITLE="About"
COM_CSINTEGRITY_DASHBOARD_ABOUT_DESCRIPTION="Read-only Web Services API exposing #__template_overrides data so external tools can list flagged overrides and read both the override and core source contents. Classifier output, findings browser, and email alerts are in later sprints."
COM_CSINTEGRITY_DASHBOARD_VERSION_LABEL="Version"

COM_CSINTEGRITY_DASHBOARD_USAGE_TITLE="Use with Claude"
COM_CSINTEGRITY_DASHBOARD_USAGE_INTRO="The extension exposes your override data via REST. Pair it with Claude (claude.ai or Claude Code) to get an automated security review of every flagged override on this site."

COM_CSINTEGRITY_DASHBOARD_USAGE_STEP1_TITLE="Generate a Joomla API token (one-time)."
COM_CSINTEGRITY_DASHBOARD_USAGE_STEP1_BODY="In the Joomla admin: <em>System → Users → My Profile → Joomla API Token</em> tab. Click the eye icon to reveal the token. You only need to do this once — keep the token somewhere safe."

COM_CSINTEGRITY_DASHBOARD_USAGE_STEP2_TITLE="Open Claude and paste the prompt below."
COM_CSINTEGRITY_DASHBOARD_USAGE_STEP2_BODY="Open Claude wherever you use it — <a href=\"https://claude.ai\" target=\"_blank\" rel=\"noopener\">claude.ai</a> in a browser, run <code>claude</code> in a terminal (Claude Code), or any other tool you have Claude available in. Replace the placeholder with the token from step 1. The site URL and endpoints are already filled in for this site."

COM_CSINTEGRITY_DASHBOARD_USAGE_STEP3_TITLE="Send."
COM_CSINTEGRITY_DASHBOARD_USAGE_STEP3_BODY="Claude will pull the list of overrides, fetch the override and core source for each one, and produce a per-finding table plus a plain-language summary you can forward."

COM_CSINTEGRITY_DASHBOARD_USAGE_PROMPT_LABEL="Prompt (copy and paste into Claude):"
COM_CSINTEGRITY_DASHBOARD_USAGE_COPY_BUTTON="Copy scan prompt"
COM_CSINTEGRITY_DASHBOARD_USAGE_COPIED="Copied!"

COM_CSINTEGRITY_DASHBOARD_FIX_TITLE="Apply fixes"
COM_CSINTEGRITY_DASHBOARD_FIX_INTRO="After Claude has produced its review and you've decided which findings are real, paste this second prompt into Claude. It tells Claude to back up each affected file before proposing a fix, so you can roll back if anything breaks."
COM_CSINTEGRITY_DASHBOARD_FIX_COPY_BUTTON="Copy fix prompt"

COM_CSINTEGRITY_DASHBOARD_SESSIONS_TITLE="Session log"
COM_CSINTEGRITY_DASHBOARD_SESSIONS_INTRO="Reports submitted by Claude (or pasted in by hand) are saved here as sessions. Click a session to view the full report and the actions that ran during it."
COM_CSINTEGRITY_DASHBOARD_SESSIONS_EMPTY="No sessions yet. Run the prompt above and either let Claude POST the report back automatically, or click 'New session' to paste it in."
COM_CSINTEGRITY_DASHBOARD_SESSIONS_NEW="New session"
COM_CSINTEGRITY_DASHBOARD_SESSIONS_ALL="View all sessions"

COM_CSINTEGRITY_DASHBOARD_REVIEWED_TITLE="After review"
COM_CSINTEGRITY_DASHBOARD_REVIEWED_INTRO="When you're done acting on Claude's recommendations, you'll want to clear the 'Changes found' badges Joomla shows in Templates so they don't keep flagging the overrides you've already handled."

COM_CSINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_LABEL="Recommended &mdash; per-template review"
COM_CSINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BODY="Open the Site Templates list. Each template with a 'Changes found' badge can be opened individually so you can dismiss the specific override rows you've handled. Slower, but you keep a per-row audit trail."
COM_CSINTEGRITY_DASHBOARD_REVIEWED_OPTION_A_BUTTON="Open Site Templates"

COM_CSINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_LABEL="Bulk &mdash; mark every override as reviewed"
COM_CSINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BODY="Faster path: clear every row in the override tracker in one step. Only do this once you've actually reviewed each finding. Equivalent to using Joomla's own 'Dismiss All' on every template at once."
COM_CSINTEGRITY_DASHBOARD_REVIEWED_OPTION_B_BUTTON="Mark all as reviewed&hellip;"

COM_CSINTEGRITY_DASHBOARD_REVIEWED_MODAL_TITLE="Confirm: mark all overrides as reviewed"
COM_CSINTEGRITY_DASHBOARD_REVIEWED_MODAL_BODY="This clears every row Joomla is currently tracking in the override tracker. The 'Changes found' badges in Templates will disappear, and this site's API endpoint will return zero rows until Joomla's next core update repopulates them. The action cannot be undone except by clicking 'Rebuild override tracker' below to re-scan."
COM_CSINTEGRITY_DASHBOARD_REVIEWED_MODAL_AGREE="I confirm I have reviewed every flagged override and I accept responsibility for any unaddressed issues."
COM_CSINTEGRITY_DASHBOARD_REVIEWED_MODAL_CONFIRM="Yes &mdash; mark all reviewed"

COM_CSINTEGRITY_MARK_REVIEWED_SUCCESS="%d override row(s) marked as reviewed and cleared from the tracker."
COM_CSINTEGRITY_MARK_REVIEWED_NONE="There were no override rows to clear."
COM_CSINTEGRITY_MARK_REVIEWED_ERROR="Could not clear the override tracker: %s"

COM_CSINTEGRITY_DASHBOARD_RESCAN_TITLE="Reset overrides for review"
COM_CSINTEGRITY_DASHBOARD_RESCAN_DESCRIPTION="Have you (or a previous developer) approved overrides in the past without truly checking them? Click here to bring every override file back into the tracker so you can review each one properly with Claude. Useful after a 'Dismiss All' that happened before this tool was installed."
COM_CSINTEGRITY_DASHBOARD_RESCAN_NOTE="Walks every enabled template's <code>html/</code> folder and inserts a row in <code>#__template_overrides</code> for any override file that isn't already tracked. Existing rows are left alone. Reset rows reappear as 'Changes found' badges in the Templates admin so you can run the review workflow above against them."
COM_CSINTEGRITY_DASHBOARD_RESCAN_BUTTON="Reset all overrides for review"
COM_CSINTEGRITY_DASHBOARD_RESCAN_CONFIRM="Reset all overrides for review? Every override file on this site will reappear in the Templates 'Changes found' badges so it can be re-evaluated."

COM_CSINTEGRITY_RESCAN_SUCCESS="Override tracker rebuilt: %1$d row(s) inserted across %3$d template(s) (%2$d files scanned)."
COM_CSINTEGRITY_RESCAN_ERROR="Override tracker rebuild failed: %s"

